<script>
const HISTORY_DATA = {"2026.06.30":{"date":"2026.06.30","it":{"domestic":[{"title":"카카오그룹, 'Human-centric AI'와 글로벌 팬덤 OS로 성장 기어 전환","summary":"카카오그룹이 2026년을 '응축의 시간'을 마무리하고 '방향성 있는 성장'을 본격화하는 원년으로 선언했다. 사람 중심의 AI(Human-centric AI)와 글로벌 팬덤 OS를 두 축으로 삼아 AI·글로벌 전략을 가속화한다. 카카오톡을 기반으로 한 AI 서비스 연동과 해외 K-콘텐츠 플랫폼 확장이 핵심 방향이다.","insight":"카카오의 'Human-centric AI' 기조는 기술 중심이 아닌 사용자 행동 흐름에 AI를 자연스럽게 녹이는 전략으로, 국내 슈퍼앱 구조에서 AI 기능 설계 시 참고할 만한 방향성이다.","source_name":"카카오 공식 블로그","source_url":"https://www.kakaocorp.com/page/detail/11870"},{"title":"공공 AI 박람회 KPAIX 2026 성황리 종료, 52개 AI 기업 참여","summary":"행정안전부와 NIA가 주최한 '2026 공공 AI 박람회'가 일산 킨텍스에서 개최됐다. 삼성SDS, LG CNS, 네이버클라우드, 카카오 등 대형 기업과 앨리스그룹 등 혁신 스타트업 52사가 참여해 공공 AI 혁신 사례를 선보였다. 공공 부문의 AI 도입 실증 사례가 민간 확산의 레퍼런스로 부각됐다.","insight":"공공 AI 박람회의 B2G 레퍼런스는 민간 기업의 AI 도입 설득 자료로 활용 가능하며, 특히 규제가 엄격한 산업군(금융·의료)에서 'public sector first' 전략의 타당성을 뒷받침한다.","source_name":"다음 뉴스","source_url":"https://v.daum.net/v/20260622111309295"},{"title":"한국 기업 AI 도입률 61%지만 조직 내재화는 6.7%에 불과","summary":"2026년 한국 기업의 생성형 AI 도입률은 61%에 달하지만 실제 조직 차원의 내재화는 6.7%에 그치는 것으로 나타났다. AI는 도입됐지만 조직 구조·프로세스·문화는 아직 준비되지 않은 상태다. 도구 도입과 실질적 활용 역량 사이의 간극이 올해 국내 AI 시장의 핵심 과제로 부상했다.","insight":"이 데이터는 AI 기능 출시만으로는 부족하며, 사용자의 워크플로 내 자연스러운 통합과 온보딩 설계가 실제 활성화의 핵심임을 시사한다. PM은 도입률보다 '주간 활성 사용률'을 KPI로 잡아야 한다.","source_name":"Carrot Global Blog","source_url":"https://www.carrotglobalblog.com/2026-korean-enterprise-ai-utilization-status-debriefing-260121/"}],"international":[{"title":"OpenAI·Anthropic, 사용자 '효율성 전환'으로 새로운 AI 수익 현실 직면","summary":"기업들이 AI 비용을 효율화하면서 무제한 토큰 사용에서 벗어나 ROI 중심으로 AI 예산을 재편하고 있다. OpenAI와 Anthropic 모두 비밀리에 IPO를 신청했으나 예상보다 낮은 성장 궤도에 처할 수 있다는 우려가 제기됐다. 일부 AI 스타트업은 비용 절감을 위해 DeepSeek 등 저가 대안으로 전환하고 있다.","insight":"AI 벤더 입장에서 토큰 소비 극대화 전략의 한계가 드러나고 있다. PM 관점에서는 사용량 기반 과금 모델을 태스크 완료 기반 또는 성과 기반 가격 모델로 재설계하는 시점을 검토해야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/06/26/openai-anthropic-new-ai-spending-reality-as-users-shift-to-efficiency.html"},{"title":"Google AI 핵심 연구자들 Anthropic으로 연이어 이직, 인재 유출 가속","summary":"Google의 핵심 AI 연구자 Jonas Adler와 Alexander Pritzel이 Anthropic으로 이직을 준비 중이다. 노벨상 수상자 John Jumper와 스타 연구자 Noam Shazeer도 각각 Anthropic·OpenAI로 떠났다. Google의 AI 인재 유출이 구조적 문제로 자리잡으면서 Gemini 모델 개발 역량에 대한 우려가 커지고 있다.","insight":"AI 업계의 인재 이동은 단순 경쟁이 아닌 연구 자율성과 임팩트 기회에 대한 선호를 반영한다. Anthropic의 성장세(ARR $300억 돌파)가 Google 대비 더 빠른 모델 개선 속도로 이어질 가능성을 주시해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/24/ai-researchers-continue-to-leave-google-for-its-rivals/"},{"title":"Amazon 자체 반도체 사업 연간 매출 200억 달러 돌파, YoY 100% 성장","summary":"Amazon의 커스텀 실리콘 사업(Graviton, Trainium, Nitro)이 연간 200억 달러 매출로 글로벌 3대 데이터센터 칩 사업자 반열에 올랐다. 전년 대비 100% 이상 성장하며 Nvidia 의존도를 줄이는 클라우드 수직 통합 전략이 성과를 내고 있다. AI 인프라 경쟁에서 자체 칩 보유 여부가 핵심 경쟁 변수로 부상했다.","insight":"AWS의 자체 칩 전략은 AI 서비스 원가 구조를 근본적으로 바꾸고 있다. AI 기반 제품을 설계하는 PM은 클라우드 인프라 선택이 장기적 단가와 성능 차별화에 미치는 영향을 고려해야 한다.","source_name":"AI News","source_url":"https://www.artificialintelligence-news.com/"}]},"marketing":{"domestic":[{"title":"2026년 한국 온라인 광고비, 전체의 60% 돌파하며 매체 구조 재편 가속","summary":"2026년 국내 온라인 광고비가 총 광고비의 60%를 넘어서며 방송·인쇄 매체와의 양극화가 심화되고 있다. 총 광고비는 약 17조 9천억 원 규모로 완만한 성장이 예상되나 성장의 과실은 디지털 채널에 집중됐다. 온라인 중심의 구조 재편이 광고주의 미디어 믹스 전략 전환을 압박하고 있다.","insight":"광고비의 디지털 집중은 퍼포먼스 마케팅 중심의 예산 배분을 강화하는 신호다. PM은 신규 기능의 마케팅 채널 선택 시 온라인 네이티브 포맷(숏폼, 검색 광고)의 ROI를 우선 검증해야 한다.","source_name":"서울STV뉴스","source_url":"https://www.stvnews.kr/news/articleView.html?idxno=14879"},{"title":"나스미디어, 2026 디지털 마케팅 4대 트렌드로 AI·발견형 커머스·OTT·DOOH 제시","summary":"KT 나스미디어가 발표한 2026 디지털 미디어·마케팅 전망 보고서에서 AI 마케팅, 발견형 커머스, OTT 광고, DOOH를 4대 핵심 트렌드로 꼽았다. AI를 활용한 캠페인 자동 최적화와 개인화가 광고 집행의 표준이 되어가고 있다. 특히 발견형 커머스는 검색 의도 없이도 구매를 유도하는 새로운 퍼널 모델로 주목받고 있다.","insight":"발견형 커머스는 기존 퍼널(인지→고려→구매)을 파괴하고 콘텐츠 소비 중 즉시 구매 전환을 가능하게 한다. 커머스 기능을 가진 프로덕트라면 발견 맥락에서의 구매 진입점 설계를 로드맵에 포함해야 한다.","source_name":"KT 나스미디어","source_url":"https://www.nasmedia.co.kr/%EC%A0%95%EA%B8%B0%EB%B3%B4%EA%B3%A0%EC%84%9C/2025%EB%85%84-12%EC%9B%94-2026-%EB%94%94%EC%A7%80%ED%84%B8-%EB%AF%B8%EB%94%94%EC%96%B4-%EB%A7%88%EC%BC%80%ED%8C%85-%EC%A0%84%EB%A7%9D/"},{"title":"구글 코리아, 2026 디지털 광고·커머스 전망 발표 - 매끄럽고 개인화된 경험의 시대","summary":"구글 코리아가 2026년 디지털 광고 및 커머스 시장을 '매끄럽고 개인화된 경험의 시대'로 정의했다. AI 기반 개인화 광고, 프라이버시 우선 전략, 숏폼 비디오 커머스가 핵심 키워드로 제시됐다. '도달'이 아닌 '구매까지의 직접 전환'을 책임지는 방향으로 광고 패러다임이 전환되고 있다고 분석했다.","insight":"광고가 구매 퍼널의 시작점이 아닌 완결점으로 이동하는 트렌드는 마케팅과 프로덕트의 경계를 허문다. 특히 앱 내 구매 전환 플로우와 광고 랜딩 경험을 통합 설계하는 것이 전환율의 핵심 변수가 될 것이다.","source_name":"Google Korea 공식 블로그","source_url":"https://blog.google/intl/ko-kr/company-news/technology/2026-digital-ads-commerce-outlook-kr/"}],"international":[{"title":"Meta, 2026년 디지털 광고 매출 처음으로 Google 추월 전망","summary":"Meta가 2026년 글로벌 디지털 광고 매출에서 처음으로 Google을 추월할 것으로 전망됐다. Meta의 예상 매출은 2,435억 달러, Google은 2,395억 달러로 약 20년 만에 왕좌 교체가 예고됐다. AI 기반 광고 타겟팅과 릴스의 폭발적 성장이 Meta의 광고 경쟁력을 끌어올렸다는 분석이다.","insight":"Meta의 역전은 소셜·발견형 광고 채널의 구매 전환 효율이 검색 광고를 뛰어넘기 시작했음을 의미한다. 마케팅 채널 믹스 재검토 시 Meta 릴스 및 AI 기반 타겟팅 예산 비중 상향을 검토할 타이밍이다.","source_name":"Two Octobers","source_url":"https://twooctobers.com/blog/digital-marketing-updates-june-2026/"},{"title":"ChatGPT 광고 셀프서브 출시·AI 검색 월간 사용자 10억 명 돌파","summary":"ChatGPT가 최소 집행 금액 없는 셀프서브 광고 플랫폼을 출시하며 검색 광고 시장에 본격 진입했다. Google AI Mode는 월간 활성 사용자 10억 명을 돌파했고 AI Overviews는 25억 명에 달한다. 그러나 전통적 Google 상위 랭커와 AI Overview 인용 사이의 상관관계는 약 38%로 분리되고 있다.","insight":"검색 SEO와 AI 검색 최적화(AEO)가 완전히 별개의 전략으로 분기되고 있다. 콘텐츠 전략을 수립하는 PM이라면 AI 검색 인용 가능성을 높이는 구조화된 콘텐츠 설계(답변형, 출처 명시)를 별도로 준비해야 한다.","source_name":"B2The7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-june-2026-ai-search-chatgpt-ads-meta"},{"title":"마케터 75%, AI 생성 크리에이티브의 브랜드 동질화 우려 - Smartly 2026 보고서","summary":"Smartly의 2026 디지털 광고 트렌드 보고서에 따르면 마케터의 75%가 AI 생성 크리에이티브가 브랜드를 동질화할 위험을 우려하고 있다. 86%는 경쟁사와 유사한 AI 생성 광고를 이미 목격했다고 답했다. 반면 캠페인 런칭에 여전히 3~4주가 소요된다는 응답이 41%로 실행 속도와 품질 차별화 사이의 딜레마가 심화됐다.","insight":"AI 광고 자동화의 역설: 효율은 높아지지만 차별화는 줄어든다. PM 관점에서 AI 크리에이티브 도구 도입 시 브랜드 보이스 가이드라인과 인간 편집 레이어를 품질 게이트로 반드시 설계해야 한다.","source_name":"Smartly","source_url":"https://www.smartly.io/digital-advertising-trends/2026"}]},"economy":{"domestic":[{"title":"6월 소비자심리지수 106.6, 전월 대비 0.5p 상승","summary":"2026년 6월 소비자심리지수(CCSI)가 106.6을 기록하며 전월 대비 0.5포인트 상승했다. 100을 상회하는 수준으로 소비자들의 경기 판단이 장기 평균보다 낙관적임을 나타낸다. 다만 고유가와 환율 부담이 수입물가를 밀어올리고 있어 하반기 소비 심리 유지에 변수가 될 전망이다.","insight":"CCSI가 100을 웃도는 상황에서도 에너지·환율 리스크가 존재한다. B2C 서비스 PM이라면 소비자 가처분 소득 변화에 민감한 가격 정책 검토 시 이 두 변수를 동시에 모니터링해야 한다.","source_name":"한국은행","source_url":"https://www.bok.or.kr/portal/main/main.do"},{"title":"6월 제조업 BSI 101.2로 소폭 개선, 비제조업은 95.4로 하락","summary":"2026년 6월 기업심리지수(BSI)에서 제조업은 전월 대비 0.4p 상승한 101.2를 기록하며 기준선을 소폭 상회했다. 반면 비제조업은 전월 대비 2.1p 하락한 95.4를 기록해 서비스 업종의 경기 체감이 악화됐다. 제조업과 비제조업 간 온도 차이가 확대되며 업종별 차별화된 경영 전략이 요구되고 있다.","insight":"비제조업 BSI 하락은 B2B SaaS·서비스 기업의 기업 고객 예산 삭감 가능성을 시사한다. 하반기 영업 전략 수립 시 고객사 업종별 경기 체감 격차를 반영한 세분화된 접근이 필요하다.","source_name":"뱅크몰","source_url":"https://www.bank-mall.co.kr/plus/blog/12673"},{"title":"개인사업자대출 자금 사용처 사후점검 기준 6월 30일부터 시행","summary":"은행연합회와 여신금융협회 등이 개인사업자대출의 자금 사용처 사후점검 기준을 오늘(6월 30일)부터 시행한다. 대출 실행 후 실제 자금 사용 내역을 확인하는 절차가 강화되며 금융기관의 리스크 관리 부담이 증가한다. 소상공인·자영업자 대상 금융 서비스 설계 시 이 규제 변화를 반드시 반영해야 한다.","insight":"금융 규제 강화는 핀테크·SMB 금융 서비스 PM에게 직접적 제약이 된다. 대출 프로세스 내 자금 사용처 인증 UX를 설계하거나 모니터링 기능을 선제적으로 탑재해 규제 대응력을 갖추는 것이 중요하다.","source_name":"뱅크몰","source_url":"https://www.bank-mall.co.kr/plus/blog/12673"}],"international":[{"title":"연준, 6월 FOMC서 기준금리 3.5~3.75% 동결 결정","summary":"미국 연방준비제도이사회(Fed)가 6월 FOMC 회의에서 기준금리를 3.5~3.75%로 동결했다. 새 의장 Kevin Warsh는 물가 안정 의지를 재확인하며 인플레이션이 2% 목표 수준으로 돌아올 때까지 금리를 유지하겠다고 밝혔다. 2026년 말 기준금리 중간값 전망이 3.8%로 상향되며 연내 추가 인상 가능성도 열려 있다.","insight":"연준의 금리 동결 장기화는 글로벌 스타트업의 자금 조달 환경이 여전히 타이트함을 의미한다. 성장 지출 대비 수익성을 투자자에게 증명해야 하는 압박이 지속될 것으로, PM은 기능 우선순위를 성장보다 수익성 중심으로 재조정할 필요가 있다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/06/17/fed-interest-rate-decision-june-2026.html"},{"title":"중동 갈등·에너지 가격 상승으로 미국 인플레이션 2% 목표 달성 지연","summary":"중동 지역 분쟁으로 인한 에너지 가격 상승이 미국 물가를 연준 목표치(2%) 이상으로 유지시키는 주요 변수로 작용하고 있다. 공급 충격 기반의 인플레이션은 통화정책만으로 해결하기 어려워 금리 인상 압박이 커지고 있다. 시장은 2026년 하반기 추가 금리 인상 가능성을 상당 수준 반영하기 시작했다.","insight":"공급 측 인플레이션이 지속된다면 B2B SaaS의 계약 갱신 협상이나 B2C의 가격 인상 타이밍 결정이 중요해진다. 원가 상승분을 가격에 반영하는 시점과 방식을 선제적으로 기획해야 한다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"AI 투자 수익성 의구심에 나스닥 5% 급락, 빅테크 밸류에이션 재평가 국면","summary":"빅테크의 AI 인프라 투자가 실제 매출과 수익으로 이어지지 않는다는 투자자 불안이 커지며 나스닥이 약 5% 하락했다. 금리 인하 기대가 무너지고 할인율이 높아지면서 미래 현금흐름에 의존하는 기술주 밸류에이션이 직격탄을 맞았다. AI 투자 붐에 대한 거품 논쟁이 월가에서 본격화되고 있다.","insight":"AI 투자 회의론의 확산은 B2B AI 솔루션 판매 사이클에 영향을 미친다. 고객사의 AI 예산 승인이 까다로워질 수 있으므로 빠른 ROI 증명(90일 이내 측정 가능한 지표)을 세일즈 자료에 포함하는 전략이 필요하다.","source_name":"CBS News","source_url":"https://www.cbsnews.com/news/ai-bubble-tech-selloff-investment-consumer-business-demand/"}]},"summary":"AI 투자 거품 논쟁, 연준 금리 동결, Meta의 Google 광고 추월이 맞물리며 성장에서 효율과 수익성으로의 전환 압박이 IT·마케팅·경제 전 분야를 관통하는 하루"},"2026.07.01":{"date":"2026.07.01","it":{"domestic":[{"title":"매드업, 코스닥 상장 앞두고 청약 경쟁률 3305대 1 역대 최고 기록","summary":"글로벌 AI 마케팅 기업 매드업이 일반 청약에서 경쟁률 3305대 1, 청약증거금 약 6조 6000억원을 기록하며 올해 코스피·코스닥 통틀어 최고 기록을 세웠다. 매드업은 6월 26일 납입을 마치고 7월 1일 코스닥에 상장하며, 중기부·기보 주관 '2026년 유니콘브릿지' 사업에도 선정됐다.","insight":"AI 마케팅 솔루션 기업에 대한 시장 기대치가 최고조에 달했다는 신호로, 경쟁사 대비 차별화 포인트(자동화 효율·데이터 자산)를 명확히 제시하지 못하면 밸류에이션 거품 논란에 휘말릴 수 있다.","source_name":"서울경제","source_url":"https://www.sedaily.com/article/20059916"},{"title":"韓 이용자, 투자 판단·PPT 작성에 AI 적극 활용…글로벌 평균 웃돌아","summary":"국내 AI 서비스 이용자들은 자기소개서 작성(4.8%), 업무 완수(4.7%)에 이어 구매·투자 판단(4.4%), 발표자료 제작(3.5%) 순으로 AI를 활용하는 것으로 나타나 글로벌 평균보다 실무 밀착형 사용 비중이 높았다.","insight":"국내 사용자는 AI를 업무 의사결정에 직접 끌어들이고 있어, B2B SaaS라면 투자·기획 문서 자동화 기능을 우선순위 로드맵에 올릴 근거가 된다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260630170956"},{"title":"포털 AI 검색 올라탄 'K-엑사원'…줌, 정부 지원 AI 모델 첫 상용화","summary":"이스트에이드가 운영하는 포털 '줌'이 AI 검색 엔진을 LG AI연구원의 'K-엑사원'으로 교체했다. 정부 지원을 받는 국내 4대 파운데이션 모델 참여사 중 공공 지원 모델이 실제 소비자 서비스에 상용화된 첫 사례다.","insight":"자체 모델 없는 중소 플랫폼도 국산 파운데이션 모델을 API로 붙여 AI 검색을 구현할 수 있는 선례로, LLM 도입 시 자체 개발 대신 협업형 옵션도 비교 검토할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260629161613"}],"international":[{"title":"OpenAI, IPO 앞두고 거물급 인재 영입…정책 조직 신설","summary":"OpenAI가 IPO를 앞두고 구글 딥마인드 출신 연구자 노암 셰이저, 전 백악관 AI 정책 담당자 딘 볼 등을 영입했다. 볼은 'Strategic Futures'라는 신설 조직을 이끌며 프론티어 AI 정책 대응을 총괄한다.","insight":"상장 전 정책·규제 대응 조직을 별도로 세우는 것은 각국 AI 규제 강화에 선제 대응하려는 포석으로, 국내 AI 서비스도 글로벌 진출 시 정책 리스크를 초기부터 전담 관리할 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/18/openai-is-bringing-on-some-big-guns-in-the-lead-up-to-its-ipo/"},{"title":"\"AI 때문에 잘렸다\"…2026년 빅테크 감원 15만명 육박, 논쟁 격화","summary":"2026년 들어 AI를 이유로 든 테크 기업 감원이 약 363건, 15만명에 달해 지난해보다 44% 빠른 속도로 진행되고 있다. 반면 'AI 고도 도입 기업'은 오히려 헤드카운트가 10.2% 늘고 신입 채용도 12% 증가해 상반된 흐름이 공존한다.","insight":"'감원 vs 고용 확대'라는 상반된 지표가 동시에 나오는 것은 AI 도입 성숙도에 따라 조직 결과가 갈린다는 뜻으로, PM은 AI 도입을 인력 대체가 아닌 역량 재배치 관점에서 설계해야 대내외 반발을 줄일 수 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/29/the-ai-jobs-debate-just-got-messier/"},{"title":"알리바바 AI 영상모델, 소라·시댄스 주춤한 사이 글로벌 2위로 도약","summary":"OpenAI가 수익성 문제로 소라 서비스를 중단하고 바이트댄스도 저작권 이슈로 시댄스 2.0 해외 출시를 무기한 연기하면서, 알리바바 클라우드의 'HappyHorse 1.1'이 API 전면 개방과 함께 시장 공백을 메우고 있다.","insight":"선두주자의 법적·수익성 리스크가 후발주자에게 기회가 되는 사례로, 생성형 AI 기능을 제품에 붙일 때는 특정 모델 종속을 피하고 대체 공급사를 미리 확보해두는 게 안전하다.","source_name":"VentureBeat","source_url":"https://venturebeat.com/technology/alibabas-ai-video-model-rises-to-no-2-in-global-rankings-as-openais-sora-and-bytedances-seedance-fall-away"}]},"marketing":{"domestic":[{"title":"2026년 광고시장, 디지털 중심 재편 가속…온라인광고 비중 60% 돌파","summary":"코바코에 따르면 2025년 온라인광고가 전체 광고비의 약 60%를 차지한 데 이어 2026년에도 디지털 중심 구조재편이 가속화될 전망이다. 데이터 활용, 알고리즘 투명성, 광고 신뢰성이 핵심 과제로 부상하고 있다.","insight":"예산 배분이 이미 디지털로 기울어진 상황에서 차별화 지점은 '얼마나 쓰느냐'가 아니라 '알고리즘 투명성과 신뢰를 어떻게 증명하느냐'로 이동했으므로, 매체 성과 리포팅에 설명가능성 지표를 추가해야 한다.","source_name":"한국방송광고진흥공사(KOBACO)","source_url":"https://www.kobaco.co.kr/site/main/board/news/24646"},{"title":"나스미디어, \"2026년 인앱 전략·AI 에이전트 상용화가 핵심 변화\"","summary":"kt 나스미디어가 발표한 2026 전망 보고서는 인앱 전략과 경험 루프, AI 에이전트 상용화, 참여형 스트리밍 확대, 파트너십 광고 부상을 4대 트렌드로 제시했다.","insight":"AI 에이전트가 검색·구매를 대신 처리하는 흐름이 국내에도 본격화되는 신호로, 앱 내 전환 퍼널을 에이전트가 파싱하기 쉬운 구조(구조화 데이터, 명확한 CTA)로 재설계할 시점이다.","source_name":"kt 나스미디어","source_url":"https://www.nasmedia.co.kr/%EC%A0%95%EA%B8%B0%EB%B3%B4%EA%B3%A0%EC%84%9C/2025%EB%85%84-12%EC%9B%94-2026-%EB%94%94%EC%A7%80%ED%84%B8-%EB%AF%B8%EB%94%94%EC%96%B4-%EB%A7%88%EC%BC%80%ED%8C%85-%EC%A0%84%EB%A7%9D/"},{"title":"메조미디어, \"2026년 마케팅 4대 키워드는 AI마케팅·발견형커머스·OTT·DOOH\"","summary":"메조미디어는 2026년 주목할 트렌드로 AI 마케팅, 발견형 커머스, OTT, DOOH 4가지를 제시하며 광고·미디어 산업의 변화 방향을 전망했다.","insight":"'발견형 커머스'가 별도 키워드로 꼽힌 것은 검색 기반 구매에서 알고리즘 추천 기반 구매로 소비자 여정이 이동하고 있다는 뜻으로, SEO만큼 추천 피드 노출 전략에 투자를 늘려야 한다.","source_name":"메조미디어","source_url":"https://brunch.co.kr/@mezzomedia/162"}],"international":[{"title":"브랜드·에이전시, AI 활용 단계 \"왜\"에서 \"어떻게\"로 전환","summary":"마케팅다이브에 따르면 챗GPT 출시 3년이 지난 지금 브랜드와 에이전시들은 AI 도입 여부를 묻던 단계를 지나 실제 운영에 어떻게 녹일지를 고민하는 실행 단계로 넘어갔다.","insight":"실험 단계를 지나 실무 표준화 단계에 진입했다는 신호로, 아직 파일럿 수준에 머물러 있는 조직이라면 경쟁사 대비 실행 속도에서 뒤처지고 있다는 경고로 받아들여야 한다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/how-brands-agencies-are-operationalizing-ai-as-the-tech-matures/816241/"},{"title":"구글, AI 검색광고 대대적 업그레이드…'Ask Advisor' 연내 출시","summary":"구글이 마케팅 라이브 서밋에서 광고·커머스 신제품군을 공개하며, 구글애즈·애널리틱스·마케팅플랫폼·머천트센터 전반의 AI 에이전트를 하나의 진입점으로 통합하는 'Ask Advisor'를 연내 출시한다고 밝혔다.","insight":"광고주 워크플로우가 개별 툴에서 통합 AI 에이전트 인터페이스로 이동하면, 매체별 담당자 중심의 운영 조직 구조도 에이전트 오케스트레이션 중심으로 재편할 필요가 생긴다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/google-upgrades-ai-search-ads-what-marketers-need-to-know/820663/"},{"title":"OpenAI, 칸 라이언즈서 ChatGPT 광고 전략 공개…\"구매의도 높은 유저 20%\"","summary":"OpenAI는 칸 라이언즈 무대에서 ChatGPT 광고 사업 방향을 처음 공개하며, 챗GPT 내 질의의 약 20%가 직접적 구매 의도를 담고 있다고 밝혔다.","insight":"대화형 AI가 검색엔진 못지않은 구매 의도 트래픽을 확보했다는 의미로, 검색광고 예산의 일부를 대화형 AI 광고 채널로 조기에 테스트 배분해볼 근거가 생겼다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/how-openai-positioning-chatgpt-ads-cannes-lions-debut/823476/"}]},"economy":{"domestic":[{"title":"코스피 8%대 급락 7,400선…서킷브레이커 발동","summary":"미 5월 고용지표 호조로 연준의 연내 금리인상 전망이 부각되며 기술주가 급락했고, 미-이란 종전협상 교착과 호르무즈 해협 인근 무력충돌 우려까지 겹치며 코스피가 8% 넘게 급락해 서킷브레이커가 발동됐다.","insight":"지정학 리스크와 통화정책 불확실성이 동시에 겹치는 국면에서는 마케팅 예산도 분기 중 재편 가능성을 열어두고, 특히 환헤지 노출이 큰 브랜드는 캠페인 집행 시점을 유연하게 가져가야 한다.","source_name":"MBC 뉴스","source_url":"https://imnews.imbc.com/replay/2026/nw930/article/6828439_36996.html"},{"title":"코스피 6월 30일 8,540선 마감…코스닥 911선","summary":"6월 30일 코스피는 8,540.13에, 코스닥은 911.33에 장을 마쳤다.","insight":"지수 자체보다 변동성 확대 국면이라는 맥락이 중요하며, 금융·투자 버티컬 광고 캠페인은 리스크 문구·면책조항 검토를 강화할 시점이다.","source_name":"Investing.com","source_url":"https://kr.investing.com/indices/kospi"},{"title":"한국은행, 기준금리 2.5% 동결…환율·지정학 리스크 주시","summary":"한국은행 금융통화위원회는 달러 강세, 엔화 약세, 지정학 리스크, 해외투자 증가로 원달러 환율이 1,400원대 중후반까지 오른 상황에서 기준금리를 연 2.5%로 동결하고 당분간 흐름을 지켜보기로 했다.","insight":"고환율이 장기화되면 해외 SaaS·광고 플랫폼 결제 비용이 실질적으로 오르므로, 해외 매체·툴 계약이 많은 조직은 환헤지 또는 원화 결제 전환 협상을 검토할 필요가 있다.","source_name":"토스뱅크","source_url":"https://www.tossbank.com/articles/baserate2601"}],"international":[{"title":"美 연준, 6월 FOMC서 기준금리 3.50~3.75% 동결","summary":"연준은 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했다. 중동 분쟁발 불확실성에도 생산성·설비투자가 견조해 경기는 완만히 확장 중이나, 인플레이션은 목표치 2%를 웃돌고 있다고 진단했다.","insight":"고금리 장기화 시나리오가 유지되는 만큼, 해외 진출·투자 유치를 계획 중인 스타트업이라면 자금 조달 비용 상승을 전제로 한 시나리오 플랜을 준비해야 한다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"세계은행, 2026년 세계 성장률 전망 2.6%로 상향…\"2020년대 최악 저성장 10년\" 경고","summary":"세계은행은 2026년 세계 성장률 전망치를 기존 2.4%에서 2.6%로 상향 조정했다. 미국 경제의 예상 밖 호조가 상향의 3분의 2를 차지했지만, 이 추세가 지속돼도 2020년대는 1960년대 이후 가장 저성장한 10년이 될 것이라고 경고했다.","insight":"단기 상향 조정에도 구조적 저성장 기조는 바뀌지 않았다는 신호로, 신규 시장 진출 사업계획서에 낙관적 거시 가정을 넣기보다 저성장 시나리오를 기본값으로 두는 게 안전하다.","source_name":"World Bank","source_url":"https://www.worldbank.org/en/news/press-release/2026/01/13/global-economic-prospects-january-2026-press-release"},{"title":"연준, 6월 경제전망(SEP) 발표…금리인하 속도 두고 위원 간 이견 확인","summary":"연준이 6월 FOMC와 함께 공개한 경제전망요약(SEP)에서 위원들의 향후 금리 경로 전망(점도표)이 갈리며 인하 속도에 대한 이견이 드러났다.","insight":"통화정책 경로에 대한 불확실성이 큰 만큼, 환율·금리에 민감한 해외 마케팅 예산(미국 매체 집행 등)은 단일 시나리오가 아닌 레인지 기반으로 편성하는 게 리스크 관리에 유리하다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/monetarypolicy/fomcprojtabl20260617.htm"}]},"summary":"AI가 기업 채용·투자·광고 전략의 핵심 변수로 자리잡는 동시에, 중동發 지정학 리스크와 고환율·고금리가 실물경제 불확실성을 키우는 하루"},"2026.07.02":{"date":"2026.07.02","it":{"domestic":[{"title":"마스오토, 부산항서 자율주행 트럭 유상 운행 추진","summary":"대형트럭 자율주행 스타트업 마스오토가 2026년 3분기부터 부산항을 오가는 트레일러 자율주행 유상운송을 시작한다고 밝혔다. 차세대 자율주행 AI 모델 '마스넷3'와 상용차 코파일럿 서비스도 함께 공개했다.","insight":"물류 자율주행이 실증에서 유상 상용화 단계로 넘어가는 신호탄으로, 항만·물류 SaaS 로드맵에 자율주행 연동 시나리오를 지금부터 검토할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260701144447"},{"title":"AI 유니콘 '젠스파크', 한·일 엔터프라이즈 시장 정조준","summary":"창업 2년 만에 4억8500만달러 시리즈B를 유치하며 기업가치 26억달러를 인정받은 젠스파크가 검색·챗봇을 넘어 실제 업무 결과물을 만드는 'AI 워크스페이스'로 한국·일본 엔터프라이즈 시장 공략에 나섰다.","insight":"챗봇형 AI에서 '결과물 생성형' AI로 경쟁 축이 이동하고 있다는 뜻이며, B2B SaaS PM이라면 자사 제품의 산출물(output) 관점 재정의가 필요한 시점이다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260629090344"},{"title":"슈나이더일렉트릭, 31억달러 투자로 산업용 AI 플랫폼 확장","summary":"인프라 강자 슈나이더일렉트릭이 31억달러를 투입해 산업 현장에 특화된 AI 플랫폼 사업을 확대한다고 발표했다. 제조·에너지 등 산업 현장의 AI 적용이 본격화되는 흐름을 보여준다.","insight":"소비자용 AI를 넘어 '산업 AI(Industrial AI)'가 다음 투자 격전지로 부상하고 있어, B2B 프로덕트팀은 도메인 특화 데이터·워크플로 통합 역량을 우선순위로 둬야 한다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260701111630"}],"international":[{"title":"AI 반도체 스타트업 세레브라스, 나스닥 상장 첫날 68% 급등","summary":"AI 칩 제조사 세레브라스시스템즈가 나스닥 상장 첫날 공모가 185달러 대비 68% 급등하며 스노우플레이크 이후 최대 규모 미국 테크 IPO로 평가받았다. 회사 측은 웨이퍼 스케일 엔진 기술력을 앞세워 아마존·OpenAI와의 협력을 확대하고 있다.","insight":"AI 인프라 기업에 대한 자본시장 신뢰가 여전히 견고하다는 신호로, 국내 반도체·AI 인프라 스타트업의 IPO/투자 유치 타이밍 벤치마크로 참고할 만하다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/05/14/cerebras-cbrs-stock-trade-nasdaq-ipo.html"},{"title":"깃랩, AI 워크로드 대응 위해 인력 14% 감축","summary":"깃랩이 AI 에이전트 트래픽 급증에 대응해 인프라를 재설계하면서 전체 인력의 14%(약 350명)를 감축하고 22개국에서 철수한다고 발표했다. 절감 재원은 AI 인프라·오케스트레이션 도구 투자에 투입된다.","insight":"'수익 성장 + AI 명분 구조조정'이 동시에 벌어지는 패턴이 빅테크를 넘어 중견 SaaS까지 확산되고 있어, 조직 설계 시 AI 에이전트가 대체 가능한 업무를 미리 식별해두는 것이 리스크 관리 차원에서 유효하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/03/gitlab-cuts-14-of-staff-as-it-scales-its-platform-to-serve-ai-workloads/"},{"title":"구글, AI 디자인 앱 '픽스' 출시…캔바 정조준","summary":"구글이 I/O 2026에서 텍스트 프롬프트만으로 이미지·마케팅 소재를 생성하는 AI 디자인 툴 '픽스(Pics)'를 공개했다. 나노바나나2 모델 기반으로 부분 편집, 텍스트 삽입, 협업 캔버스 기능을 지원한다.","insight":"디자인 툴 시장에 빅테크가 직접 뛰어들며 캔바·미리캔버스 등 기존 플레이어의 해자가 얕아지고 있어, 마케팅팀은 사내 제작 워크플로에 AI 디자인 도구 도입을 전제로 리소스 계획을 다시 짜야 한다.","source_name":"PCWorld","source_url":"https://www.pcworld.com/article/3143834/look-out-canva-google-pics-ai-editing-is-scary-good.html"}]},"marketing":{"domestic":[{"title":"나스미디어, 2026년 마케팅 키워드로 'AI 에이전트 상용화' 제시","summary":"나스미디어가 발간한 '2026 디지털 미디어&마케팅 전망' 보고서에서 이용자 의도를 이해해 탐색·구매를 대신 수행하는 AI 에이전트의 상용화를 핵심 트렌드로 꼽았다.","insight":"검색-비교-구매의 퍼널이 에이전트에게 위임되는 시대엔 브랜드가 '사람'이 아닌 '에이전트'를 설득 대상으로 삼는 콘텐츠·데이터 구조 설계가 필요해진다.","source_name":"kt 나스미디어","source_url":"https://blog.nasmedia.co.kr/entry/202512-2026trendforecasting-2"},{"title":"오픈애즈, '2026 AI마케팅트렌드 7대 키워드' 공개","summary":"마케팅 큐레이션 플랫폼 오픈애즈가 생성형 AI를 활용한 콘텐츠 제작부터 초개인화 추천까지 2026년 국내 마케터가 주목해야 할 7가지 AI 마케팅 키워드를 정리해 발표했다.","insight":"트렌드 리포트가 '활용 여부'에서 '실행 체계화(운영 프로세스)'로 논조가 옮겨가고 있어, 마케팅 조직은 개별 AI 툴 도입보다 워크플로 표준화에 투자 우선순위를 둬야 한다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=17922"},{"title":"네이버·카카오, AI 초개인화 추천으로 커머스 경험 재설계","summary":"네이버는 검색·구매·행동 데이터를 AI로 통합 분석해 상품·혜택·테마까지 맞춤 구성하는 초개인화 쇼핑홈을 확대하고 있으며, 국내 기업들의 AI 개인화 마케팅 도입이 본격화되고 있다.","insight":"개인화 마케팅 도입 기업의 매출 성장률이 평균을 웃돈다는 점에서, 1st party 데이터 파이프라인이 갖춰지지 않은 상태로 AI 개인화부터 도입하는 것은 순서가 잘못된 투자다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026041362601"}],"international":[{"title":"옴니콤, 아디다스 5억1200만달러 글로벌 미디어 계정 수주","summary":"옴니콤미디어그룹이 8년간 WPP가 맡아온 아디다스의 글로벌 미디어 계정(약 5억1200만달러 규모)을 3파전 경쟁 끝에 따냈다. 계정은 산하 에이전시 PHD가 총괄한다.","insight":"대형 광고주의 에이전시 이동이 여전히 활발하다는 것은 '관계' 중심 영업만으로는 방어가 안 된다는 뜻이며, 미디어 대행 계약 갱신 주기가 임박한 브랜드는 지금부터 경쟁 피칭 대비 리뷰 기준을 점검해야 한다.","source_name":"Adweek","source_url":"https://www.adweek.com/agencies/exclusive-omnicom-to-win-adidas-512m-global-media-account/"},{"title":"2026년 마케팅 트렌드, AI 인프라화·라이브커머스 확산","summary":"마케팅다이브가 발표한 2026 업계 전망에 따르면 생성형 AI가 마케팅의 '핵심 인프라'로 자리잡고, 스트리밍 스포츠 시청자의 절반이 실시간 구매가 가능한 라이브커머스 환경으로 이동할 전망이다.","insight":"AI 마케팅 예산이 2025년 473억달러에서 2028년 1070억달러로 늘어난다는 전망은 '효율화'에서 '성과 개선'으로 투자 목적이 바뀌고 있다는 신호이며, KPI 설계도 비용절감형에서 매출기여형으로 재편해야 한다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/marketing-trends-outlook-2026/810740/"},{"title":"아마존, 2026년 5대 마케팅 트렌드로 AI 검색·발견형 커머스 제시","summary":"아마존 광고가 발표한 2026년 마케팅 트렌드 보고서에서 ChatGPT·Perplexity 등 AI 어시스턴트가 기존 검색엔진 결과창(SERP)의 영향력을 대체하는 흐름을 핵심 변화로 꼽았다.","insight":"SEO 예산의 상당 부분이 'AI 요약에 인용되기 위한 최적화(AEO/GEO)'로 이동해야 하는 시점이며, 트래픽 지표만으로 마케팅 성과를 판단하는 대시보드는 이미 낡은 지표 체계다.","source_name":"Amazon Ads","source_url":"https://advertising.amazon.com/library/news/marketing-trends-2026"}]},"economy":{"domestic":[{"title":"코스피, 반도체 강세에 사상 첫 8600선 돌파","summary":"코스피가 삼성전자·SK하이닉스 등 반도체 대형주 강세에 힘입어 장중 8600선을 돌파하며 사상 최고치를 새로 썼다. 다만 두 종목의 시총 비중이 50%에 달해 쏠림 우려도 커지고 있다.","insight":"지수 상승이 반도체 2종목에 극도로 집중된 구간에서는 '코스피 강세=전 산업 호황'으로 해석하면 안 되며, 비반도체 업종의 실적 체력을 별도로 점검해야 한다.","source_name":"헤럴드경제","source_url":"https://biz.heraldcorp.com/article/10760540"},{"title":"엔화 39년 만에 최저치…원화도 1540원대 동반 압박","summary":"엔화 가치가 도쿄 외환시장에서 달러당 162엔대까지 떨어지며 1986년 12월 이후 최저 수준을 기록했다. 원화는 엔화와 동조화 경향으로 1540원대까지 밀리며 이중 압박을 받고 있다.","insight":"원자재 수입 비중이 높은 사업(물류, 제조 SaaS 등)은 환율 리스크를 3개월 내 헤지 전략 검토 대상으로 올려야 하며, 일본 대비 가격 경쟁력이 필요한 수출형 서비스는 단기 마진 방어 계획이 필요하다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026063074451"},{"title":"AI 반도체가 쓴 수출 신기록…짙어지는 고환율 그림자","summary":"6월 반도체 수출이 전년 대비 199.5% 급증한 448억달러를 기록하며 월간 수출 1000억달러를 처음 돌파했다. 다만 고환율이 수입 물가 부담을 키우는 이중적 상황이 이어지고 있다.","insight":"수출 호조의 과실이 반도체 업종에 편중돼 있어, 내수·중소 마케팅 예산은 오히려 고환율發 원가 압박으로 위축될 가능성이 크다는 점을 시나리오 플래닝에 반영해야 한다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260701000979"}],"international":[{"title":"세계은행, 2026년 세계 성장률 전망 2.5%로 하향","summary":"세계은행이 중동 분쟁에 따른 에너지가 급등과 인플레이션 우려를 반영해 2026년 세계 경제 성장률 전망치를 2.5%로 낮췄다. 에너지 공급 차질이 심화되면 성장률이 1.3%까지 떨어질 수 있다고 경고했다.","insight":"글로벌 매크로 불확실성이 커지는 국면에서는 해외 진출·글로벌 마케팅 예산 집행을 분기 단위로 쪼개 재검토 가능한 구조로 설계하는 것이 안전하다.","source_name":"World Bank / Investing.com","source_url":"https://www.investing.com/news/economy-news/world-bank-lowers-2026-global-growth-forecast-to-25-4737603"},{"title":"연준, 6월 FOMC서 기준금리 3.50~3.75% 동결…워시 의장 첫 회의","summary":"연방준비제도가 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했다. 케빈 워시 신임 의장의 첫 회의였으며, 4월 회의의 이견과 달리 만장일치 결정이었다.","insight":"7월 FOMC(7/28~29)에서도 동결 확률이 79%대로 우세해 당분간 고금리 환경이 이어질 전망이므로, 마케팅 예산 승인 과정에서 '금리 인하 기대'를 전제로 한 공격적 투자 제안은 리스크가 크다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"스페이스X 상장 첫날 19% 급등…시총 2조달러 돌파","summary":"스페이스X가 나스닥 상장 첫날 주가가 19% 급등하며 시가총액 2조1000억달러를 기록했다. 일론 머스크는 사상 첫 '조만장자' 반열에 올랐다.","insight":"메가캡 비상장사들의 잇단 IPO 러시(스페이스X·세레브라스·앤스로픽·오픈AI 등)는 2026년 하반기 자본시장 유동성이 AI·우주 등 소수 테마에 쏠릴 가능성을 시사하며, 이는 다른 산업의 벤처 자금 조달 난이도를 높일 수 있다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/06/12/spacex-stock-jumps-2-trillion.html"}]},"summary":"AI가 산업 인프라(반도체·클라우드·마케팅 자동화)로 깊숙이 자리잡는 동시에, 고환율·성장둔화·구조조정이라는 거시 리스크가 동시에 커지는 하루"},"2026.07.03":{"date":"2026.07.03","it":{"domestic":[{"title":"과기정통부, 2030년까지 100큐비트 양자프로세서 실증 목표 제시","summary":"과학기술정보통신부가 서울에서 공청회를 열고 2026~2030년 2차 국가 R&D 투자전략을 발표했다. 4대 전략과 8대 핵심 과제를 통해 2030년까지 AI 3강, 과학기술 5강 진입을 목표로 100큐비트 양자프로세서 실증, 자율주행 레벨4 상용화 등을 추진한다.","insight":"정부 R&D 로드맵은 향후 정부 과제 공모·지원사업 방향을 예고하므로, B2G 협업이나 정부 지원사업을 노리는 스타트업은 8대 핵심 과제 목록을 미리 체크해 둘 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260702190521"},{"title":"삼성 파운드리, AI 시대 '넥서스' 선언…2나노·HBM4로 생태계 주도","summary":"삼성 파운드리가 2나노 공정과 HBM4를 앞세워 AI 반도체 생태계 주도권 확보에 나섰다. SF2P·SF2P+·SF2X 등 2나노 공정을 단계적으로 고도화하고, HBM4 베이스다이를 4나노 공정으로 개발해 초당 10Gbps 이상 신호 검증을 완료했다.","insight":"AI 서비스 기획자 입장에서는 온디바이스 AI·저지연 추론 제품의 하드웨어 제약이 완화되는 시점을 파운드리 로드맵 기준으로 역산해 로드맵에 반영할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260701114115"},{"title":"SK하이닉스, 청주에 100조원 투자…NAND·패키징 신공장 건설","summary":"SK하이닉스가 청주에 100조원을 투자해 M17 낸드 공장(80조원)과 첨단 패키징 시설 P&T7(20조원)을 짓는다고 발표했다. 신공장은 2029년 상반기 가동을 목표로 한다.","insight":"메모리 대규모 증설은 중장기 공급 확대 신호로, AI 인프라 원가에 민감한 서비스(추론 비용 최적화)를 운영하는 조직은 2029년 전후 메모리 단가 하락 가능성을 비용 계획에 반영할 만하다.","source_name":"TrendForce","source_url":"https://www.trendforce.com/news/2026/07/02/news-sk-hynix-unveils-krw-100t-cheongju-investment-including-krw-80t-for-new-nand-fab-targeting-1h29-operations/"}],"international":[{"title":"OpenAI, 미국 정부에 지분 5% 기부 제안","summary":"OpenAI가 자사 지분 5%를 미국 국부펀드에 기부하는 방안을 검토 중이라고 파이낸셜타임스가 보도했다. 최근 기업가치 8,520억 달러 기준 약 426억 달러 규모로, 트럼프 행정부와의 관계 개선 및 정치적 반발 완화가 목적이다.","insight":"빅테크의 정부 지분 제공이 업계 표준처럼 확산될 경우, 국내 AI 기업의 해외 진출·정부 조달 전략에도 '이해관계자 지분 공유' 모델이 벤치마크로 언급될 가능성이 있어 사전 모니터링이 필요하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/openai-proposed-donating-5-of-its-equity-to-a-us-sovereign-wealth-fund/"},{"title":"메타, 스페이스X 모델 따라 잉여 AI 컴퓨팅 자원 현금화 추진","summary":"메타가 CoreWeave식 사업모델을 참고해 AI 컴퓨팅 인프라를 외부에 판매하는 클라우드 사업을 검토 중이다. 자체 폐쇄형 모델 '뮤즈 스파크'를 호스팅해 AWS처럼 모델 접근권도 판매할 계획이다.","insight":"빅테크가 자사 AI 인프라를 외부 판매로 전환하는 흐름은 중소 AI 서비스 기업의 GPU 확보 옵션이 늘어난다는 뜻이므로, 인프라 벤더 다변화 전략을 재검토할 시점이다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/01/meta-like-spacex-looks-to-turn-excess-ai-compute-into-cash/"},{"title":"2026년 AI발 테크 감원 현황, GitLab 등 잇따라 인력 축소","summary":"GitLab이 AI 인프라 투자 재원 마련과 에이전틱 워크로드 급증 대응을 이유로 전체 인력의 14%(약 350명)를 감원했다. TechCrunch는 2026년 'AI를 이유로 든 테크 감원' 사례를 추적 정리하고 있다.","insight":"AI 인프라 투자 확대와 인력 감축이 동시에 발생하는 패턴이 반복되고 있어, PM은 조직 내 AI 도입 논의 시 '효율화=인력 대체'라는 프레이밍이 구성원 저항을 부를 수 있음을 커뮤니케이션 설계에 반영해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/22/the-running-list-major-tech-layoffs-in-2026-where-employers-cited-ai/"}]},"marketing":{"domestic":[{"title":"2026년 7월 마케팅 캘린더, 제헌절 공휴일 지정에 여름 시즌 마케팅 주목","summary":"2026년부터 제헌절이 법정 공휴일로 재지정되며 7월 마케팅 캘린더에 변수로 등장했다. 나스미디어는 7월 개봉 기대작과 여름 성수기 프로모션 타이밍을 정리해 안내했다.","insight":"공휴일 지정처럼 캘린더 변수가 바뀌는 해에는 프로모션·CRM 발송 타이밍을 전년도 데이터 그대로 재사용하면 안 되고, 매년 캘린더를 다시 검증하는 프로세스를 마케팅 운영에 넣어야 한다.","source_name":"kt나스미디어 블로그","source_url":"https://blog.nasmedia.co.kr/entry/202607-marketing-calendar"},{"title":"오픈애즈, 2026 글로벌 마케팅 트렌드 세미나 콘텐츠 총정리","summary":"오픈애즈가 AI 마케팅, 발견형 커머스 등 2026년 주요 마케팅 트렌드를 다룬 세미나·콘텐츠를 큐레이션해 공개했다. AI를 활용하는 마케터는 늘었지만 실제 성과로 연결하는 비율은 낮다는 조사 결과도 함께 소개됐다.","insight":"'AI 활용률 75% vs 성과창출률 13%' 격차는 툴 도입보다 워크플로 재설계가 병목임을 시사하며, 마케팅 조직은 AI 툴 도입 KPI를 '사용 여부'가 아닌 '성과 지표'로 재설정해야 한다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"},{"title":"2026년 주목해야 할 '기만적 광고' 이슈들","summary":"매드타임스가 2026년 다크패턴, 허위·과장 광고 등 소비자 신뢰를 저해하는 기만적 광고 이슈를 정리해 보도했다. 규제 강화 흐름 속 광고 신뢰성과 투명성이 핵심 화두로 부상하고 있다.","insight":"다크패턴 규제는 국내에서도 점차 강화되는 추세이므로, 그로스 마케팅 팀은 전환율 최적화(CRO) 실험 설계 시 규제 리스크가 있는 UX 패턴(허위 긴급성, 숨겨진 요금 등)을 사전 스크리닝하는 체크리스트가 필요하다.","source_name":"매드타임스(MADTimes)","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=26362"}],"international":[{"title":"메타, 스포츠 스트리밍 중계권에 수십억 달러 투자 준비","summary":"메타가 스포츠 스트리밍 중계권 확보에 수십억 달러를 투자할 준비를 하고 있다고 보도됐다. 페이스북·인스타그램의 라이브 콘텐츠 경쟁력 강화를 위한 행보로 해석된다.","insight":"빅테크의 스포츠 중계권 진출은 광고주 입장에서 새로운 프리미엄 인벤토리 등장을 의미하므로, 스포츠·이벤트 마케팅 예산을 운용하는 브랜드는 초기 입찰 단가와 타겟팅 옵션을 조기에 파악해두는 것이 유리하다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/report-facebook-is-ready-to-invest-billions-in-sports-streaming-rights/512266/"},{"title":"글로벌 광고·마케팅·미디어 업계, 7월 2일 주요 뉴스 총정리","summary":"bestmediainfo가 브랜드 캠페인, 미디어 파트너십, 플랫폼 광고 상품 업데이트 등 7월 2일자 광고·마케팅·미디어 업계 헤드라인을 종합 정리했다.","insight":"업계 종합 헤드라인은 개별 플랫폼 공지보다 먼저 트렌드 전환점을 포착하는 데 유용하므로, 주간 경쟁사 모니터링 루틴에 이런 큐레이션 매체를 정기 소스로 포함시킬 가치가 있다.","source_name":"bestmediainfo","source_url":"https://bestmediainfo.com/mediainfo/advertising/top-advertising-marketing-and-media-news-headlines-of-today-july-2-2026-12125422"},{"title":"마케팅 테크놀로지·AI 분야 7월 2일자 주요 뉴스","summary":"The Agile Brand Guide가 마케팅 테크놀로지 및 AI 관련 최신 소식을 일일 단위로 정리해 공개했다. AI가 마케팅 인프라의 핵심으로 자리잡는 흐름이 이어지고 있다.","insight":"마테크 스택 도입 속도가 빨라질수록 벤더 록인 리스크도 커지므로, 신규 AI 마케팅 툴 도입 전 데이터 이식성(export 가능 여부)을 계약 조건에 명시하는 습관이 필요하다.","source_name":"The Agile Brand Guide","source_url":"https://agilebrandguide.com/yesterdays-marketing-technology-ai-news-july-2-2026/"}]},"economy":{"domestic":[{"title":"코스피, 2%대 하락하며 8,300선 마감…환율 1,554.9원 연일 최고치","summary":"코스피 지수가 전일 대비 173.07포인트(2.04%) 하락한 8,303.41로 마감했다. 뉴욕증시 훈풍에 상승 출발했으나 삼성전자·SK하이닉스 등 반도체주 약세와 외국인 매도세에 밀렸고, 원/달러 환율은 1,554.9원으로 연일 연고점을 경신했다.","insight":"반도체 대형주 쏠림이 큰 코스피 특성상 지수 변동성이 곧 원자재·환율 리스크로 전이되므로, 국내 기업의 해외 조달·수출 단가 계획을 세울 때 환율 급등 시나리오를 별도 스트레스 테스트에 반영해야 한다.","source_name":"MBC뉴스","source_url":"https://imnews.imbc.com/news/2026/econo/article/6834263_36932.html"},{"title":"시총 1위 내주고 하락 전환한 삼성전자…코스피 고점 신호?","summary":"삼성전자가 시가총액 1위 자리를 내주며 하락 전환해 코스피 전체가 고점을 찍은 것 아니냐는 우려가 제기됐다. 반도체 업종 쏠림에 대한 경계감이 커지는 분위기다.","insight":"단일 종목·업종 의존도가 높은 지수의 '고점 논쟁'은 반도체 업황 사이클과 직결되므로, 반도체 연동성이 높은 산업(디스플레이·장비·소재 스타트업)은 투자 유치 타이밍을 지수 흐름과 별개로, 자사 펀더멘털 지표로 판단해야 한다.","source_name":"MBC뉴스","source_url":"https://imnews.imbc.com/replay/2026/nwdesk/article/6832027_37004.html"},{"title":"하루 새 910포인트 폭락한 코스피…반도체 반등 가능할까","summary":"코스피가 하루 만에 910포인트 폭락하며 역대급 낙폭을 기록했다. 미국발 금리 인상 가능성과 빅테크 과잉투자 우려가 겹치며 반도체주 급락이 지수 하락을 주도했다.","insight":"미국 금리·빅테크 실적 발표 일정은 국내 반도체 밸류체인 기업 실적 발표 및 자금 조달 타이밍과 겹치지 않도록 사전에 캘린더링해 변동성 노출을 줄이는 것이 리스크 관리 관점에서 유효하다.","source_name":"MBC뉴스","source_url":"https://imnews.imbc.com/replay/2026/nwdesk/article/6832331_37004.html"}],"international":[{"title":"마이크로소프트·메타·구글 실적 발표로 AI 투자 회의론 잠재워…빅테크 설비투자 7,250억 달러","summary":"마이크로소프트, 메타, 구글이 한 실적 발표일에 나란히 견조한 실적을 내놓으며 AI 과잉투자 우려를 일축했다. 빅테크 합산 설비투자(capex)는 7,250억 달러로 불어났다.","insight":"빅테크 capex 확대가 실적으로 뒷받침된다는 신호는 AI 인프라 관련 국내 벤더(데이터센터, 전력, 냉각 솔루션)의 중장기 수주 파이프라인이 견조하게 유지될 근거로 활용할 수 있다.","source_name":"Stocktwits","source_url":"https://stocktwits.com/news-articles/markets/equity/microsoft-meta-and-google-just-silenced-ai-spending-critics-in-one-earnings-night-as-big-tech-capex-swells-to-725-b/cZBtCIgReEx"},{"title":"연준, 6월 FOMC서 기준금리 3.50~3.75% 동결","summary":"연방준비제도가 6월 FOMC 회의에서 기준금리를 3.50~3.75%로 동결했다. 중동發 공급 충격으로 인플레이션이 목표치 2%를 웃도는 가운데, 경제활동은 견조한 생산성·투자 증가에 힘입어 확장세를 이어가고 있다고 평가했다.","insight":"'higher-for-longer' 기조가 재확인된 만큼, 해외 진출·달러 표시 비용이 있는 기업은 고금리 장기화를 전제로 한 자금조달 계획(변동금리 노출 축소)을 다시 점검할 시점이다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"달러화 방향성 불투명, 엔화는 162엔대 후반 등락","summary":"Saxo Bank의 7월 2일 마켓 브리핑에 따르면 달러화는 뚜렷한 방향성 없이 유로/달러는 1.400 아래, 달러/엔은 1980년대 이후 최고치인 162.84엔을 찍은 뒤 162.35엔대로 되돌림했다.","insight":"엔화 약세가 구조적으로 지속되는 국면에서는 일본향 수출입 계약의 환헤지 비율을 재산정하고, 일본 관광·역직구 채널을 운영하는 커머스팀은 가격 경쟁력 변화를 반영한 프로모션 전략을 검토해야 한다.","source_name":"Saxo Bank","source_url":"https://www.home.saxo/content/articles/macro/market-quick-take---2-july-2026-02072026"}]},"summary":"반도체 대형 투자와 AI 인프라 확장이 이어지는 한편, 반도체주 급락발 코스피 변동성과 연준의 고금리 장기화 기조가 겹치며 'AI 투자 확대'와 '금융시장 리스크'가 동시에 진행되는 하루였다."},"2026.07.04":{"date":"2026.07.04","it":{"domestic":[{"title":"스페이스X, 아이폰보다 얇은 AI폰 프로토타입 공개","summary":"월스트리트저널(WSJ) 보도에 따르면 스페이스X가 IPO를 앞두고 자체 운영체제와 퀄컴 스냅드래곤 칩셋, xAI 기술을 탑재한 AI 스마트폰 프로토타입을 공개했다. 두께는 아이폰보다 얇고 디자인은 더 세련됐다는 평가를 받았다.","insight":"하드웨어·OS·AI 모델을 수직 통합한 신규 플레이어의 등장은 기존 스마트폰 UX 표준을 흔들 수 있어, 모바일 프로덕트팀은 AI 네이티브 인터페이스 설계 트렌드를 선제적으로 모니터링해야 한다.","source_name":"네이트뉴스(WSJ 인용)","source_url":"https://news.nate.com/view/20260703n08873"},{"title":"\"AI 역량 중요한 건 알겠는데, 평가는 어떻게 하죠?\"","summary":"기업들이 AI 도입 필요성에는 공감하면서도 조직 구성원의 AI 역량을 어떻게 측정·평가할지에 대한 기준 부재로 어려움을 겪고 있다는 진단이 나왔다. 표준화된 AI 역량 평가 체계 마련이 시급하다는 지적이다.","insight":"PM은 AI 활용도를 채용·성과평가 지표에 반영하기 전에 조직 차원의 역량 정의와 측정 기준부터 합의해야 내부 갈등을 줄일 수 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260617164615"},{"title":"AI 반도체 수요 둔화 신호?…\"사이클 변화는 아니다\"","summary":"메타의 클라우드 사업 검토 소식에 반도체주가 출렁이며 AI 수요 둔화 우려가 제기됐다. 그러나 전문가들은 빅테크의 GPU 투자 회수 방식이 재판매 모델로 바뀌는 것일 뿐 AI 투자 사이클 자체의 변화는 아니라고 진단했다.","insight":"AI 인프라 투자가 '직접 구축'에서 '재판매·공유' 모델로 이동 중이라는 신호로, 자체 GPU 확보 전략을 세운 기업이라면 리스크 분산 관점에서 재검토할 시점이다.","source_name":"한국일보(미주)","source_url":"http://www.koreatimes.com/article/20260702/1619929"}],"international":[{"title":"메타, 잉여 AI 컴퓨팅 자산화 나선다","summary":"메타가 스페이스X(xAI)에 이어 남는 AI 컴퓨팅 자원을 외부 기업에 판매하는 클라우드 사업을 검토 중이다. 올해 최대 1,450억 달러에 달할 것으로 예상되는 AI 인프라 투자 부담을 상쇄하려는 전략으로 풀이된다.","insight":"빅테크가 자체 소비를 넘어 컴퓨팅을 상품화하는 흐름은 중소 AI 스타트업에는 저비용 인프라 접근 기회가 될 수 있어, B2B SaaS PM은 GPU 조달 비용 구조 변화를 원가 전략에 반영해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/01/meta-like-spacex-looks-to-turn-excess-ai-compute-into-cash/"},{"title":"저커버그 \"AI 에이전트 발전, 기대만큼 못 미쳐\"","summary":"마크 저커버그 메타 CEO가 사내 타운홀에서 AI 에이전트 기술의 발전 속도가 경영진 기대에 못 미치고 있다고 밝혔다. 막대한 투자에도 불구하고 상용화 성과가 더디다는 내부 평가다.","insight":"빅테크 리더조차 에이전트 기술의 ROI 실현 시점을 재조정하고 있다는 신호로, 에이전틱 AI 기능을 로드맵 상단에 둔 프로덕트팀은 출시 타임라인과 기대 수준을 보수적으로 재점검할 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/mark-zuckerberg-tells-staff-that-ai-agents-havent-progressed-as-quickly-as-hed-hoped/"},{"title":"앤트로픽, 수출규제 해제 후 클로드 페이블 5 글로벌 재출시","summary":"미국의 수출 통제 조치가 해제되면서 앤트로픽이 최상위 모델 클로드 페이블 5를 전 세계 사용자에게 다시 제공하기 시작했다. 국가 안보 심사 절차가 최신 프론티어 모델의 출시 방식 자체를 바꾸고 있다는 분석도 나온다.","insight":"프론티어 모델 접근성이 정치·안보 이슈에 좌우되는 시대로 접어든 만큼, 글로벌 서비스를 운영하는 PM은 특정 리전의 모델 가용성 변동에 대비한 멀티모델·폴백 전략을 마련해야 한다.","source_name":"VentureBeat","source_url":"https://venturebeat.com/technology/anthropic-is-bringing-back-claude-fable-5-globally-after-us-lifts-export-control-order-where-can-enterprises-access-it"}]},"marketing":{"domestic":[{"title":"2026 글로벌 마케팅 트렌드 세미나 총정리","summary":"오픈애즈가 2026년 주목해야 할 글로벌 마케팅 트렌드를 다룬 주요 세미나 내용을 정리해 공개했다. AI 마케팅 확산과 개인화 경험이 핵심 화두로 제시됐다.","insight":"트렌드 리포트를 그대로 벤치마킹하기보다, 자사 고객 세그먼트에 실제 적용 가능한 트렌드만 골라 분기 단위 실험 백로그로 전환하는 것이 실무적으로 유효하다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"},{"title":"2026년 꼭 알아야 할 마케팅 트렌드 10","summary":"오픈애즈가 초개인화, 에이전틱 AI, 라이브커머스 등 2026년 마케터가 챙겨야 할 10가지 트렌드를 선정해 소개했다. AI를 활용하는 마케터는 75%에 달하지만 실제 성과를 내는 비율은 13%에 그친다는 조사 결과도 짚었다.","insight":"'AI 도입률'과 '성과 전환율'의 큰 격차는 툴 도입이 아닌 워크플로 재설계 부족이 원인일 가능성이 높아, 마케팅 PM은 AI 도구 도입 전 업무 프로세스 재설계를 선행 과제로 삼아야 한다.","source_name":"오픈애즈","source_url":"https://openads.co.kr/content/contentDetail?contsId=18383"},{"title":"2026년 6월 12일 데일리 마케팅 트렌드","summary":"가비아CNS 마케팅센터가 최신 디지털 마케팅 트렌드와 캠페인 사례를 정리한 데일리 브리핑을 발행했다. 실무자를 위한 짧은 형태의 트렌드 큐레이션이 특징이다.","insight":"실무팀이 매일 트렌드를 좇기보다, 이런 큐레이션 소스를 주 1회 스크리닝해 자사 캠페인 캘린더에 반영할 인사이트만 선별하는 프로세스를 갖추는 것이 효율적이다.","source_name":"가비아CNS 마케팅센터","source_url":"https://m.diad.co.kr/Customer/NoticeView?idx=5211"}],"international":[{"title":"칸 라이언즈 뒤덮은 '에이전틱 광고', 아마존은 알렉사 강점 부각","summary":"칸 라이언즈 현장이 에이전틱 광고 화두로 뒤덮인 가운데 아마존이 알렉사 기반 광고 경쟁력을 강조했다. 파파존스 등 초기 파트너사들이 에코쇼 기기에서 '알렉사+ 에이전틱 광고'를 베타 테스트하고 있다.","insight":"음성·대화형 인터페이스 광고는 클릭이 아닌 '대화 완결'이 전환 지표가 되므로, 퍼포먼스 마케팅팀은 기존 CTR·CVR 중심 KPI 체계를 대화형 채널에 맞게 별도 설계해야 한다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/as-agentic-advertising-floods-cannes-amazon-touts-its-alexa-advantage/823730/"},{"title":"인스타카트, 영상·AI로 풀퍼널 마케팅 강화","summary":"인스타카트가 숏폼 세로형 영상 피드를 새로 도입하고 자사 AI 어시스턴트에 광고를 통합하는 방안을 추진 중이다. 다만 소비자 습관이 자리잡기 전까지는 해당 AI 경험 내 광고 도입을 서두르지 않겠다는 신중한 접근을 취하고 있다.","insight":"AI 신규 접점에 광고를 조급하게 붙이기보다 사용자 신뢰와 습관 형성을 먼저 확보한다는 인스타카트의 순서는, 신규 AI 기능을 출시하는 국내 서비스도 수익화 타이밍 설계에 참고할 만하다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/how-instacart-is-cultivating-full-funnel-marketing-with-video-ai/823905/"},{"title":"구글, AI 검색광고 업그레이드…마케터가 알아야 할 것","summary":"구글이 AI 생성 검색 결과 안에 광고를 더 밀접하게 노출하는 방식으로 검색광고 상품을 업그레이드했다. 전통적 키워드 입찰 방식과는 다른 새로운 최적화 전략이 필요하다는 분석이다.","insight":"AI 답변 안에 광고가 녹아드는 구조에서는 브랜드 언급의 '노출 위치'보다 '인용 신뢰도'가 성과를 좌우할 가능성이 커, SEO/SEM팀은 AI 검색엔진 최적화(GEO) 역량을 조기에 확보해야 한다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/google-upgrades-ai-search-ads-what-marketers-need-to-know/820663/"}]},"economy":{"domestic":[{"title":"6월 내내 출렁인 코스피…7월 실적 시즌엔 달라질까","summary":"코스피가 6월 한 달간 반도체·AI 관련주를 중심으로 급등락을 반복하며 높은 변동성을 보였다. 7월 기업 실적 발표 시즌이 방향성을 좌우할 분수령이 될 것이라는 전망이 나온다.","insight":"변동성 장세에서는 단기 지수 흐름보다 개별 기업의 실적 가이던스 변화가 더 중요한 신호이므로, 투자·재무 관련 콘텐츠나 서비스를 운영하는 팀은 실적 시즌 전후 사용자 정보 수요 급증에 대비해야 한다.","source_name":"한국경제(다음뉴스)","source_url":"https://v.daum.net/v/20260628072248436"},{"title":"반도체 폭락장에 레버리지 ETF 투자자 '음의 복리' 직격","summary":"삼성전자·SK하이닉스 단일종목 레버리지 ETF가 사흘 새 두 차례 폭락장을 겪으며 본주 하락폭의 거의 두 배에 달하는 손실을 기록했다. 일별 수익률의 2배를 매일 복리로 추종하는 상품 구조상 변동성이 커질수록 손실이 기하급수적으로 불어나는 '음의 복리' 효과가 원인으로 지목됐다.","insight":"고변동성 구간에서 레버리지 상품 관련 고객 문의·민원이 급증할 가능성이 높은 만큼, 핀테크·증권 서비스 PM은 리스크 고지 UX와 상품 설명 콘텐츠를 변동성 국면에 맞춰 선제적으로 강화할 필요가 있다.","source_name":"파이낸셜뉴스","source_url":"https://www.fnnews.com/news/202606271117049938"},{"title":"6월 소비심리 두 달 연속 개선, 금리전망은 9년6개월 만에 최대폭 상승","summary":"6월 소비자심리지수(CCSI)가 106.6으로 전월 대비 0.5포인트 올라 두 달 연속 개선됐다. 반도체 수출 호조와 주가 상승이 체감경기를 끌어올렸으나, 금리수준전망과 주택가격전망 지수도 동반 상승했다.","insight":"소비심리 개선과 금리·집값 상승 기대가 동시에 나타나는 모순적 신호는 소비 여력이 실제 지출로 이어질지 불확실하다는 뜻이므로, 커머스·소비재 PM은 낙관적 지표만 보고 공격적 프로모션을 확대하기보다 실구매 전환 데이터를 함께 추적해야 한다.","source_name":"이투데이","source_url":"https://www.etoday.co.kr/news/view/2596086"}],"international":[{"title":"트럼프 행정부, USMCA 갱신 거부…캐나다·멕시코와 재검토 착수","summary":"트럼프 행정부가 7월 1일 시한까지 미국·멕시코·캐나다 협정(USMCA) 갱신에 합의하지 않기로 하면서 협정은 매년 재검토되는 체제로 전환됐다. 자동차 원산지 규정과 철강·알루미늄 관세가 핵심 쟁점으로 남아있다.","insight":"북미 공급망에 의존하는 제조·리테일 기업은 관세·원산지 규정 변경 리스크를 상시 모니터링 체계로 편입해야 하며, 특히 멕시코 경유 조달 구조라면 대체 공급망 시나리오를 미리 준비해야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/01/trump-usmca-canada-mexico-trade-treaty.html"},{"title":"연준, 기준금리 3.50~3.75% 동결 유지","summary":"연방준비제도(Fed)가 6월 FOMC 회의에서 기준금리를 3.50~3.75%로 동결했다. 인플레이션이 여전히 목표치인 2%를 웃돌고 있어 조기 금리 인하 기대는 후퇴하는 분위기다.","insight":"'고금리 장기화' 기조가 이어질수록 스타트업의 자금 조달 환경은 계속 타이트하게 유지될 가능성이 높아, 신사업·신규 투자 계획을 세우는 PM은 밸류에이션 프리미엄에 기댄 공격적 성장 전략보다 현금흐름 중심의 우선순위 조정이 필요하다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"2026년 글로벌 경제전망: 선진국 둔화 속 일부 신흥국만 개혁 성과","summary":"딜로이트의 2026년 글로벌 경제전망 보고서는 선진국의 성장 둔화와 일부 신흥국의 개혁 주도 성장이 대비되는 불균등한 회복세를 전망했다. 인플레이션과 무역정책 리스크가 전 지역에 공통적으로 영향을 미칠 것으로 내다봤다.","insight":"지역별 성장률 격차가 커지는 국면에서는 단일 글로벌 전략보다 리전별 성장 시나리오를 분리 설계하는 것이 유리하며, 해외 진출을 검토하는 팀은 선진국보다 개혁 성과가 뚜렷한 신흥시장의 성장 스토리를 우선순위에 반영할 만하다.","source_name":"Deloitte Insights","source_url":"https://www.deloitte.com/us/en/insights/topics/economy/global-economic-outlook-2026.html"}]},"summary":"빅테크는 AI 인프라를 자산화·재판매하는 방향으로 전략을 틀고, 미국은 USMCA 갱신을 거부하며 무역질서를 재편하는 가운데, 국내 증시는 반도체 변동성 속에 7월 실적 시즌을 앞두고 방향을 탐색하고 있다."},"2026.07.05":{"date":"2026.07.05","it":{"domestic":[{"title":"투비유니콘, 재난 현장 영상 처리용 시맨틱 AI '미션 브레인' 개발","summary":"재난·안전 특화 AI 스타트업 투비유니콘이 위성·드론으로 촬영한 1GB 이상 대용량 영상에서 화재·연기·산사태 등 위험 요소를 자동 식별하는 시맨틱 AI 플랫폼 '미션 브레인'을 공개했다. 재난 현장 영상 데이터를 실시간으로 의미 있는 정보로 변환하는 것이 핵심이다.","insight":"재난 대응처럼 데이터가 비정형·대용량인 도메인은 범용 LLM보다 특화 파인튜닝 모델의 ROI가 명확하다. B2G 대상 AI 스타트업은 '정확도'보다 '현장 워크플로 통합 속도'를 KPI로 잡아야 조달 경쟁에서 우위를 가져간다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260704184349"},{"title":"사이오닉AI, 강남 건물 절반을 데이터센터로 개조한 이유","summary":"네이버 하이퍼클로바 개발에 참여했던 창업자가 이끄는 AI 스타트업 사이오닉AI가 서울 강남 소재 건물을 직접 개조해 통합 AI센터를 구축했다. 클라우드 GPU 비용 부담과 레이턴시 문제를 자체 인프라로 해결하려는 전략이다.","insight":"GPU 임대료 상승이 스타트업의 온프레미스 인프라 투자를 정당화하는 임계점을 넘었다는 신호. AI 제품 PM이라면 클라우드 종속 비용 구조를 3년 스케일 시나리오로 다시 검토할 시점이다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260703105531"},{"title":"네이버, 환각 줄이고 검색은 빠르게…'AI탭' 핵심 기술 공개","summary":"네이버가 자사 AI 검색 기능 'AI탭'의 핵심 기술을 공개하며 환각(hallucination) 저감과 응답 속도 개선에 집중했다고 밝혔다. 스마트렌즈부터 이미지·텍스트 결합 검색까지 이어온 검색 기술 고도화의 연장선이다.","insight":"검색형 AI 제품의 성패는 '얼마나 똑똑한가'가 아니라 '얼마나 안 틀리고 빠른가'로 판가름 난다. 국내 서비스 PM은 네이버의 지연시간·정확도 트레이드오프 공개 수치를 자사 AI 기능 벤치마크 기준선으로 참고할 만하다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260704232709"}],"international":[{"title":"마이크로소프트, 25억 달러 투입해 AI 배포 전담 자회사 출범","summary":"마이크로소프트가 기업의 AI 도입을 전담 지원하는 신설 조직 'Microsoft Frontier Company'를 출범시켰다. 25억 달러를 투입하고 6,000명 규모의 산업·엔지니어링 전문가를 배치해 엔터프라이즈 AI 구축을 직접 대행한다.","insight":"빅테크가 '모델 판매'에서 '구축 대행(SI)'으로 사업 모델을 확장하는 신호. 국내 AI 솔루션 기업은 이제 모델 성능이 아니라 도입·운영 서비스 역량으로 차별화해야 빅테크와의 경쟁에서 밀리지 않는다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/"},{"title":"AI발 일자리 논쟁, 통계로 더 복잡해지다","summary":"AI를 적극 도입한 '고강도 도입 기업'의 헤드카운트가 오히려 10.2% 증가했고, 특히 신입 채용은 12% 늘었다는 데이터가 나오며 'AI가 주니어 일자리를 없앤다'는 통념에 반박하는 논쟁이 커지고 있다.","insight":"AI 도입과 채용 감소를 단순 인과로 연결하는 조직 내 논리는 데이터로 반박당할 수 있다. PM은 AI 도입 성과 보고 시 헤드카운트 변화가 아니라 '1인당 처리 업무량' 같은 생산성 지표로 프레이밍해야 설득력이 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/29/the-ai-jobs-debate-just-got-messier/"},{"title":"2026년 AI 사유로 발생한 빅테크 감원 현황 총정리","summary":"TechCrunch가 2026년 동안 기업들이 'AI 도입'을 명시적 사유로 언급하며 진행한 주요 빅테크 감원 사례를 지속 업데이트하며 정리하고 있다. AI 효율화가 실제 구조조정 명분으로 자리 잡는 추세를 보여준다.","insight":"AI 효율화를 감원 명분으로 쓰는 사례가 누적되면 규제·여론 리스크로 번질 수 있다. AI 도입을 추진하는 PM은 '인력 대체'가 아닌 '역량 재배치' 내러티브로 내부 커뮤니케이션 프레임을 미리 설계해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/06/22/the-running-list-major-tech-layoffs-in-2026-where-employers-cited-ai/"}]},"marketing":{"domestic":[{"title":"2026년 마케팅의 핵심, '3R'로 재정의되다: 공감·진정성·관계","summary":"콘텐츠마케팅연구소가 2026년 마케팅을 관통하는 키워드로 공감(Resonance), 진정성(Realness), 관계(Relationships)의 '3R'을 제시했다. 브랜드가 정보 배포자가 아닌 소비자와의 감정적·사회적 연결 주체로 전환해야 한다는 주장이다.","insight":"AI 생성 콘텐츠가 범람할수록 '사람이 만든 티가 나는' 콘텐츠의 희소가치가 커진다. 마케팅 PM은 자동화 콘텐츠 비중을 늘리는 동시에, 브랜드 신뢰를 좌우하는 채널만큼은 휴먼 터치를 의도적으로 남겨야 한다.","source_name":"매드타임스","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=25921"},{"title":"2026년 주목해야 할 '기만적 광고' 이슈들","summary":"미국 소비자 보호 단체 TINA가 2026년 소비자가 경계해야 할 기만적 광고 유형을 발표했다. 여행·식음료 마케팅, 가격 표시 방식, AI 챗봇을 활용한 판매 유도, 재판매 모델 등에서 새로운 형태의 기만 표현이 늘고 있다는 경고다.","insight":"AI 챗봇 기반 판매 유도가 규제 타깃으로 지목되기 시작했다는 점이 핵심. 국내에서도 AI 상담·추천 기능을 붙인 커머스 서비스는 '광고 표시' 가이드라인을 선제적으로 정비하지 않으면 다음 규제 사이클의 첫 타깃이 될 수 있다.","source_name":"매드타임스","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=26362"},{"title":"2026년 광고시장, 디지털 중심 구조재편 가속화 전망","summary":"2025년 온라인 광고가 국내 전체 광고비의 약 60%를 차지하며 중심축으로 자리 잡은 가운데, 2026년에도 디지털·리테일 미디어는 성장세를 이어가는 반면 방송·인쇄 광고는 조정 국면이 이어질 것이라는 전망이 나왔다.","insight":"예산 배분 논의에서 '방송이냐 디지털이냐'는 이미 지난 질문이다. 지금 마케팅 리더가 답해야 할 질문은 '디지털 예산을 리테일 미디어와 오픈마켓 검색광고 중 어디에 더 태울 것인가'로 넘어갔다.","source_name":"서울STV뉴스","source_url":"https://www.stvnews.kr/news/articleView.html?idxno=14879"}],"international":[{"title":"2026 ADWEEK 50 발표, 업계 리더들의 도전 과제 조명","summary":"Adweek가 매년 발표하는 업계 영향력 있는 인물 리스트 '2026 ADWEEK 50'을 공개했다. AI 전환, 리테일 미디어 확장, 크리에이터 이코노미 등 격변기를 헤쳐가는 리더들의 전략이 함께 조명됐다.","insight":"리스트에 오른 리더들의 공통점은 'AI 도구 도입'이 아니라 '조직 전체의 의사결정 속도 재설계'다. 국내 마케팅 조직도 툴 교체보다 승인·실행 프로세스 단축에 투자 우선순위를 둬야 체감 효과가 크다.","source_name":"Adweek","source_url":"https://www.adweek.com/brand-marketing/the-2026-adweek-50-are-up-for-the-challenge/"},{"title":"Marketing Dive, 2026년 마케팅 업계 트렌드 전망 발표","summary":"Marketing Dive가 2026년 마케팅 업계를 관통할 주요 트렌드를 전망했다. AI 기반 타깃팅, 리테일 미디어 확장, 매체 간 양극화 심화가 핵심 축으로 꼽혔다.","insight":"'AI가 마케팅을 바꾼다'는 전망은 이제 뉴스가 아니다. 실무자가 체크해야 할 것은 우리 조직의 퍼스트파티 데이터 정합성이 AI 타깃팅을 실제로 돌릴 수준인지 여부다. 데이터 인프라 없는 AI 마케팅 투자는 헛발질이 된다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/marketing-trends-outlook-2026/810740/"},{"title":"아마존 광고, 2026년 주목할 5대 마케팅 트렌드 제시","summary":"아마존 광고가 2026년 마케터가 주목해야 할 5가지 트렌드를 발표했다. 리테일 미디어 고도화, 커넥티드TV 확장, 생성형 AI 크리에이티브 자동화 등이 포함됐다.","insight":"플랫폼 사업자가 직접 '트렌드'를 발표하는 것은 곧 자사 광고 상품 로드맵 예고편이다. 아마존이 짚은 항목은 향후 6개월 내 광고주에게 제안될 신규 상품군일 가능성이 높으니 예산 협상 전에 선제 검토가 필요하다.","source_name":"Amazon Advertising","source_url":"https://advertising.amazon.com/library/news/marketing-trends-2026"}]},"economy":{"domestic":[{"title":"6월 내내 출렁인 코스피…실적 시즌 7월엔 다를까","summary":"코스피가 6월 한 달간 큰 변동성을 보이며 8,000~9,000선을 오간 가운데, 7월 기업 실적 발표 시즌이 본격화되며 방향성이 재설정될 수 있다는 분석이 나왔다.","insight":"실적 시즌 변동성 확대는 IR·재무 부서만의 이슈가 아니다. B2B/B2C 서비스 PM도 자사·경쟁사 실적 발표 일정을 캘린더에 미리 반영해, 예산 동결·마케팅 집행 시점 협상 타이밍을 어긋나지 않게 조율해야 한다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/202606281711Y"},{"title":"한국은행, 기준금리 2.5% 8회 연속 동결","summary":"한국은행이 통화정책방향 결정회의에서 기준금리를 2.5%로 8회 연속 동결했다. 완화 사이클 기대에도 불구하고 물가·환율 변수를 고려해 신중한 기조를 유지한 것으로 풀이된다.","insight":"금리 동결 장기화는 대출 기반 성장 전략을 쓰는 커머스·핀테크 서비스에는 우호적이지 않은 환경이 지속된다는 뜻이다. 신규 투자 유치를 앞둔 스타트업 PM이라면 밸류에이션 협상에서 '금리 하락 기대'를 근거로 쓰기 어려운 국면임을 인지해야 한다.","source_name":"토스뱅크","source_url":"https://www.tossbank.com/articles/baserate2601"},{"title":"원/달러 환율, 외국인 자금 유출 속 약세 지속","summary":"원/달러 환율이 1,530~1,550원대에서 등락하며 약세 흐름을 이어가고 있다. 지속적인 외국인 주식 자금 유출이 원화 약세 압력의 주요 원인으로 지목된다.","insight":"원화 약세는 해외 클라우드·SaaS 비용을 쓰는 국내 IT 조직에는 원가 상승 요인이다. CTO·PM은 달러 결제 비중이 큰 인프라 계약의 환헤지 여부를 재무팀과 다시 확인할 시점이다.","source_name":"Investing.com","source_url":"https://kr.investing.com/currencies/usd-krw"}],"international":[{"title":"연준, 기준금리 3.50~3.75% 동결…물가 경계 지속","summary":"미 연방준비제도(Fed)가 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했다. 실물경제는 견조한 성장세를 이어가고 있지만 물가가 여전히 목표치인 2%를 웃돌아 신중한 정책 기조를 유지했다.","insight":"'고금리 장기화'가 기본 시나리오로 굳어지는 중이다. 해외 진출·글로벌 결제를 다루는 서비스 PM은 달러 조달 비용 하락을 전제로 한 연내 확장 계획이 있다면 지금 재검토가 필요하다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"미 증시, 독립기념일 연휴 앞두고 다우 사상 최고치 마감","summary":"미국 증시가 7월 2일 다우존스 지수 사상 최고치를 기록하며 마감했다. 독립기념일 연휴로 7월 3일 뉴욕증시는 휴장했으며, 3분기 첫 거래일 상승 흐름이 유지됐다.","insight":"미 증시 강세가 이어지는 동안 AI 관련주 밸류에이션 고평가 논란도 함께 커지고 있다. 해외 투자자 유치를 준비하는 국내 스타트업은 '고평가 조정 리스크'를 투자 피치에 선제적으로 다루는 편이 신뢰도 측면에서 유리하다.","source_name":"TheStreet","source_url":"https://www.thestreet.com/stock-market-today/stock-market-today-dow-jones-sp-500-nasdaq-updates-july-2-2026"},{"title":"고용지표 부진에 연준 '관망' 시간 벌어","summary":"미국 7월 고용지표가 시장 예상치를 밑돌며 신규 일자리 증가폭이 둔화됐다. 실업률은 소폭 하락했지만, 고용 둔화 신호로 연준이 금리 정책에서 '관망' 기조를 이어갈 여지가 커졌다는 분석이다.","insight":"고용 지표 둔화와 금리 관망 기조가 겹치면 소비 심리 위축으로 이어질 수 있다. 글로벌 소비재·이커머스향 서비스를 운영하는 PM은 하반기 미국향 매출 목표를 보수적 시나리오로 한 번 더 점검해야 한다.","source_name":"Yahoo Finance","source_url":"https://finance.yahoo.com/markets/live/stock-market-today-dow-rises-sp-500-and-nasdaq-slip-ahead-of-fed-rate-decision-225641465.html"}]},"summary":"AI가 '도입 기술'에서 '운영 인프라'와 '구조조정 명분'으로 자리를 옮기는 가운데, 국내외 증시는 고금리 장기화와 실적 시즌을 앞두고 변동성을 키우고 있다."},"2026.07.06":{"date":"2026.07.06","it":{"domestic":[{"title":"삼성 파운드리, AI 시대 '넥서스' 전략 선언","summary":"삼성전자 파운드리 사업부가 SAFE 포럼 2026에서 2나노 공정과 HBM4를 축으로 한 AI 반도체 생태계 주도 전략 '넥서스'를 공개했다. TSMC와의 격차를 좁히기 위해 고객사·파트너사와의 협업 체계를 강화하겠다는 방침이다.","insight":"파운드리 경쟁력이 AI 서비스 단가와 속도에 직결되는 만큼, AI 제품 PM은 하반기 HBM4 공급 일정을 로드맵 리스크 요인으로 미리 점검해둘 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260701114115"},{"title":"오세훈 서울시장, '청년 AI 사다리' 정책 추진","summary":"서울시가 청년층이 생성형 AI 서비스를 재정 부담 없이 활용할 수 있도록 지원하는 '청년 AI 사다리' 정책을 발표했다. AI 활용 격차 해소를 '기본권' 차원에서 접근하겠다는 것이 핵심이다.","insight":"지자체발 AI 지원 정책은 잠재 사용자 유입 채널이 될 수 있어, B2C AI 서비스 PM은 관련 협력 사업 공고를 마케팅 채널 후보로 검토할 만하다.","source_name":"아이뉴스24","source_url":"https://m.inews24.com/v/1981837"},{"title":"인텔, PC·서버용 일부 CPU 가격 인상","summary":"인텔이 코어 울트라 200S Plus와 제온6 프로세서 가격을 인상하고 일부 라인업은 소폭 인하했다. 메모리·파운드리 원가 상승이 이번 가격 조정의 배경으로 꼽힌다.","insight":"하드웨어 원가 상승은 온디바이스 AI 기기·서버 인프라 원가로 전이되므로, 인프라 비용을 다루는 PM은 3~6개월 내 클라우드 단가 재협상 가능성을 열어둬야 한다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260705005101"}],"international":[{"title":"마이크로소프트, 25억 달러 규모 AI 배포 전담 조직 신설","summary":"마이크로소프트가 약 6000명 규모 엔지니어로 구성된 신규 조직 'Microsoft Frontier Company'를 출범시켰다. 기업 고객에 AI 시스템을 직접 설계·배포·최적화해주는 서비스를 25억 달러 투자로 지원한다.","insight":"빅테크가 AI '판매'에서 '구현 대행'으로 사업모델을 확장하는 신호로, 엔터프라이즈 SaaS PM은 자사 온보딩·구현 지원 조직의 경쟁력을 재점검할 시점이다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/"},{"title":"AOL·Vimeo 인수한 벤딩스푼스, 나스닥 상장 흥행","summary":"밀라노 기반 테크 기업 벤딩스푼스가 나스닥 상장 첫날 시가총액 250억 달러를 넘어서며 기존 비상장 가치(110억 달러)의 2배를 기록했다. 미트업, 이벤트브라이트, 위트랜스퍼 등을 인수해 월간 5억 명 이용자를 확보한 포트폴리오 전략이 투자자 신뢰를 얻었다.","insight":"레거시 브랜드를 저비용에 인수해 효율화하는 '롤업' 전략이 재평가받고 있어, 성장 정체 서비스를 보유한 조직은 매각·제휴 옵션을 다시 검토해볼 만하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/05/what-is-bending-spoons-everything-to-know-about-aols-acquirer/"},{"title":"오픈AI 대항마 미스트랄 AI, 정체와 전략은","summary":"프랑스 AI 스타트업 미스트랄이 7월 중 오픈 가중치(open-weight) 모델의 얼리 액세스를 공개할 예정이다. 오픈소스 전략을 앞세워 오픈AI·구글과 차별화를 꾀하고 있다.","insight":"오픈 가중치 모델 확산은 자체 파인튜닝이 필요한 서비스의 진입장벽을 낮추므로, AI 기능을 빌드할지 API로 살지 저울질하는 PM에게는 비용 구조 재계산이 필요한 시점이다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/04/what-is-mistral-ai-everything-to-know-about-the-openai-competitor/"}]},"marketing":{"domestic":[{"title":"메타, 인스타그램을 AI 검색엔진으로 전환 중","summary":"메타가 인스타그램·페이스북·왓츠앱에 AI 챗봇을 결합해 사용자가 질문하면 플랫폼 내에서 바로 요약 답변을 제공하는 방식으로 검색 기능을 강화하고 있다. SNS의 검색엔진화가 본격화되는 모습이다.","insight":"SNS 내 검색 완결형 UX가 확산되면 외부 링크 클릭 기반 트래픽 전략이 약화될 수 있어, 콘텐츠 마케터는 온사이트 전환 중심으로 KPI를 재설계해야 한다.","source_name":"오픈애즈","source_url":"https://openads.co.kr/content/contentDetail?contsId=14610"},{"title":"2026 글로벌 마케팅 트렌드 세미나 총정리","summary":"국내 마케팅 업계가 AI 마케팅, 인앱 경험 루프, 파트너십 광고 확산 등을 2026년 핵심 트렌드로 꼽으며 관련 세미나·컨퍼런스가 잇따라 열리고 있다.","insight":"트렌드 학습에 그치지 않고 자사 퍼널 중 획득·리텐션 어느 구간에 AI를 먼저 적용할지 우선순위를 정하는 것이 실무진의 다음 과제다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"},{"title":"2026년 광고시장, 디지털 중심 재편 가속…온라인광고 비중 60%","summary":"코바코(KOBACO) 분석에 따르면 2025년 온라인 광고가 전체 광고비의 약 60%를 차지했으며, 2026년에도 디지털 중심 구조 재편이 가속화될 전망이다. 데이터 활용과 알고리즘 투명성이 새로운 과제로 부상하고 있다.","insight":"전통 매체 예산 이탈이 지속될 전망인 만큼, 마케팅 PM은 데이터 활용 동의 체계와 서드파티 쿠키 대응 전략을 예산 재배분과 함께 점검해야 한다.","source_name":"서울STV뉴스","source_url":"https://www.stvnews.kr/news/articleView.html?idxno=14879"}],"international":[{"title":"크리에이터 마케팅은 통하는데, 측정은 아직 못 따라간다","summary":"크리에이터 콘텐츠가 핵심 미디어 채널로 자리 잡았지만, 플랫폼마다 조회수·참여 지표 정의가 달라 성과 측정이 여전히 파편화돼 있다는 분석이 나왔다. 크리에이터 예산은 급증하는데 이를 정교하게 배분할 표준은 부재한 상황이다.","insight":"측정 표준이 없는 채널에 예산을 태우는 것은 CFO 설득에 취약하므로, 마케팅 PM은 자체 크리에이터 성과 지표를 사내 표준으로 먼저 확정해두는 것이 유리하다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/creators-work-but-measurement-doesnt-yet/813952/"},{"title":"IAB \"크리에이터 마케팅, 이제 핵심 미디어 채널\"…검색은 둔화","summary":"IAB(미국 인터랙티브 광고협회) 보고서에 따르면 크리에이터 마케팅이 브랜드의 핵심 미디어 채널로 승격된 반면, 전통적 검색 광고 성장은 둔화되고 있다.","insight":"검색 예산의 상대적 매력이 떨어지는 흐름은 SEO/SEM 중심 그로스팀에 예산 재배분 압박으로 이어질 수 있어, 크리에이터 채널 테스트 예산을 지금 확보해두는 것이 안전하다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/creator-marketing-now-a-core-media-channel-while-search-slows-iab/817832/"},{"title":"2026년 마케팅, 예년보다 더 변동성 커진다","summary":"B2C 마케팅 임원의 64%가 2026년이 2025년보다 더 변동성이 클 것으로 전망했다. 가격 인상, AI발 프라이버시 리스크, 측정 신뢰도 저하가 주요 원인으로 꼽혔다.","insight":"변동성이 전제라면 분기 단위 확정형 캠페인 계획보다 월 단위 애자일 예산 운영 체계로 전환하는 조직이 리스크에 더 잘 대응할 수 있다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/will-2026-be-more-volatile-for-marketing-heres-what-the-numbers-say/807701/"}]},"economy":{"domestic":[{"title":"코스피, 장중 8000선 회복하며 4%대 급등","summary":"코스피 지수가 삼성전자·SK하이닉스 등 반도체 대형주 강세에 힘입어 장중 8000선을 재탈환하며 전일 대비 4%대 급등했다. 올해 들어 코스피는 누적 기준 100% 가까이 상승했다.","insight":"반도체 쏠림 랠리는 지수 조정 시 낙폭도 클 수 있음을 의미하므로, 회사 자금 운용이나 스톡옵션 타이밍을 다루는 리더는 단일 섹터 의존 리스크를 인지해야 한다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026070341926"},{"title":"정부, 반도체 초과 세수로 '미래 대응 기금' 신설 추진","summary":"정부가 반도체 업황 호조로 늘어난 세수를 활용해 미래 산업 대응을 위한 기금 신설을 추진 중이라는 발언이 나왔다.","insight":"반도체 초과세수 기반 기금은 향후 AI·반도체 스타트업 대상 정책자금 확대로 이어질 가능성이 있어, 관련 분야 스타트업은 정책자금 공고 일정을 미리 모니터링할 필요가 있다.","source_name":"아이뉴스24","source_url":"http://inews24.com/view/1982519"},{"title":"한국은행 6월 기업경기실사지수(BSI), 제조업 개선·비제조업 악화","summary":"한국은행에 따르면 6월 제조업 BSI는 전월 대비 0.4포인트 오른 101.2를, 비제조업은 2.1포인트 하락한 95.4를 기록했다. 소비자물가 상승률은 3.2%로 전월보다 소폭 높아졌다.","insight":"비제조업(내수·서비스업) 심리 위축이 지속되면 소비재·서비스 앱의 결제 전환율에도 영향을 줄 수 있어, 커머스·핀테크 PM은 3분기 소비 심리 지표를 선행지표로 트래킹해야 한다.","source_name":"한국은행","source_url":"https://www.bok.or.kr/portal/main/main.do"}],"international":[{"title":"다우지수 사상 최고치 마감…나스닥은 반도체주 부진에 하락","summary":"다우존스 산업평균지수가 594.83포인트(1.14%) 오른 5만2900.07로 사상 최고치를 기록했다. 반면 나스닥은 테라다인·KLA 등 반도체 장비주 급락 여파로 0.8% 하락했다.","insight":"AI 인프라 관련주의 변동성이 커지는 국면이므로, 자사 클라우드·GPU 비용을 반도체 공급망 이슈와 연동해 시나리오 플래닝에 반영해두는 것이 안전하다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/01/stock-market-today-live-updates.html"},{"title":"연준, 기준금리 3.50~3.75% 동결","summary":"연방공개시장위원회(FOMC)가 기준금리를 3.50~3.75%로 동결하며 인플레이션이 목표치 2%를 웃도는 상황을 주시하겠다고 밝혔다. 신임 의장 케빈 워시는 향후 포워드 가이던스를 줄이겠다는 신호를 보내고 있다.","insight":"포워드 가이던스 축소는 환율·금리 변동성 확대를 의미하므로, 해외 결제·구독 매출 비중이 큰 서비스는 환헤지 전략과 가격 정책을 재점검할 필요가 있다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"중국 경제, 5월 소매판매 3년 만에 첫 감소…투자도 위축","summary":"중국의 5월 소매판매가 3년여 만에 처음으로 감소세를 기록했고, 고정자산투자도 예상보다 크게 위축됐다. 베이징 당국에 실효성 있는 경기부양책 마련 압박이 커지고 있다.","insight":"중국 내수 둔화가 장기화되면 중국 시장 의존도가 높은 국내 이커머스·제조사는 매출 가이던스를 보수적으로 조정할 필요가 있다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/06/16/china-economy-may-retail-sales-industrial-output-fixed-asset-investment-.html"}]},"summary":"AI 인프라 투자(MS·삼성 파운드리)와 크리에이터 경제 성장이 이어지는 가운데, 반도체 랠리로 국내 증시가 급등하고 연준은 금리를 동결하며 성장 기대와 통화정책 경계감이 공존한 하루였다."},"2026.07.07":{"date":"2026.07.07","it":{"domestic":[{"title":"과기부, GovTech AI 스타트업 실증사업 18건 선정","summary":"과학기술정보통신부가 '2026년 GovTech 창업기업 AI 실증·사업화 지원사업' 대상 과제 18건을 선정하고 7일부터 착수보고회에 들어간다. 공공기관이 현장 수요를 제시하면 AI 솔루션을 보유한 스타트업이 매칭되는 수요 기반 방식으로 추진된다.","insight":"공공조달을 첫 레퍼런스 고객으로 확보하려는 AI 스타트업이라면 이런 실증사업 트랙을 초기 PMF 검증과 레퍼런스 확보 채널로 적극 활용할 필요가 있다.","source_name":"이투데이","source_url":"https://www.etoday.co.kr/news/view/2600554"},{"title":"KT, AI 인프라에 6조·통신 본질에 12조원 투자 발표","summary":"KT 박윤영 대표가 AI 데이터센터와 해저케이블 등 AX 인프라에 6조원, 통신 보안·네트워크에 12조원을 투자하겠다고 밝혔다. 1GW 규모 분산형 AIDC와 토큰 최적화 엔진을 결합한 '토큰 팩토리'를 핵심 사업모델로 제시했다.","insight":"통신사가 AI 인프라 사업자로 전환하는 흐름이 가속화되고 있어, AI 서비스 기획 시 클라우드뿐 아니라 국내 통신사의 AI 인프라 파트너십 옵션도 비교 검토할 가치가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260706093757"},{"title":"개정 정보통신망법 7일 시행…대형 플랫폼 투명성 보고 의무화","summary":"일평균 이용자 100만명 이상인 네이버, 카카오, 구글, 메타 등 대형 플랫폼에 신고 접수 체계 구축과 반기별 투명성 보고서 공표를 의무화하는 개정 정보통신망법이 7월 7일부터 시행된다. 온라인 허위정보 근절과 표현의 자유 사이의 균형이 쟁점이다.","insight":"자사 서비스가 규제 대상 플랫폼 기준(DAU 100만)에 근접한다면 콘텐츠 신고·투명성 보고 체계를 지금부터 준비해야 시행 후 과태료·평판 리스크를 피할 수 있다.","source_name":"캐어유뉴스","source_url":"https://www.careyounews.org/news/articleView.html?idxno=10523"}],"international":[{"title":"저커버그 \"AI 에이전트 발전 속도, 기대만큼 못 미쳐\"","summary":"마크 저커버그 메타 CEO가 사내 타운홀에서 AI 에이전트 기술 발전이 예상만큼 가속화되지 않았다고 밝혔다. 메타는 올해 초 직원 약 8000명을 감원하고 7000명을 'Agent Transformation' 등 AI 조직으로 재배치한 바 있다.","insight":"빅테크조차 에이전트 상용화에서 기대와 실제 성능 간 간극을 인정한 만큼, 자사 로드맵에 에이전트형 기능을 넣을 때는 완전 자동화보다 휴먼인더루프 설계로 리스크를 분산하는 것이 현실적이다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/mark-zuckerberg-tells-staff-that-ai-agents-havent-progressed-as-quickly-as-hed-hoped/"},{"title":"미드저니, 할리우드 스튜디오에 AI 사용 내역 공개 요구","summary":"AI 이미지 생성기업 미드저니가 소송 과정에서 3개 할리우드 스튜디오에 자체 AI 활용 방식을 공개하라고 요구하고 나섰다. 저작권 침해 소송 전선에서 콘텐츠 업계의 AI 활용 이중잣대를 겨냥한 대응이다.","insight":"생성형 AI 저작권 분쟁이 '기업의 AI 사용 내역 상호 공개' 국면으로 번지고 있어, AI 활용 콘텐츠 제작 시 학습 데이터 출처와 사용 범위를 문서화해두는 것이 향후 법적 방어에 중요해진다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/04/midjourney-wants-hollywood-studios-to-reveal-the-details-of-their-ai-usage/"},{"title":"인도 기업인, 자비 300억원 투입해 'MS오피스 대항마' AI 개발","summary":"인도의 연쇄 창업가 바빈 투라키아가 개인 자금 3000만 달러를 투입해 AI 네이티브 업무용 소프트웨어 'Neo'를 개발한다. AI 이전 시대에 설계된 업무 소프트웨어는 챗봇을 얹는 정도로는 부족하며 근본적 재설계가 필요하다는 문제의식에서 출발했다.","insight":"레거시 SaaS에 AI 기능을 얹는 'AI-어시스트' 전략과 처음부터 AI 네이티브로 재설계하는 전략 중 어느 쪽이 자사 제품에 맞는지 지금 결정하지 않으면 후발주자에게 카테고리를 통째로 뺏길 수 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/01/indian-tech-tycoon-bets-30m-to-build-an-ai-alternative-to-microsoft-office/"}]},"marketing":{"domestic":[{"title":"2026 글로벌 마케팅 트렌드 세미나 총정리","summary":"오픈애즈가 AI 마케팅, 발견형 커머스, OTT, DOOH 등 4대 주제를 중심으로 2026년 마케팅·미디어 산업 변화를 정리한 세미나 콘텐츠를 공개했다. 생성형 AI 대중화로 마케팅 전반의 자동화 속도가 빨라지고 있다는 점을 핵심으로 짚었다.","insight":"AI 마케팅 자동화 도구 도입을 검토 중이라면 '소재 생성'보다 '입찰·타겟팅 자동 최적화' 영역이 성과 개선 폭이 크다는 점부터 우선순위에 반영해야 한다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"},{"title":"2026년 마케팅 핵심은 '3R'…공감·진정성·관계","summary":"매드타임스는 2026년 마케팅을 규정할 핵심 키워드로 공감(Resonance), 진정성(Realness), 관계(Relationships)의 '3R'을 제시했다. 인플루언서를 단순 미디어 자원으로 소비하고 캠페인 단위로만 성과를 평가하는 방식은 더 이상 유효하지 않다고 지적한다.","insight":"인플루언서 마케팅 예산을 캠페인 단위 단발성 집행에서 장기 파트너십 기반 관계 자산으로 전환해야 한다는 신호이며, KPI도 단기 도달·전환에서 팬덤 리텐션 지표로 확장할 시점이다.","source_name":"매드타임스","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=25921"},{"title":"2026년 주목해야 할 '기만적 광고' 이슈들","summary":"매드타임스가 2026년 규제 당국과 소비자가 특히 민감하게 반응할 것으로 예상되는 기만적 광고 유형들을 정리했다. AI 생성 콘텐츠의 표시 미흡, 후기 조작, 가격 눈속임 등이 주요 리스크로 꼽힌다.","insight":"네이버 스마트스토어가 7월 10일부터 AI 생성물 표시 기준을 강화하는 등 플랫폼 자체 규제도 빨라지고 있어, AI로 제작한 상세페이지·후기성 콘텐츠는 사전에 AI 생성 여부 표시 정책부터 점검해야 한다.","source_name":"매드타임스","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=26362"}],"international":[{"title":"AI가 촉발한 마케팅 양극화, 2026년 9대 예측","summary":"Marketing Dive가 AI 확산이 마케팅 업계를 양극화시키고 있다는 진단과 함께 2026년 마케팅 9대 예측을 제시했다. AI를 활용한 실행 속도와 개인화 수준이 브랜드 간 격차를 벌리는 핵심 변수로 지목됐다.","insight":"AI 마케팅 도구를 '쓰는지 여부'는 이미 변별력이 없고 '얼마나 빠르게 실험하고 폐기하는지'가 격차를 만들고 있어, 캠페인 실험 주기를 월 단위에서 주 단위로 단축하는 조직 프로세스 개편이 필요하다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/marketing-predictions-for-2026/809124/"},{"title":"2026년 7월 첫째 주 마케팅 트렌드: GEO·에이전틱 광고·틱톡숍","summary":"구글이 마케팅 라이브에서 에이전틱 광고 도구를 출시했고, 스레드는 캐러셀·동영상 광고를 전 세계로 확대했다. 생성형 검색엔진최적화(GEO)가 확산되며 크리에이터의 1인칭 후기가 AI 답변엔진의 신뢰 신호로 부상하고 있다.","insight":"SEO 예산의 일부를 GEO(생성형 엔진 최적화)로 재배분하고, 크리에이터 협업을 소셜 캠페인이 아닌 'AI 답변엔진 노출 전략'으로 재정의해야 하는 시점이다.","source_name":"b2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"},{"title":"딜로이트, 2026년 마케팅 트렌드 발표","summary":"딜로이트 디지털이 2026년 마케팅을 관통할 핵심 트렌드 보고서를 발표했다. AI 기반 초개인화와 크리에이터 이코노미의 결합이 브랜드 전략의 중심으로 이동하고 있다는 점을 강조했다.","insight":"초개인화 실험은 데이터 품질이 뒷받침되지 않으면 오히려 신뢰를 깎아먹는 역효과를 낼 수 있어, 퍼스트파티 데이터 정합성 점검이 개인화 고도화보다 선행되어야 한다.","source_name":"Deloitte Digital","source_url":"https://www.deloittedigital.com/nl/en/insights/perspective/marketing-trends-2026.html"}]},"economy":{"domestic":[{"title":"6월 수출 1022억 달러…월간 사상 첫 1000억 달러 돌파","summary":"산업통상부에 따르면 6월 수출이 전년 동기 대비 70.9% 증가한 1022억 5000만 달러를 기록해 월간 기준 처음으로 1000억 달러를 넘었다. 무역수지도 361억 5000만 달러 흑자로 사상 처음 300억 달러를 돌파했으며, 반도체 수출이 200% 급증하며 실적을 견인했다.","insight":"반도체 편중 수출 구조가 심화되고 있어(반도체 200%↑ vs 비반도체 28%↑), 자사 사업이 반도체 사이클에 간접 노출된 B2B 영역이라면 하반기 재고 조정 국면의 수요 변동성을 시나리오에 포함해야 한다.","source_name":"헤럴드경제","source_url":"https://biz.heraldcorp.com/article/10794088"},{"title":"반도체 쇼크에 코스피 8000선 붕괴…원달러 환율 1550원대","summary":"미국 반도체주 급락 여파로 코스피가 개장 직후 5%대 폭락하며 8000선이 무너졌다. 동시에 원달러 환율은 2009년 3월 이후 약 17년 만에 최고 수준인 1550원대까지 치솟았다.","insight":"환율 급등은 수입 원가 상승으로 직결되므로, 해외 소싱·클라우드·광고 비용(달러 결제) 비중이 큰 서비스는 하반기 예산안에 환헤지 또는 원가 버퍼를 선반영해야 한다.","source_name":"Businesskorea","source_url":"https://www.businesskorea.co.kr/news/articleView.html?idxno=272352"},{"title":"2026년 벤처투자 제도 개편…투자의무 기간 3→5년 완화","summary":"중소벤처기업부가 벤처투자회사의 투자의무 이행 기간을 3년에서 5년으로 완화하고, 민간 벤처모펀드 최소 결성 규모를 1000억원에서 500억원으로 낮추는 등 벤처투자 제도를 대폭 개편했다. 법인의 벤처모펀드 출자 세액공제율도 3%에서 5%로 상향된다.","insight":"결성 문턱이 낮아진 만큼 소규모 특화 펀드 신설이 늘어날 가능성이 높아, 초기 스타트업이라면 대형 VC뿐 아니라 신규 소규모 섹터 펀드까지 투자 유치 채널을 넓혀볼 시점이다.","source_name":"머니투데이","source_url":"https://www.mt.co.kr/future/2026/01/06/2026010610512223219"}],"international":[{"title":"美 6월 고용 예상치 하회…S&P·다우는 사상 최고치 경신","summary":"미국 6월 비농업 고용이 시장 예상(11만7000명)을 크게 밑도는 5만7000명 증가에 그쳤다. 그럼에도 S&P500과 다우존스는 각각 0.72%, 0.29% 상승하며 다우는 사상 최고치인 53,055.91로 마감했다.","insight":"고용 둔화에도 증시가 오히려 상승한 것은 '고용 부진→금리 인하 기대'라는 시장 해석이 반영된 결과로, 실물 지표와 자산가격 사이 괴리가 커지는 국면에서는 소비 심리 지표를 별도로 모니터링해 매출 예측에 반영해야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/05/stock-market-today-live-updates.html"},{"title":"연준, 기준금리 3.50~3.75% 동결…연말 금리 전망은 상향","summary":"연방준비제도가 6월 FOMC에서 기준금리를 3.50~3.75%로 만장일치 동결했다. 다만 연말 기준금리 전망 중간값은 3월 3.4%에서 3.8%로 상향 조정돼 추가 긴축 가능성을 열어뒀다.","insight":"CPI가 4.2%까지 재상승하며 연준의 매파적 스탠스가 강화되고 있어, 달러 강세 장기화를 전제로 해외 매출 환헤지 전략과 달러 결제 비용 구조를 재점검해야 한다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"중국 경제, 대미 수출 반등에 6월 지표 개선","summary":"중국의 6월 제조업·소매판매 지표가 대미 수출 반등에 힘입어 개선세를 보였다. 7월 24일 종료 예정인 미국의 10% 관세 유예 조치를 앞두고 기업들이 선적을 서두르면서 수출이 일시적으로 급증한 영향으로 분석된다.","insight":"관세 유예 종료(7/24) 이후 대미 수출 되돌림이 예상되는 만큼, 중국발 공급망에 의존하는 하드웨어·제조 스타트업이라면 3분기 이후 리드타임과 단가 변동에 대비한 대체 소싱 플랜을 지금 마련해야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/06/29/china-economy-june-trade-exports-manufacturing-tariffs-iran-war-consumption-ai-technology-.html"}]},"summary":"AI 인프라 투자와 규제가 동시에 가속화되는 가운데 반도체발 환율·증시 변동성이 커지면서, 기업들은 AI 활용 전략과 함께 환리스크·공급망 관리 체계를 함께 점검해야 하는 시점이다."},"2026.07.08":{"date":"2026.07.08","it":{"domestic":[{"title":"가짜뉴스법 시행 첫날…공론장 위축 우려 확산","summary":"허위정보 유포에 최대 5배 손해배상을 물리는 개정 정보통신망법이 7일 시행됐다. 언론·시민단체는 표현의 자유 위축을, 정부는 허위조작정보 확산 방지를 각각 강조하며 시행 첫날부터 해석 논란이 이어졌다.","insight":"플랫폼·미디어 서비스는 콘텐츠 모니터링·신고 프로세스를 법 기준에 맞춰 즉시 재점검해야 하며, 사용자生成 콘텐츠(UGC) 리스크 관리 정책 업데이트가 시급하다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260707091726"},{"title":"디지털 분신이 뛰는 월드컵…AI가 바꾼 스포츠 관람 경험","summary":"FIFA와 레노버가 2026 월드컵 참가 선수 1,248명 전원의 디지털 트윈(분신)을 제작해 팬 경험에 활용한다. AI 기반 데이터 시각화로 실시간 전술 분석과 개인화 콘텐츠 제공이 가능해졌다.","insight":"스포츠 IP를 활용한 AI 개인화 콘텐츠는 팬 인게이지먼트와 신규 수익모델(디지털 굿즈, 개인화 하이라이트) 실험의 벤치마크 사례로 참고할 만하다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260707161714"},{"title":"'유니콘 될 스타트업 한눈에'…모험자본 투자 플랫폼 출시","summary":"네이버페이가 운영하고 금융감독원·중소벤처기업부가 연계를 지원하는 벤처투자 정보 플랫폼이 7일 오후 가동됐다. 증권사·VC가 유망 스타트업 정보를 한 곳에서 확인할 수 있도록 투자 정보 인프라를 통합했다.","insight":"초기 투자 유치를 준비하는 스타트업은 이런 공적 매칭 플랫폼 등록을 IR 채널 다각화 수단으로 활용할 수 있으며, PM은 경쟁사 투자 동향 트래킹에도 참고할 수 있다.","source_name":"아시아경제","source_url":"https://view.asiae.co.kr/article/2026070709591757425"}],"international":[{"title":"MS, Xbox·영업조직 중심으로 5,000명 감원","summary":"마이크로소프트가 전체 인력의 약 2.1%에 해당하는 약 4,800~5,000명을 감원한다고 발표했다. Xbox 부문과 상업 영업 조직이 가장 큰 타격을 받았으며, 회사는 AI 전환에 따른 조직 재설계를 배경으로 언급했다.","insight":"빅테크의 'AI발 구조조정'이 게임·영업 등 비핵심 AI 조직으로 확산되고 있어, 국내 기업도 AI 도입 로드맵과 인력 재배치 계획을 함께 커뮤니케이션할 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/06/microsoft-lays-off-nearly-5000-employees-across-xbox-commercial-sales/"},{"title":"구글, 개인정보 저장 범위 확대…AI 학습 옵트아웃 방법 화제","summary":"구글이 프라이버시 설정을 변경해 이미지·파일·음성·영상 기록까지 저장 범위를 넓히고 이를 AI 모델 학습에 활용할 수 있게 됐다. 이용자들이 데이터 제공을 거부(옵트아웃)할 수 있는 절차가 함께 소개됐다.","insight":"빅테크의 데이터 활용 정책 변경은 국내 서비스의 개인정보 처리방침·동의 UX 설계에도 벤치마크가 되며, 옵트아웃 마찰을 낮추는 UX가 신뢰 지표로 부상할 수 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/06/if-you-use-google-youre-training-its-ai-heres-how-to-opt-out/"},{"title":"올해 벌써 유니콘 90곳 탄생…AI 투자 광풍 지속","summary":"2026년 들어 지금까지 약 90개의 스타트업이 유니콘 지위를 획득했으며 대부분 AI 관련 기업이다. 제프 베이조스가 공동창업한 프로메테우스는 JP모건·블랙록 주도로 120억 달러 규모 시리즈B를 유치했다.","insight":"대형 자본이 소수 AI 기업에 집중되는 '바벨 현상'이 심화되고 있어, 중소 스타트업은 버티컬 특화·수익모델 차별화로 투자 유치 전략을 재점검해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/05/almost-40-new-unicorns-have-been-minted-so-far-this-year-here-they-are/"}]},"marketing":{"domestic":[{"title":"[마케팅 레이더] 7월 첫째 주 글로벌 이커머스·B2B 마케팅 이슈","summary":"아시아 지역에서 AI 쇼핑 에이전트·개인화 할인·라이브커머스 확산이 가속화되고 있다는 산업 분석이 나왔다. 에이전트 커머스 시장은 2026년 200억 달러에서 2029년 1,445억 달러 규모로 성장할 전망이다.","insight":"AI 쇼핑 에이전트향 상품 데이터 구조화(스키마, 속성 태깅)를 지금부터 준비하지 않으면 에이전트 기반 추천·구매 흐름에서 노출 자체가 배제될 위험이 있다.","source_name":"산업종합저널 FA","source_url":"https://industryjournal.co.kr/news/246630"},{"title":"코바코 \"2026년 광고시장, 성장과 조정 갈림길…디지털 재편 가속\"","summary":"한국방송광고진흥공사(코바코)가 2026년 국내 광고시장이 매체 간 양극화 속에서 디지털 중심으로 재편될 것이라는 전망을 발표했다. 온라인·디지털·리테일 미디어는 성장세, 방송·인쇄는 조정 국면이 예상된다.","insight":"매체 믹스 전략 수립 시 방송·인쇄 예산의 일률적 유지보다 리테일 미디어·디지털 채널로의 재배분 속도를 KPI 목표에 선반영해야 한다.","source_name":"코바코(KOBACO)","source_url":"https://www.kobaco.co.kr/site/main/board/news/24646"},{"title":"\"AI 마케팅 쓰는 마케터 75%, 성과 내는 건 13%\"…실행력 격차 확대","summary":"국내 마케팅 업계 조사에서 AI 도구를 활용하는 마케터는 75%에 달하지만 실질적 성과로 이어지는 비율은 13%에 불과한 것으로 나타났다. 도구 도입과 실행 역량 사이의 간극이 핵심 과제로 지적됐다.","insight":"AI 툴 도입 자체보다 캠페인 기획-소재 생성-성과 측정을 잇는 워크플로 표준화와 팀 역량 교육에 투자해야 실제 성과 전환율을 높일 수 있다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"}],"international":[{"title":"마이크스 핫허니, 축구 콜라보로 체험형 캠페인 실험","summary":"마이크스 핫허니가 시카고 파이어FC와 협업하고 배우 겸 뮤지션 태리크 트로터를 기용한 다채널 체험형 캠페인을 7월 1일 시작했다. 스포츠 IP와 배달 프로모션을 결합한 것이 특징이다.","insight":"메가 스포츠 이벤트(월드컵) 시즌을 활용한 비스포츠 브랜드의 컬래버 캠페인은 국내 F&B·소비재 브랜드의 하반기 캠페인 기획에도 참고할 만한 포맷이다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/mikes-hot-honey-spurs-experimentation-with-soccer-infused-campaign/824276/"},{"title":"2026년 상반기 베스트 브랜드 캠페인, 키워드는 '솔직함'","summary":"2026년 상반기 주요 브랜드들은 과거 실수를 인정하거나 AI 확산에 대한 우려를 정면으로 다루는 등 '솔직함'을 캠페인 전략의 축으로 삼았다. 무역분쟁·중동 분쟁발 인플레이션 우려 속 소비자 신뢰 회복이 배경으로 꼽힌다.","insight":"불확실한 거시경제 환경에서는 과장된 메시지보다 투명성·책임감을 강조하는 브랜드 커뮤니케이션이 신뢰 지표(NPS, 재구매율) 개선에 더 효과적일 수 있다.","source_name":"Marketing Dive","source_url":"https://www.marketingdive.com/news/best-brand-campaigns-h1-2026-sold-honesty-consumers-buying/819960/"},{"title":"7월 첫째 주 마케팅 트렌드: GEO·에이전틱 광고·틱톡숍","summary":"구글이 마케팅 라이브에서 에이전틱 광고 도구를 출시했고, Threads와 Instagram Reels도 새로운 광고 포맷을 확대했다. 생성형 엔진 최적화(GEO)와 크리에이터 신뢰 신호가 AI 검색 인용의 핵심 변수로 부상했다.","insight":"SEO에 이어 GEO(생성형 엔진 최적화) 대응 전략이 필수가 됐다. 콘텐츠 제작 시 AI 답변에 인용될 수 있는 구조화된 정보·크리에이터 협업을 병행 설계해야 한다.","source_name":"B2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"}]},"economy":{"domestic":[{"title":"원/달러 환율, 금융위기 이후 최고 수준 육박하며 1,500원대 등락","summary":"원/달러 환율이 달러 강세와 외국인 순매도 영향으로 1,500원대에서 등락하며 글로벌 금융위기 이후 최고 수준에 근접했다. 7일 개장가는 1,528.70원을 기록했다.","insight":"원화 약세가 장기화되면 해외 마케팅·광고 매체비, 해외 소싱 원가 등 달러 결제 비용이 늘어나므로 예산 재검토와 환헤지 전략을 함께 점검해야 한다.","source_name":"Investing.com","source_url":"https://kr.investing.com/currencies/usd-krw"},{"title":"한은, 기준금리 8회 연속 동결…7월 16일 회의 예정","summary":"한국은행이 기준금리를 2.50%로 8회 연속 동결했다. 6월 소비자물가 상승률은 3.2%로 소폭 상승했으며, 지정학적 리스크와 원화 약세, 인플레이션 재발 우려 사이에서 신중한 통화정책 기조가 이어지고 있다.","insight":"고금리 기조 장기화는 스타트업의 자금 조달 비용 상승으로 이어져 투자 유치 난이도가 높아질 수 있으므로, 런웨이 관리와 손익분기 시점 재산정이 필요하다.","source_name":"한국은행","source_url":"https://www.bok.or.kr/portal/singl/baseRate/list.do?dataSeCd=01&menuNo=200643"},{"title":"코스피, 연중 변동성 속 7,000선 후반대서 등락","summary":"코스피지수가 7,378선에서 8,136선 사이를 오가는 높은 변동성을 보이고 있다. K-팬덤주(화장품·식품·엔터)가 수출 호조에 힘입어 강세를 나타냈다.","insight":"증시 변동성 확대 국면에서는 광고·마케팅 예산 집행 시점을 분기별로 유연하게 조정할 수 있는 시나리오 플랜을 마련해두는 것이 안전하다.","source_name":"Investing.com","source_url":"https://kr.investing.com/indices/kospi-historical-data"}],"international":[{"title":"\"연준, 7월엔 금리 동결해야\"…워싱턴타임스 사설","summary":"워싱턴타임스가 7일 사설을 통해 연준이 7월 28~29일 FOMC 회의에서 금리를 동결해야 한다고 주장했다. 고용지표 둔화와 워시 의장의 신중한 발언이 추가 인상 기대를 낮췄다.","insight":"미국 금리 동결 기대가 확산되면 신흥국 자금 유입 여건이 다소 개선될 수 있어, 국내 기업의 해외 자금조달·환율 전략 타임라인에 참고할 시그널이다.","source_name":"The Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"연준, 6월 FOMC서 금리 3.50~3.75% 동결…워시 의장 첫 회의","summary":"연준 신임 의장 케빈 워시 취임 후 첫 FOMC에서 기준금리를 3.50~3.75%로 유지했다. 중동 분쟁으로 인한 에너지·원자재 공급 차질이 인플레이션 압력 요인으로 지목됐으며, 물가안정에 정책 초점이 맞춰졌다는 평가다.","insight":"에너지발 인플레이션이 지속되면 원자재를 활용하는 제조·물류 기반 서비스는 원가 전가 시점과 폭에 대한 커뮤니케이션 플랜을 미리 준비해야 한다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"},{"title":"7월 FOMC 금리 인상 가능성 낮아져…시장은 연말 인상 반영","summary":"고용지표 부진과 워시 의장의 신중한 발언으로 7월 FOMC 금리 인상 가능성이 낮아졌다. 반면 선물시장은 10월까지 3.8%, 연말께 4%에 근접하는 금리 경로를 반영하고 있다.","insight":"연내 금리 인상 가능성이 재부각되고 있어, 외화 부채가 있는 기업은 고정금리 전환이나 헤지 비율 확대 등 리파이낸싱 전략을 3분기 안에 검토하는 것이 바람직하다.","source_name":"Yahoo Finance","source_url":"https://finance.yahoo.com/economy/policy/articles/fed-hike-interest-rates-july-060507499.html"}]},"summary":"국내는 가짜뉴스법 시행과 AI 마케팅 실행력 격차가, 해외는 빅테크 AI발 감원과 연준의 신중한 금리 동결 기조가 오늘의 뉴스를 관통하는 핵심 흐름이다."},"2026.07.09":{"date":"2026.07.09","it":{"domestic":[{"title":"SKT·KT, '퀀텀코리아 2026'서 차세대 양자보안 기술 공개","summary":"SKT와 KT가 서울 DDP에서 열린 '퀀텀코리아 2026'에 참가해 양자키분배(QKD), 양자난수생성기(QRNG) 등 차세대 양자보안 기술과 서비스를 선보였다. SKT는 광집적회로 기반 초소형 QRNG 칩과 제로트러스트 보안 솔루션을, KT는 PQC·QKD 결합 기술과 신한은행·국립암센터 실증 사례를 공개했다.","insight":"AI·6G 시대 데이터 보안이 통신사의 새 수익모델로 부상하고 있어, B2B 보안 솔루션을 자사 서비스에 결합할 여지가 있는지 점검할 필요가 있다.","source_name":"아주경제","source_url":"https://www.ajunews.com/view/20260702105006193"},{"title":"LG유플러스, 지엔씨에너지와 AI데이터센터 전력 인프라 협력","summary":"LG유플러스가 발전설비 전문기업 지엔씨에너지와 업무협약을 맺고 AI데이터센터(AIDC)에 들어가는 비상발전기 등 전력 인프라 분야에서 협력하기로 했다. 파주 AIDC를 시작으로 향후 모든 AIDC 관련 전력 설비 확보와 표준화에 공동 대응한다.","insight":"AI 인프라 수요 급증으로 전력설비 공급까지 2년 가까이 걸리는 병목이 발생하고 있어, AI 서비스 확장을 계획 중이라면 인프라 리드타임을 로드맵에 선반영해야 한다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260628000022"},{"title":"SKT, 한국서비스품질지수(KS-SQI) 이동통신 부문 27년 연속 1위","summary":"SK텔레콤이 한국표준협회 주관 2026년도 KS-SQI 조사에서 이동통신 부문 1위에 올라 2000년 조사 시작 이래 27년 연속 정상을 지켰다. SK브로드밴드와 SK텔링크도 초고속인터넷·IPTV·국제전화 부문에서 각각 최장기 1위 기록을 이어갔다.","insight":"장기 고객만족 지표 1위가 신규 AI 서비스에 대한 신뢰 전이 효과로 이어질 수 있는 만큼, 기존 브랜드 신뢰 자산을 신사업 마케팅에 어떻게 활용할지 고민할 시점이다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026070187281"}],"international":[{"title":"MS, 25억달러 투입한 AI 배포 전담 자회사 'Frontier' 출범","summary":"마이크로소프트가 엔터프라이즈 AI 도입을 전담하는 신설 사업조직 'Microsoft Frontier Company'를 출범시키고 25억달러를 투자한다고 밝혔다. 6000명 규모의 산업·엔지니어링 전문가를 투입해 기업 고객의 AI 배포 성공률을 높이는 데 집중한다.","insight":"'AI 도구 판매'에서 '도입 성공 보장'으로 빅테크의 경쟁 축이 이동하고 있어, 자사 AI 기능도 판매 이후 온보딩·정착률 지표를 별도로 관리해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/"},{"title":"저커버그 \"AI 에이전트 발전 속도, 기대만큼 못 미쳐\"","summary":"마크 저커버그 메타 CEO가 내부적으로 AI 에이전트의 발전 속도가 예상보다 더디다고 언급했다. 메타는 앞서 8000명을 감원하고 7000명을 AI 조직으로 재배치한 상태다.","insight":"빅테크 수장이 직접 에이전트 기술의 기대치 조정을 언급한 만큼, 자사 로드맵에서도 '에이전틱 AI' 관련 출시 일정과 성과 지표를 보수적으로 재검토할 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/mark-zuckerberg-tells-staff-that-ai-agents-havent-progressed-as-quickly-as-hed-hoped/"},{"title":"2026년 테크업계 감원 12만명…AI가 주요 원인으로 지목","summary":"아마존, 아틀라시안, IBM 등 주요 테크기업들이 올해 누적 약 12만개 일자리를 감축했으며, 5월에는 AI가 감원의 가장 큰 사유로 꼽혔다. TechCrunch는 AI를 명분으로 한 감원 사례를 지속 집계 중이다.","insight":"구조조정과 AI 투자가 동시에 진행되는 국면에서, 자사 조직도 'AI 대체 가능 업무'와 '휴먼 온리 업무'를 미리 구분해두는 것이 향후 협상력에 유리하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/06/the-running-list-major-tech-layoffs-in-2026-where-employers-cited-ai/"}]},"marketing":{"domestic":[{"title":"네이버·카카오, 2026년 'AI 에이전트 전쟁' 본격화","summary":"네이버는 검색·쇼핑·예약·결제를 하나로 연결하는 '에이전트 N'을, 카카오는 대화 문맥 기반 쇼핑 제안이 가능한 '카나나'를 앞세워 AI 에이전트 수익화 경쟁에 나섰다. 양사 모두 2026년을 에이전틱 AI 기반 광고·커머스·결제 연결의 원년으로 삼고 있다.","insight":"플랫폼이 검색 결과 대신 '에이전트의 추천'으로 트래픽을 배분하기 시작하면 기존 SEO·검색광고 중심 마케팅믹스의 효율이 급격히 떨어질 수 있어, 에이전트 노출 최적화(AEO) 대응 여부를 점검해야 한다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260617000711"},{"title":"네이버 파워링크 광고 일시 미노출 오류…AI 검색전환기 리스크 부각","summary":"7월 6~7일 네이버 광고주센터에서 일부 파워링크 광고가 색인 지연으로 일시 미노출되는 오류가 발생했다가 복구됐다. 업계는 생성형 AI가 검색·광고·로컬 리뷰 이용 행태를 동시에 바꾸면서 디지털 광고 운영 리스크도 커지고 있다고 진단했다.","insight":"단일 플랫폼 의존도가 높은 광고 운영은 알고리즘·시스템 이슈 한 번에 매출 변동성이 커질 수 있으므로, 채널 다변화와 장애 대응 매뉴얼을 사전에 갖춰야 한다.","source_name":"산업종합저널","source_url":"https://industryjournal.co.kr/news/246642"},{"title":"국내 디지털 광고시장, 성장과 조정 공존…매체 간 양극화 심화","summary":"한국방송광고진흥공사(KOBACO)는 2026년 국내 광고시장이 온라인·디지털·리테일 미디어 중심으로 완만한 성장을 이어가는 반면 방송·인쇄 광고는 조정 국면에 들어설 것으로 전망했다. 매체 간 양극화가 당분간 지속될 것이라는 분석이다.","insight":"예산 재배분 시 리테일 미디어·디지털 채널 비중을 늘리는 경쟁사가 늘어날 것으로 예상되는 만큼, 자사 미디어믹스도 조정 시점과 기준을 데이터 기반으로 미리 설계해두는 것이 좋다.","source_name":"브랜드브리프","source_url":"https://www.brandbrief.co.kr/news/articleView.html?idxno=9545"}],"international":[{"title":"구글 마케팅 라이브 2026, 제미나이 기반 '에이전틱 광고' 포맷 대거 공개","summary":"구글이 마케팅 라이브 2026에서 AI 모드 응답 안에 직접 노출되는 대화형 발견 광고, AI 기반 쇼핑 광고, 리드용 비즈니스 에이전트 등 신규 광고 포맷을 발표했다. 광고 상품·전략을 총괄하는 통합 AI 에이전트 'Ask Advisor'도 함께 선보였다.","insight":"광고가 검색결과 옆이 아니라 AI 답변 '안'에 들어가는 구조로 바뀌면 클릭 기반 성과측정 방식 자체가 흔들릴 수 있어, KPI를 노출·클릭에서 대화형 전환 지표로 전환할 준비가 필요하다.","source_name":"Google Blog","source_url":"https://blog.google/products/ads-commerce/google-marketing-live-2026-collection/"},{"title":"메타, AI 비즈니스 어시스턴트 전 세계 모든 광고주로 확대","summary":"메타가 광고 계정 데이터를 기반으로 캠페인을 진단·추천하는 AI 비즈니스 어시스턴트를 미국·유럽·아태·중남미 전 지역 광고주와 대행사에 무료로 확대 적용했다. 도입 광고주는 계정 문제 해결률이 20% 높아지고 결과당 광고비가 12% 낮아진 것으로 나타났다.","insight":"AI 추천을 그대로 수용하는 경쟁사가 늘면 입찰 경쟁 강도가 높아질 수 있으므로, AI 추천값을 맹신하기보다 자사 데이터로 벤치마크를 검증하는 프로세스를 갖춰야 한다.","source_name":"eMarketer","source_url":"https://www.emarketer.com/content/meta-expands-ai-business-assistant-all-advertisers-its-latest-push-toward-automation"},{"title":"AI 오버뷰 확산에 클릭률 급감…GEO·에이전틱 광고 부상","summary":"미국 구글 검색의 약 68%가 클릭 없이 종료되고 AI 오버뷰 이용자가 25억명을 넘어서면서 상위 랭킹 페이지의 클릭률이 약 58% 감소한 것으로 나타났다. 이에 따라 생성형 AI 답변에 인용되기 위한 생성엔진최적화(GEO)와 에이전틱 광고가 새로운 마케팅 과제로 떠올랐다.","insight":"트래픽이 '검색 클릭'에서 'AI 답변 인용'으로 이동하는 구조적 변화이므로, 콘텐츠 전략의 성공 지표를 트래픽에서 인용률·언급 점유율로 바꿔야 할 시점이다.","source_name":"b2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"}]},"economy":{"domestic":[{"title":"원·달러 환율 1550원대 등극…17년 만에 최고치","summary":"6월 30일 서울 외환시장에서 원·달러 환율이 전일 대비 4.2원 오른 1549.4원에 마감해 2009년 3월 이후 최고치를 기록했다. 외국인의 국내 주식 대량 매도와 달러 강세, 내국인의 해외투자 확대가 겹치며 환율 상승 압력이 지속되고 있다.","insight":"수출 호조에도 환율이 오르는 것은 자본시장 수급 문제이므로, 원자재·해외조달 비중이 큰 사업이라면 환헤지 전략을 원가 기획 단계에서부터 반영해야 한다.","source_name":"이투데이","source_url":"https://www.etoday.co.kr/news/view/2598872"},{"title":"한국은행, 기준금리 2.50% 8회 연속 동결…인상 시점 첫 시사","summary":"한국은행 금융통화위원회가 기준금리를 연 2.50%로 8회 연속 동결하면서도 통화정책 결정문에 처음으로 '기준금리 인상 시기'를 명시해 긴축 재개 가능성을 시사했다. 반도체 수출 호조를 반영해 올해 GDP 성장률 전망치도 2.0%에서 2.6%로 대폭 상향했다.","insight":"금리 인상 시그널이 나온 만큼 대출 의존도가 높은 사업 계획은 자금조달 비용 상승 시나리오를 미리 반영해 두는 것이 안전하다.","source_name":"아주경제","source_url":"https://www.ajunews.com/view/20260528102813911"},{"title":"화장품株, 사상 최대 수출인데 주가는 부진…7월 실적 시즌 반격 노려","summary":"2026년 상반기 화장품 수출액이 69억9700만달러로 전년 대비 27.2% 늘며 사상 최대를 기록했지만, 테크 업종으로 수급이 쏠리며 5월 이후 화장품 관련주 주가는 약세를 보였다. 미국·유럽에서의 수출 성장이 중국 둔화를 상쇄하고 있다는 분석이다.","insight":"실적과 주가의 괴리는 '숫자가 좋아도 시장 내러티브가 없으면 저평가된다'는 신호이므로, 실적 발표 시점에 맞춘 스토리텔링·IR 커뮤니케이션 전략이 중요하다.","source_name":"이투데이","source_url":"https://www.etoday.co.kr/news/view/2600140"}],"international":[{"title":"미 연준, 7월 FOMC서 금리 동결 무게…인플레 압력 지속","summary":"연준은 7월 28~29일 FOMC 회의에서 기준금리를 3.5~3.75%로 동결할 것으로 예상된다. 에너지 등 공급 충격으로 인플레이션이 목표치 2%를 웃돌고 있어 추가 긴축 여지도 남겨두는 분위기다.","insight":"미국 금리 동결 장기화는 강달러·원화 약세 압력을 지속시키는 요인이므로, 원자재 수입 비중이 높은 사업은 환율 시나리오를 3분기 예산에 반영해야 한다.","source_name":"Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"호르무즈 해협 긴장 재고조…국제유가 6%대 급등","summary":"호르무즈 해협 인근 선박 피격과 미국의 대이란 제재 강화 가능성이 겹치며 7월 7일 브렌트유·WTI 모두 6%대 상승했다. 브렌트유는 배럴당 74달러, WTI는 70달러 선을 회복했다.","insight":"유가 변동성이 물류비·생산원가에 직결되는 업종은 시나리오 플래닝(고유가 지속 vs 완화)을 이번 분기 손익 예측에 명시적으로 반영해야 한다.","source_name":"헤럴드경제","source_url":"https://biz.heraldcorp.com/article/10802058"},{"title":"IMF, 2026년 세계 성장률 3%로 하향…한국은 2.6%로 상향","summary":"IMF가 세계경제전망(WEO) 7월 업데이트에서 2026년 세계 성장률 전망을 하향 조정했지만, 한국 성장률은 반도체 수출 호조를 반영해 2.6%로 올려 잡았다. IMF는 중동 정세 불확실성과 무역 분절화를 주요 하방 리스크로 지목했다.","insight":"글로벌 성장 둔화 속 한국만 상향된 것은 반도체 의존도가 높다는 뜻이므로, 특정 산업 편중 리스크를 사업 포트폴리오 차원에서 재점검할 필요가 있다.","source_name":"경향신문","source_url":"https://www.khan.co.kr/article/202607082200001"}]},"summary":"AI가 인프라 투자·감원·검색광고 구조까지 전방위로 재편하는 가운데, 원화 약세와 중동發 고유가가 한국 경제의 체력을 시험하는 하루였다."},"2026.07.10":{"date":"2026.07.10","it":{"domestic":[{"title":"이스트소프트, CJ올리브영에 8개국어 AI 쇼핑 어시스턴트 공급","summary":"이스트소프트가 실시간 대화형 AI 아바타 '페르소 인터랙'과 추천엔진 'AURA'를 결합해 CJ올리브영 매장에 다국어 AI 쇼핑 어시스턴트를 도입했다. 외국인 방문객이 많은 동대문·압구정·이대 3개 매장에 우선 적용되며 상품 추천, 통역, 세금환급 안내까지 자동화한다. 매장 운영 데이터를 분석하는 대시보드도 함께 제공된다.","insight":"오프라인 리테일에 AI 에이전트를 결합해 인건비 절감과 외국인 매출 전환율 개선을 동시에 노리는 사례로, 유사 리테일 서비스 기획 시 벤치마크할 만하다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/202607081780g"},{"title":"GIST, AI·반도체 융합인재 양성할 'AI대학' 출범","summary":"광주과학기술원(GIST)이 기존 정보컴퓨팅대학을 확대 개편해 AI대학을 공식 출범했다. AI학과, AX학과, 반도체공학과 등으로 구성되며 학부생 472명, 대학원생 518명 등 총 990명 규모다. 2027학년도부터 모집 정원을 100명 늘려 첨단 인재 양성을 강화할 계획이다.","insight":"국가 차원의 AI·반도체 인재 파이프라인 확대는 향후 채용 시장의 공급 구조를 바꿀 변수로, 인재 확보 전략을 세우는 조직은 이 흐름을 미리 반영해야 한다.","source_name":"헤럴드경제","source_url":"https://biz.heraldcorp.com/article/10800448"},{"title":"네이버·카카오, 커머스 AI 에이전트로 정면충돌","summary":"네이버는 통합 에이전트 '에이전트 N'으로 검색부터 쇼핑·결제를 잇는 생태계를, 카카오는 온디바이스 AI 기반 '카나나'로 카카오톡 내 개인비서 기능을 강화하며 경쟁하고 있다. 양사 모두 커머스를 AI 수익화의 핵심 축으로 지목했다.","insight":"AI 에이전트가 검색-구매 여정을 통째로 흡수하면 기존 퍼포먼스 마케팅의 랜딩 채널 자체가 바뀔 수 있어, 커머스/마케팅 PM은 에이전트 채널 대응 전략을 조기에 검토해야 한다.","source_name":"이지경제","source_url":"https://www.ezyeconomy.com/news/articleView.html?idxno=229034"}],"international":[{"title":"OpenAI, GPT-5.6 패밀리 공개…Sol·Terra·Luna 3종 출시","summary":"OpenAI가 신규 모델군 GPT-5.6을 발표했다. 주력 모델 'Sol', 중급 모델 'Terra', 저가형 'Luna'로 구성돼 다양한 가격대와 성능 요구에 대응한다. 경쟁이 격화되는 LLM 시장에서 세분화된 라인업 전략을 취했다.","insight":"모델 가격대 세분화는 B2B SaaS의 AI 원가 구조를 흔들 수 있어, AI 기능을 탑재한 프로덕트의 원가 전략을 재점검할 시점이다.","source_name":"TechCrunch","source_url":"https://t
