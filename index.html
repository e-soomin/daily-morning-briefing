echcrunch.com/2026/07/09/openai-launches-its-new-family-of-models-with-gpt-5-6/"},{"title":"메타, 'Muse Spark 1.1'로 AI 코딩 경쟁 본격 참전","summary":"메타가 에이전틱 코딩에 특화된 멀티모달 AI 모델 Muse Spark 1.1을 공개하며 OpenAI, Anthropic과 경쟁하는 AI 코딩 툴 시장에 뛰어들었다.","insight":"AI 코딩 툴 경쟁이 빅테크 간 표준 전쟁으로 확대되고 있어, 사내 개발 도구 선택 시 특정 벤더 종속 리스크를 미리 점검해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/09/meta-enters-the-crowded-ai-coding-battle-with-muse-spark-1-1/"},{"title":"애플, EU 디지털시장법 '게이트키퍼' 지정 항소 패소","summary":"EU 일반법원이 애플의 iOS·앱스토어 게이트키퍼 지정에 대한 항소를 기각했다. 이에 따라 애플은 대체 앱스토어 허용, 경쟁 서비스와의 상호운용성 지원 등 DMA 의무를 계속 이행해야 한다. 애플은 EU사법재판소에 재항소할 수 있다.","insight":"플랫폼 규제가 판례로 굳어지는 흐름이므로, 앱 유통·인앱결제에 의존하는 서비스는 대체 유통 채널 확보를 대비 시나리오로 준비해야 한다.","source_name":"JURIST","source_url":"https://www.jurist.org/news/2026/07/eu-general-court-upholds-apples-gatekeeper-designation-under-digital-markets-act/"}]},"marketing":{"domestic":[{"title":"인크로스, AI 기반 콘텐츠 마케팅 플랫폼 '스텔라이즈' 출시","summary":"인크로스가 브랜드와 크리에이터를 연결하는 AI 기반 콘텐츠 마케팅 서비스 '스텔라이즈'를 선보였다. 캠페인 기획부터 크리에이터 탐색, AI 매칭, 협업 관리, 성과 측정까지 하나의 플랫폼에서 처리할 수 있도록 설계됐다.","insight":"크리에이터 마케팅 운영이 매칭-집행-측정까지 올인원 툴로 통합되는 추세로, 자체 캠페인 운영 프로세스도 이런 툴 도입 여부를 검토할 필요가 있다.","source_name":"산업종합저널","source_url":"https://industryjournal.co.kr/news/246656"},{"title":"나스미디어, 2026 디지털 미디어·마케팅 전망 보고서 발표","summary":"kt나스미디어가 인앱 전략·경험 루프, AI 에이전트 상용화, 참여형 스트리밍 확대, 파트너십 광고 부상을 2026년 4대 핵심 변화로 제시했다.","insight":"AI 에이전트 상용화가 업계 컨센서스로 자리잡은 만큼, 매체 믹스 설계 시 에이전트 경유 트래픽에 대한 측정 지표를 별도로 정의해야 한다.","source_name":"kt나스미디어","source_url":"https://www.nasmedia.co.kr/%EC%A0%95%EA%B8%B0%EB%B3%B4%EA%B3%A0%EC%84%9C/2025%EB%85%84-12%EC%9B%94-2026-%EB%94%94%EC%A7%80%ED%84%B8-%EB%AF%B8%EB%94%94%EC%96%B4-%EB%A7%88%EC%BC%80%ED%8C%85-%EC%A0%84%EB%A7%9D/"},{"title":"코바코, \"2026 광고시장 성장과 조정 공존…매체 간 양극화 심화\"","summary":"한국방송광고진흥공사(코바코)가 2026년 광고 시장을 성장과 조정이 교차하는 과도기로 진단했다. 매체 간 광고비 배분의 양극화가 심화되고 있다고 분석했다.","insight":"예산이 소수 매체로 쏠리는 양극화 국면에서는 신규 채널 테스트보다 검증된 채널의 효율 극대화가 우선순위여야 한다.","source_name":"브랜드브리프","source_url":"https://www.brandbrief.co.kr/news/articleView.html?idxno=9545"}],"international":[{"title":"구글, AI로 제작된 광고에 '표시제' 도입","summary":"구글이 광고가 AI로 제작됐는지 이용자가 식별할 수 있도록 알리는 신규 기능을 도입한다. AI 생성 크리에이티브 확산에 따른 투명성 요구에 대응한 조치다.","insight":"AI 생성 광고 표시가 표준화되면 크리에이티브 신뢰도가 성과지표(CTR, 전환율)에 영향을 줄 수 있어, AI 소재와 인간 제작 소재의 성과를 구분 추적해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/09/google-will-now-disclose-which-ads-are-made-with-ai/"},{"title":"구글 마케팅 라이브, 에이전틱 광고 툴 인도 시장 확대","summary":"구글이 마케팅 라이브 인도 2026 행사에서 검색·유튜브·쇼핑·측정 전반에 걸친 에이전틱 광고 도구의 현지 베타 액세스를 공개했다.","insight":"에이전틱 광고 도구가 글로벌 순차 출시 단계에 있으므로, 국내 도입 시점을 가정한 사전 테스트 계획을 마련해두는 것이 유리하다.","source_name":"BestMediaInfo","source_url":"https://bestmediainfo.com/mediainfo/advertising/top-advertising-marketing-and-media-news-headlines-of-today-july-9-2026-12147674"},{"title":"\"셀럽보다 크리에이터\"…2026년 전환율 74% 크리에이터 콘텐츠","summary":"2026년 마케팅 트렌드 분석에 따르면 일반 크리에이터 콘텐츠가 셀럽 광고보다 높은 성과를 내고 있으며, 크리에이터 콘텐츠를 통한 쇼핑 전환 비율이 74%에 달한다.","insight":"브랜드 모델 예산의 일부를 마이크로 크리에이터 파트너십으로 재배분하는 것이 전환율 관점에서 더 효율적일 수 있다.","source_name":"b2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"}]},"economy":{"domestic":[{"title":"코스피, 급락 사흘 만에 반등…원달러 환율 1500원대 재진입","summary":"코스피 지수가 전일 대비 0.62% 오른 7291선에 마감하며 3거래일간 이어진 급락세를 멈췄다. 코스닥도 1.15% 상승한 794.00에 마감했으며, 원-달러 환율은 1506.1원으로 1500원대에 재진입했다.","insight":"단기 급등락 이후의 반등은 추세 전환이 아닌 기술적 되돌림일 가능성이 높아, 소비심리 연동 의사결정은 최소 1~2주 흐름을 더 지켜본 뒤 확정하는 것이 안전하다.","source_name":"비즈니스코리아","source_url":"https://www.businesskorea.co.kr/news/articleView.html?idxno=272774"},{"title":"1분기 파생결합증권·사채 발행 19.6조원…전년比 24% 증가","summary":"금융감독원에 따르면 2026년 1분기 파생결합증권·사채 발행액이 19조6000억원으로 전년 동기 대비 24.1% 증가했다. ELS·DLS는 6조7000억원, ELB·DLB는 12조9000억원 규모로 집계됐다.","insight":"투자심리 회복에 따른 파생결합상품 발행 증가는 소비 여력 회복의 선행 신호로 해석될 수 있어, 소비재·커머스 서비스의 프리미엄 상품 수요 변화를 함께 모니터링할 필요가 있다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026070820296"},{"title":"이번 주 금융 일정…금통위 의사록 공개, 금융위원장 정보보호의날 참석","summary":"7월 10일 한국은행이 7월 비통방 금통위 의사록을 공개하고, 이억원 금융위원장은 정보보호의날 기념행사에 참석한다. 금감원은 1분기 파생결합증권 현황도 함께 발표했다.","insight":"금통위 의사록 공개는 향후 기준금리 방향에 대한 힌트를 제공하므로, 금리 민감 사업(할부·구독형 상품 등)의 가격 전략 담당자는 원문 공개 직후 톤을 체크해야 한다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260703000901"}],"international":[{"title":"美 연준, 기준금리 3.50~3.75% 동결…신임 의장 워시 '포워드가이던스 폐기'","summary":"연준이 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했다. 새로 취임한 케빈 워시 의장은 물가 안정에 집중하겠다며 기존의 선제적 포워드 가이던스 제공 방식을 더 이상 쓰지 않겠다고 밝혔다.","insight":"연준의 가이던스 부재는 시장 변동성 확대로 이어질 가능성이 커, 환율·금리에 노출된 해외 소싱·해외 매출 비중이 큰 사업은 헤지 전략을 재점검해야 한다.","source_name":"Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"美 5월 소비자물가 4.1% 상승…2023년 이후 최고치","summary":"5월 미국 소비자물가지수(CPI)가 전년 대비 4.1% 올라 2023년 4월 이후 최고 상승률을 기록했다. 에너지·식품을 제외한 근원 PCE도 3.8% 상승해 에너지발 인플레이션이 다른 품목으로 확산되고 있다는 우려가 나온다.","insight":"인플레이션 재가속은 미국 소비자의 재량 지출 위축으로 이어질 수 있어, 미국 시장 대상 유료 구독·이커머스 서비스는 가격 저항 신호를 조기에 포착할 지표를 마련해야 한다.","source_name":"Intellectia","source_url":"https://intellectia.ai/blog/fed-interest-rate-decision-july-2026"},{"title":"호르무즈 해협 정상화·OPEC+ 증산에 국제유가 약세","summary":"호르무즈 해협 물류가 정상화되고 OPEC+가 증산에 나서면서 국제유가가 약세를 보이고 있다. 다만 일부 전문가는 글로벌 원유 재고 소진 속도를 감안하면 하반기 재차 급등할 가능성도 배제할 수 없다고 경고한다.","insight":"유가 방향성이 여전히 불확실한 만큼, 물류·배송 비용에 민감한 커머스 서비스는 유가 급등 시나리오에 대비한 배송비 정책 대안을 미리 준비해두는 것이 좋다.","source_name":"굿모닝경제","source_url":"https://www.goodkyung.com/news/articleView.html?idxno=288950"}]},"summary":"AI 에이전트가 검색·쇼핑·코딩·광고 전반의 실행 계층을 흡수하는 가운데, 미국은 물가 재가속과 통화정책 불확실성이, 국내는 급락 이후 반등한 증시가 단기 변동성 국면에 있음을 보여준다."},"2026.07.11":{"date":"2026.07.11","it":{"domestic":[{"title":"갤럭시 S26 시리즈, 사전판매 역대 최다 135만대 기록","summary":"삼성전자의 3세대 AI폰 '갤럭시 S26 시리즈'가 국내 사전판매 135만대를 기록하며 역대 갤럭시 S 시리즈 중 최다 실적을 세웠다. '에이전틱 AI'를 내세운 마케팅이 소비자 반응을 이끌어낸 것으로 분석된다.","insight":"하드웨어 스펙보다 '에이전틱 AI 경험'을 전면에 내세운 메시징이 사전판매 신기록으로 이어졌다는 점에서, 국내 소비자도 AI 기능 자체를 구매 결정 요인으로 받아들이기 시작했다는 신호로 봐야 한다.","source_name":"서울신문","source_url":"https://www.seoul.co.kr/news/economy/business-news/2026/06/25/20260625500050"},{"title":"더벤처스, 온디바이스 AI 스타트업 '아웃오브셋'에 시드 투자","summary":"더벤처스가 인터넷 연결 없이도 구동되는 초경량 버티컬 AI 모델을 개발하는 온디바이스 AI 스타트업 아웃오브셋에 시드 투자를 단행했다. 클라우드 의존도를 낮춘 경량 AI가 국내 스타트업 투자의 새로운 축으로 부상하고 있다.","insight":"온디바이스 AI는 API 비용과 지연시간 문제를 동시에 해결할 수 있어, PM 입장에서는 클라우드 LLM 의존 제품의 비용 구조를 재검토할 시점이라는 신호로 읽힌다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260520085541"},{"title":"노화 극복 나선 AI…장수·신경과학 스타트업에 다시 돈 몰린다","summary":"AI를 활용해 노화와 신경퇴행 질환에 도전하는 바이오테크 스타트업들이 잇따라 초기 투자를 유치하고 있다. 헬스케어와 AI의 결합이 새로운 투자 테마로 재조명받는 모습이다.","insight":"범용 AI 모델 경쟁이 포화 상태에 가까워지면서, 투자금이 버티컬 특화 AI(헬스케어·바이오)로 이동하는 흐름은 국내 스타트업에도 동일하게 적용될 가능성이 높다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260610161320"}],"international":[{"title":"애플, EU 디지털시장법(DMA) '게이트키퍼' 지정 소송 패소","summary":"EU 일반법원이 애플의 앱스토어와 iOS를 DMA상 핵심 플랫폼 서비스로 지정한 유럽집행위원회의 결정을 확정하며 애플의 항소를 기각했다. 애플은 EU사법재판소에 재항소할 수 있지만, DMA 규제 준수 부담은 당분간 이어질 전망이다.","insight":"국내 앱 마켓·플랫폼 사업자도 유사한 게이트키퍼 규제 도입 논의가 이어지고 있어, 이번 판례가 국내 입법 방향에도 참고 사례로 인용될 가능성이 크다.","source_name":"JURIST","source_url":"https://www.jurist.org/news/2026/07/eu-general-court-upholds-apples-gatekeeper-designation-under-digital-markets-act/"},{"title":"OpenAI GPT-5.6 정식 출시…SambaNova는 11조 밸류로 1조원 추가 투자 유치","summary":"OpenAI가 GPT-5.6 패밀리를 정식 출시(GA)했고, AI 추론 칩 스타트업 SambaNova는 제너럴 아틀란틱 주도로 1조원을 유치하며 기업가치 11조원을 인정받았다. 앤스로픽도 19조원 규모의 장기 데이터센터 계약을 체결하며 AI 인프라 투자 경쟁이 가속화되고 있다.","insight":"모델 성능 경쟁에서 추론 인프라·데이터센터 확보 경쟁으로 무게중심이 옮겨가고 있어, 자사 AI 기능의 원가 구조(추론 비용)를 로드맵 초기 단계부터 점검해야 한다.","source_name":"Tech Startups","source_url":"https://techstartups.com/2026/07/09/todays-biggest-technology-news-top-tech-stories-shaping-ai-big-tech-cybersecurity-and-startups/"},{"title":"인튜이트, VB Transform 2026서 엔터프라이즈 AI 인프라 재설계 사례 공개 예정","summary":"인튜이트가 오는 VB Transform 2026에서 복잡한 업무를 빠르게 처리하기 위해 AI 인프라를 전면 재구축한 과정을 공개할 예정이다. 엔터프라이즈용 에이전틱 AI 오케스트레이션이 컨퍼런스의 핵심 주제로 다뤄질 전망이다.","insight":"'AI 파일럿'에서 '전사 인프라 재설계'로 넘어가는 기업 사례가 늘고 있다는 것은, 국내 기업들도 이제 개별 기능 단위가 아닌 아키텍처 단위의 AI 전략을 준비해야 한다는 뜻이다.","source_name":"VentureBeat","source_url":"https://venturebeat.com/orchestration/intuit-will-show-off-how-it-rebuilt-its-ai-infrastructure-to-support-fast-and-complex-tasks-at-vb-transform-2026"}]},"marketing":{"domestic":[{"title":"네이버 '에이전트 N' vs 카카오 '카나나'…AI 에이전트 전쟁 본격화","summary":"네이버는 검색·쇼핑·지도·결제를 통합한 '에이전트 N'을, 카카오는 카카오톡 기반 온디바이스 AI '카나나'를 각각 내세우며 실행형 AI 경쟁에 나섰다. 양사 모두 커머스 에이전트를 초기 수익화 핵심 분야로 지목하고 있다.","insight":"검색광고 중심이던 국내 디지털마케팅 예산이 '에이전트 추천 노출'이라는 새로운 지면으로 이동할 가능성이 높아, 브랜드 마케터는 지금부터 에이전트 친화적 콘텐츠·상품 데이터 구조를 준비해야 한다.","source_name":"뉴데일리","source_url":"https://biz.newdaily.co.kr/site/data/html/2026/05/08/2026050800095.html"},{"title":"2026 광고 마케팅 트렌드 리포트 'ACTIVE 2026' 발간","summary":"오픈애즈가 발간한 'ACTIVE 2026' 리포트는 에이전틱 AI, 숏폼 커머스, 크리에이터 파트너십 광고 등을 올해 핵심 트렌드로 제시했다. 6만명 이상의 실무자가 이용하는 플랫폼 데이터를 기반으로 실무 적용 사례를 함께 담았다.","insight":"트렌드 리포트가 공통적으로 '에이전틱 광고'를 1순위로 꼽고 있다는 것은, 더 이상 개념 검증 단계가 아니라 예산 배분 우선순위 문제로 넘어왔다는 뜻으로 받아들여야 한다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=18876"},{"title":"오픈애즈, '2026년 5월 미디어&마켓 리포트' 공개","summary":"오픈애즈가 매체 트래픽, 광고 단가, 이커머스 전환율 벤치마크 등을 담은 월간 미디어&마켓 리포트 5월호를 공개했다. 11개 업종 1.4억 건 데이터를 기반으로 한 전환율 기준선 제공이 눈에 띈다.","insight":"업종별 전환율 벤치마크가 정기적으로 공개되는 만큼, 캠페인 성과 보고 시 절대 수치보다 업종 벤치마크 대비 상대 성과로 논리를 구성하는 것이 시니어 설득에 더 효과적이다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19359"}],"international":[{"title":"구글 마케팅 라이브 2026, '에이전틱 광고'로 전면 개편 선언","summary":"구글이 마케팅 라이브 2026에서 대화형 검색 광고, AI 기반 쇼핑 광고, 광고 전반을 아우르는 통합 에이전트 'Ask Advisor'를 공개했다. 제미나이를 중심으로 광고 제작부터 집행까지 전 과정을 자동화하는 것이 핵심 방향이다.","insight":"구글 광고 운영이 '캠페인 세팅'에서 'AI 에이전트에게 목표를 위임'하는 방식으로 바뀌는 만큼, 퍼포먼스 마케터의 역할도 실행에서 목표·가드레일 설계로 빠르게 이동해야 한다.","source_name":"Google Blog","source_url":"https://blog.google/products/ads-commerce/google-marketing-live-2026-collection/"},{"title":"오픈AI, 150조원 규모 광고 플랫폼 시장 정조준","summary":"오픈AI가 챗GPT 기반 광고 플랫폼을 전면 개방하며 2030년까지 약 150조원 규모의 광고 시장을 겨냥하고 있다. AI 챗봇이 검색을 대체하며 광고 생태계의 주도권이 이동할 조짐이다.","insight":"검색엔진 최적화(SEO) 예산의 일부가 향후 'LLM 노출 최적화(AEO/GEO)'로 옮겨갈 가능성이 높아, 브랜드는 지금부터 자사 콘텐츠가 AI 답변에 인용되는 구조를 실험해야 한다.","source_name":"Semafor","source_url":"https://www.semafor.com/article/06/22/2026/openais-100-billion-ad-bet"},{"title":"구글 마케팅 라이브 2026 총정리…광고주가 알아야 할 변화들","summary":"서치엔진랜드가 구글 마케팅 라이브 2026의 주요 발표를 총정리했다. 에이전틱 커머스, 멀티모달 크리에이티브 툴, AI 기반 상품 추천이 광고주 실무에 미칠 영향을 중점적으로 다뤘다.","insight":"발표된 신기능 대부분이 '자동화 우선(default-on)' 방식으로 출시되는 경향이 있어, 광고 운영팀은 신기능 적용 전 자동 실행 범위와 예산 가드레일을 사전에 반드시 검토해야 한다.","source_name":"Search Engine Land","source_url":"https://searchengineland.com/google-marketing-live-2026-everything-you-need-to-know-478167"}]},"economy":{"domestic":[{"title":"원·달러 환율 1550원대 안착…17년 3개월 만에 최고치","summary":"원·달러 환율이 1554.9원에 마감하며 2009년 글로벌 금융위기 이후 최고 수준을 기록했다. 미국의 금리 인상 기대와 외국인 자금의 국내 증시 이탈이 겹치며 '1550원 시대'가 현실화하고 있다는 평가다.","insight":"환율 상승이 구조적 국면으로 굳어질 경우 해외 클라우드·SaaS 비용, 해외 마케팅·미디어 바잉 단가 부담이 커지므로, 원가 구조에 달러 비용이 큰 프로덕트는 지금부터 헤지 또는 가격 정책 재검토가 필요하다.","source_name":"데일리안","source_url":"https://www.dailian.co.kr/news/view2/1661697/%EB%98%90-%EB%9A%AB%EB%A6%B0-1550%EC%9B%90%EC%84%A0%EC%9B%90%EB%8B%AC%EB%9F%AC-%ED%99%94%EC%9C%A8-17-2026"},{"title":"삼성전자, 2분기 영업이익 89.4조원…엔비디아·애플도 제쳤다","summary":"삼성전자가 2026년 2분기 매출 171조원, 영업이익 89.4조원의 잠정 실적을 발표하며 3분기 연속 역대 최대 실적을 경신했다. 분기 영업이익 기준으로 엔비디아, 애플 등 글로벌 빅테크를 넘어선 것으로 나타났다.","insight":"반도체 슈퍼사이클의 수혜가 실적으로 확인된 만큼, 국내 IT·플랫폼 기업들의 하반기 채용·R&D 투자 확대 여력도 함께 커질 가능성이 높아 관련 인력·파트너십 시장을 주시할 필요가 있다.","source_name":"CEO Magazine","source_url":"https://www.ceomagazine.co.kr/ko-kr/articles/34973"},{"title":"'검은 수요일'…반도체 고점 논란에 중동 리스크까지 겹치며 코스피 급락","summary":"코스피가 전일 대비 5.35% 급락한 7,246.79로 마감하며 한때 7,000선 붕괴 위험까지 노출됐다. 반도체 고점 논란에 이란의 중동 지역 미군 시설 공격 소식이 더해지며 낙폭이 확대됐다.","insight":"단일 종목 레버리지 ETF발 변동성 증폭이 급락의 부가 요인으로 지목된 만큼, 증시 변동성이 커진 시기에는 회사 스톡옵션·RSU 관련 사내 커뮤니케이션도 선제적으로 준비해두는 것이 좋다.","source_name":"파이낸셜뉴스","source_url":"https://www.fnnews.com/news/202607081555004619"}],"international":[{"title":"이란, 호르무즈 해협서 유조선 3척 공격…국제유가 3% 급등","summary":"이란 혁명수비대가 호르무즈 해협에서 카타르 LNG 운반선 등 선박 3척을 공격하며 국제 유가가 장중 3% 이상, 유럽 가스 선물은 약 7% 급등했다. 브렌트유는 배럴당 78달러를 돌파하며 하루 만에 5% 넘게 상승했다.","insight":"에너지 가격 변동성이 커지면 광고·물류 등 원가 민감 업종의 예산 재편이 뒤따르는 경향이 있어, 관련 업종 클라이언트를 둔 마케팅 조직은 하반기 예산 시나리오를 다변화해둘 필요가 있다.","source_name":"아시아투데이","source_url":"https://www.asiatoday.co.kr/kn/view.php?key=20260708001003573"},{"title":"미국, 이란에 재공습…종전 협상 최대 위기","summary":"미 중부사령부가 호르무즈 해협 상선 공격에 대한 대응으로 이란 내 80여개 표적을 정밀 타격했다. 지난달 체결된 종전 양해각서에 따라 면제됐던 이란산 원유 제재도 다시 복원되며 평화협상이 중대 기로에 섰다.","insight":"지정학적 리스크가 단기 이벤트가 아니라 협상 결렬 가능성까지 내포한 국면으로 진입한 만큼, 글로벌 공급망에 의존하는 서비스는 대체 벤더·경로 시나리오를 마련해둬야 한다.","source_name":"파이낸셜뉴스","source_url":"https://www.fnnews.com/news/202607080724270044"},{"title":"연준, '금리 동결' 유지 속 물가 압력에 매파적 신호","summary":"연준은 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했으며, 중동 사태로 인한 에너지발 공급 충격으로 물가 상승 압력이 지속되고 있다고 밝혔다. 시장은 연내 추가 0.25%p 인상 가능성을 반영하기 시작했다.","insight":"연준의 긴축 장기화 시그널은 원/달러 환율 상승 압력과 직결되므로, 해외 결제·구독 기반 매출 비중이 큰 서비스는 환율 민감도를 반기 실적 전망에 명시적으로 반영해야 한다.","source_name":"Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"}]},"summary":"중동발 지정학 리스크가 유가·환율·증시를 동시에 흔드는 가운데, 검색·광고·상거래 전반은 '에이전틱 AI' 중심으로 급속히 재편되고 있다."},"2026.07.12":{"date":"2026.07.12","it":{"domestic":[{"title":"특허 AI 스타트업 워트인텔리전스, 165억원 시리즈B 투자 유치","summary":"특허·IP 분석 AI 기업 워트인텔리전스가 알토스벤처스 주도로 165억원 시리즈B를 유치했다. 해외 사업자가 오랫동안 지배해온 국내 특허·IP 솔루션 시장에서 단일 라운드 기준 역대 최대 규모다.","insight":"버티컬 AI가 해외 대기업 종속적인 국내 전문 솔루션 시장을 대체할 수 있음을 보여주는 사례로, 니치 시장에서의 데이터 우위 전략을 참고할 만하다.","source_name":"스타트업레시피","source_url":"https://startuprecipe.co.kr/archives/5825400"},{"title":"오픈AI, 업무용 AI '챗GPT 워크' 정식 출시","summary":"오픈AI가 기업 업무 환경에 특화된 '챗GPT 워크'를 출시했다. 챗봇을 넘어 실제 업무 파트너로 기능하도록 설계됐다.","insight":"챗봇형 UX에서 워크플로우 통합형 AI 제품으로 무게중심이 이동하고 있어, 단순 Q&A 기능을 넘어선 태스크 자동화 로드맵을 검토해야 한다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260710115130"},{"title":"정부, 거브테크 스타트업 18곳에 AI 실증 무대 제공","summary":"정부가 거브테크 스타트업 18곳을 선정해 공공 부문 AI 실증 기회를 지원한다고 밝혔다.","insight":"공공 조달 레퍼런스 확보가 어려운 초기 스타트업에게 실증 사업은 B2G 진입 장벽을 낮추는 채널이 될 수 있어, 관련 협업 기회를 모니터링할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260706171849"}],"international":[{"title":"AI 산업, 3조 달러 질문에 답할 수 있을까","summary":"2026년 AI 인프라 투자가 1.5조 달러에 달할 것으로 예상되는 가운데, 이 투자를 정당화하려면 AI 산업이 3조 달러의 매출을 창출해야 한다는 분석이 나왔다.","insight":"투자 대비 실질 매출 증명이 업계 최대 화두로, 자사 AI 기능도 막연한 '도입'이 아니라 매출·비용 절감으로 연결되는 지표 설계가 필수다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/09/can-ai-answer-the-3-trillion-question/"},{"title":"저커버그 \"AI 에이전트 발전 속도, 기대에 못 미친다\"","summary":"마크 저커버그 메타 CEO가 직원들에게 AI 에이전트 기술의 발전 속도가 예상만큼 빠르지 않다고 언급했다.","insight":"빅테크 리더조차 에이전트 기술의 과대 기대를 인정한 것으로, 자사 로드맵에서도 에이전트 기능 출시 일정과 사용자 기대치 관리에 보수적 버퍼를 둘 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/mark-zuckerberg-tells-staff-that-ai-agents-havent-progressed-as-quickly-as-hed-hoped/"},{"title":"2026년 테크 감원, AI가 명분으로 지목된 사례 속출","summary":"2026년 들어 약 12만 명의 테크업계 인력이 감원됐으며, 5월에는 AI를 이유로 든 감원이 최근 몇 년 새 최고치를 기록했다.","insight":"AI 도입이 조직 구조조정의 공식 명분이 되는 흐름은 국내 조직에도 곧 영향을 미칠 수 있어, AI 대체 가능 업무와 인간 고유 역량 재정의를 선제적으로 준비해야 한다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/06/the-running-list-major-tech-layoffs-in-2026-where-employers-cited-ai/"}]},"marketing":{"domestic":[{"title":"네이버, 7월 21일부터 AI 브리핑 지면에 검색광고 노출","summary":"네이버가 AI 브리핑 지면에 검색광고를 노출하기 시작하며 AI 서비스 기반 수익화를 본격화한다. 광고 에이전트가 검색어와 AI 브리핑 문맥을 분석해 상품 광고를 매칭한다.","insight":"AI 답변 지면 자체가 새로운 광고 인벤토리로 전환되는 초기 사례로, '제로클릭' 환경에서 AI 문맥 기반 타겟팅 전략을 지금부터 테스트해야 한다.","source_name":"kt nasmedia 뉴스클리핑","source_url":"https://blog.nasmedia.co.kr/entry/20260622-news-clipping"},{"title":"네이버 AI탭 개편, 대형 마켓은 무료반품 경쟁 심화","summary":"네이버가 AI탭을 개편하고, 주요 이커머스 플랫폼들은 무료반품 정책 경쟁을 확대하고 있다.","insight":"검색-AI-커머스가 하나의 퍼널로 통합되는 가운데, 반품 정책 같은 오프라인 신뢰 요소가 전환율에 미치는 영향이 커지고 있어 CX 정책도 마케팅 KPI로 편입해야 한다.","source_name":"뉴닉","source_url":"https://newneek.co/@windly/article/42711"},{"title":"AI 활용 마케터 75%, 성과 내는 마케터는 13%뿐","summary":"오픈애즈 조사에 따르면 AI를 업무에 활용하는 마케터는 75%에 달하지만 실제 성과로 연결시키는 비율은 13%에 그쳤다.","insight":"'AI 도입'과 'AI로 성과 내기' 사이의 간극이 크다는 방증으로, 도구 도입 자체를 KPI로 삼지 말고 실행 프로세스와 성과 측정 체계를 먼저 설계해야 한다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"}],"international":[{"title":"틱톡, 광고주용 '에이전틱 허브' 출시","summary":"틱톡이 광고주가 자사 및 서드파티 AI 에이전트를 활용해 캠페인 제작·소재 생성·오디언스 분석·성과 리포팅까지 처리할 수 있는 '에이전틱 허브'를 공개했다.","insight":"광고 운영의 상당 부분이 에이전트에 위임되는 흐름은 매체 운영 인력의 역할을 '실행'에서 '에이전트 설계·검수'로 재편시킬 것이므로 조직 스킬셋 전환 계획이 필요하다.","source_name":"Social Media Today","source_url":"https://www.socialmediatoday.com/news/tiktok-launches-agentic-hub/824169/"},{"title":"틱톡샵, 리뷰 조작 근절 위해 유료·대가성 리뷰 전면 금지","summary":"틱톡샵이 대가를 받거나 유인성 리뷰, 리뷰 관리 서비스 이용을 전면 금지하기로 했다.","insight":"커머스 플랫폼이 신뢰 훼손 리스크를 선제 차단하는 흐름으로, 국내 커머스·리뷰 마케팅도 규제보다 앞서 자율 정화 기준을 마련하는 편이 리스크 관리에 유리하다.","source_name":"Stacked Marketer","source_url":"https://www.stackedmarketer.com/news/tiktok-hands-you-ai-ad-agents-episodic-drama-ads-and-cracks-down-on-fake-reviews/"},{"title":"구글·메타, 마케팅 라이브 앞두고 에이전틱 광고 도구 전면 확대","summary":"메타의 AI 비즈니스 어시스턴트가 전 세계 모든 광고주에 개방됐고, 구글은 마케팅 라이브에서 에이전틱 광고 도구를 공개하는 등 플랫폼들이 '생각하는 광고 시스템'으로 전환하고 있다.","insight":"플랫폼이 광고 의사결정의 상당 부분을 자동화하면서, 브랜드의 차별화 포인트는 소재 제작이 아니라 '무엇을 증명할 것인가'로 이동하고 있다는 점을 캠페인 기획에 반영해야 한다.","source_name":"B2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"}]},"economy":{"domestic":[{"title":"코스피 7,475선 급등 마감, SK하이닉스 나스닥 ADR 상장 효과","summary":"코스피가 SK하이닉스의 미국 나스닥 ADR 상장과 기관 순매수에 힘입어 2.52% 상승한 7,475.94에 마감했다. 코스닥도 5.47% 폭등했다.","insight":"반도체 대장주의 해외 상장 이벤트가 단기적으로 지수 전반의 투자심리를 견인한 사례로, 반도체 사이클과 자사 B2B 수요의 상관관계를 점검할 필요가 있다.","source_name":"아시아경제","source_url":"https://view.asiae.co.kr/article/2026071016004288687"},{"title":"삼성전자, 2분기 잠정실적 매출 171조·영업이익 89.4조 발표","summary":"삼성전자가 2026년 2분기 잠정실적으로 매출 171조원, 영업이익 89.4조원을 발표했다. 전분기 대비 영업이익이 56% 이상 증가했다.","insight":"메모리 업황 호조가 실적에 직접 반영된 사례로, 반도체 공급사와 협업하는 하드웨어·디바이스 조직은 부품 단가 및 공급 우선순위 변화를 조기에 체크해야 한다.","source_name":"비즈니스리포트","source_url":"http://www.businessreport.kr/news/articleView.html?idxno=52960"},{"title":"원·달러 환율, SK하이닉스 상장 기대에 1,500원 하회 시도","summary":"SK하이닉스의 미국 ADR 상장 기대감에 위험선호 심리가 살아나며 원·달러 환율이 1,500원 하회를 시도했다. 실제 오전 9시 기준 1,506.2원을 기록했다.","insight":"반도체 훈풍이 환율에도 영향을 미치는 만큼, 해외 소싱·매체비 집행 비중이 큰 조직은 예산을 환율 변동 시나리오별로 재점검해야 한다.","source_name":"이데일리","source_url":"https://edaily.co.kr/News/Read?mediaCodeNo=257&newsId=02791286645513208"}],"international":[{"title":"연준, 기준금리 3.50~3.75% 동결... 7월 28~29일 추가 회의","summary":"연준이 6월 FOMC에서 기준금리를 3.50~3.75%로 동결했으며, 다음 회의는 7월 28~29일로 예정돼 있다. 중동 사태에 따른 불확실성에도 경제는 완만히 확장 중이다.","insight":"'higher-for-longer' 기조가 장기화되는 만큼, 해외 진출·투자 계획이 있는 조직은 자금조달 비용이 단기간에 낮아지지 않는다는 전제로 예산 계획을 짜야 한다.","source_name":"The Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"중동 분쟁 재개로 국제유가 상승, 호르무즈 해협 통행 지연","summary":"미국-이란 간 공습 재개로 호르무즈 해협 유조선 통행 정상화가 지연되며 국제유가가 배럴당 72달러를 상회, 주간 기준 약 5% 상승했다.","insight":"물류·원자재 원가에 민감한 커머스·제조 서비스는 유가발 원가 상승분을 가격·마진 시나리오에 즉시 반영해야 하며, 에너지 리스크를 분기별 리스크 대장에 상시 등재할 필요가 있다.","source_name":"Federal News Network","source_url":"https://federalnewsnetwork.com/prediction-markets/2026/07/oil-prices-rise-conflict-middle-east-resumes-trade-markets-wti-oil-price/"},{"title":"중동 재충돌 우려에도 시장은 진정, 다만 유가는 재상승","summary":"중동 지역의 재충돌 우려에도 글로벌 증시는 큰 동요 없이 진정세를 보였으나, 휘발유 가격은 다시 상승했다.","insight":"시장이 지정학 리스크에 내성을 갖기 시작했다는 신호로 해석될 수 있지만, 실물 경제 원가에는 여전히 영향이 누적되고 있어 매크로 지표와 실물 원가 지표를 분리해서 모니터링해야 한다.","source_name":"The Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/9/markets-shake-worries-renewed-mideast-fighting-though-gas-prices-rise/"}]},"summary":"AI 투자 정당성 논쟁과 에이전틱 광고·커머스 확산이 IT·마케팅을 관통하는 가운데, 반도체 훈풍이 국내 증시와 원화를 끌어올리고 중동發 유가 불안이 글로벌 경제의 배경 리스크로 남았다."},"2026.07.13":{"date":"2026.07.13","it":{"domestic":[{"title":"네이버페이, 모험자본 투자 플랫폼 'Npay 스타트업' 출범","summary":"네이버페이가 경기 성남 네이버 1784에서 투자자와 스타트업·벤처기업을 연결하는 모험자본 투자 플랫폼 'Npay 스타트업'의 파일럿 운영을 시작했다. AI 요약과 AI 검색으로 IR 자료를 분석하고 투자 조건에 맞는 기업을 찾아주는 기능을 제공하며, 약 3개월간 시범 운영 후 데이터 신뢰성 검증 체계를 보완할 계획이다.","insight":"대형 플랫폼이 스타트업 투자 정보의 '검색·매칭' 단계를 AI로 표준화하면 초기 투자 유치 경쟁의 기준선이 달라진다. 자사 서비스가 이런 플랫폼에 어떻게 노출되고 평가될지 미리 점검할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260707135536"},{"title":"삼성전자, AI 서버용 eSSD 'PM1763' 양산 돌입","summary":"삼성전자가 9세대 V낸드와 4나노 컨트롤러를 적용한 PCIe 6.0 기반 기업용 SSD 'PM1763' 양산을 시작했다. 16TB 모델은 순차 읽기·쓰기 속도가 이전 세대보다 약 2배 빨라져 40GB급 LLM을 1.4초에 전송할 수 있으며, 엔비디아 차세대 플랫폼 '베라 루빈'에 HBM4와 함께 공급된다.","insight":"AI 서비스의 응답 속도는 결국 이런 하드웨어 세대교체 주기에 종속된다. 인프라 벤더의 로드맵을 제품 성능 목표(SLA) 수립 시 리스크 변수로 반영해야 한다.","source_name":"전자신문","source_url":"https://www.etnews.com/20260708000148"},{"title":"가짜뉴스법 시행 첫날 '딜레마'…공론장 위축 우려","summary":"가짜뉴스 관련 규제법 시행 첫날, 허위 정보 근절과 표현의 자유 위축 사이의 갈등이 현실화되고 있다는 진단이 나왔다. 플랫폼 사업자와 언론계는 판단 기준의 모호함으로 실무 적용에 혼란을 겪고 있다.","insight":"UGC·커뮤니티 기능을 가진 서비스라면 콘텐츠 신고·검증 프로세스를 법 시행에 맞춰 선제적으로 재정비해야 한다. 정책 리스크를 사후 대응이 아닌 제품 설계 단계에서 흡수하는 것이 저비용 대응이다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260707091726"}],"international":[{"title":"메타, 스페이스X처럼 남는 AI 컴퓨팅 자원을 현금화 시도","summary":"메타가 자체 AI 인프라 투자 부담을 줄이기 위해 유휴 컴퓨팅 자원을 외부에 판매하는 클라우드 사업 진출을 검토 중이다. 이는 AWS·구글클라우드·MS애저 등 기존 클라우드 강자들과의 정면 경쟁을 의미한다.","insight":"빅테크의 AI 인프라 과잉투자가 '컴퓨팅 재판매'라는 새 수익모델로 전환되는 초기 신호다. 클라우드 비용 구조에 의존하는 서비스라면 향후 가격 경쟁 심화 가능성을 염두에 둘 필요가 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/01/meta-like-spacex-looks-to-turn-excess-ai-compute-into-cash/"},{"title":"저커버그 \"AI 에이전트 발전 속도, 기대보다 더뎌\"","summary":"마크 저커버그 메타 CEO가 내부 타운홀에서 AI 에이전트의 발전 속도가 예상만큼 빠르지 않았다고 밝혔다. 메타는 그럼에도 올해 최대 1450억 달러를 AI 인프라에 투입할 계획이다.","insight":"'에이전트가 곧 모든 걸 대체한다'는 낙관적 로드맵을 세운 팀이라면, 빅테크 CEO의 이 발언을 근거로 자사 에이전트 기능의 출시 타임라인과 기대 수준을 다시 조정할 근거로 삼을 만하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/02/mark-zuckerberg-tells-staff-that-ai-agents-havent-progressed-as-quickly-as-hed-hoped/"},{"title":"AI 스타트업들, 매출 성장 속도 점점 빨라져","summary":"앤트로픽은 5월 말 연매출 실행률 470억 달러를 돌파했으며 두 달 전 300억 달러 돌파 이후 급격한 성장세를 이어갔다. 글린 등 다른 AI 스타트업들도 6개월 만에 ARR을 2억에서 3억 달러로 끌어올리는 등 유사한 가속 성장을 보이고 있다.","insight":"매출 성장 속도의 '가속' 자체가 새로운 벤치마크가 되고 있다. 투자 유치나 내부 목표 설정 시 절대 매출 규모보다 성장 가속도를 핵심 지표로 함께 제시하는 것이 설득력을 높인다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/08/these-ai-startups-are-growing-revenue-at-faster-and-faster-rates/"}]},"marketing":{"domestic":[{"title":"'팝업스토어=성수동' 공식 깨졌다","summary":"성수동에 집중되던 팝업스토어 트렌드가 다른 지역으로 확산되며 공식이 깨지고 있다는 분석이 나왔다. 브랜드들은 차별화를 위해 새로운 입지와 콘셉트를 실험하는 추세다.","insight":"특정 '성지'에 의존한 오프라인 마케팅은 포화되는 순간 효율이 급락한다. 입지 선정 기준을 트래픽이 아닌 타겟 밀도와 체류 목적 적합도로 재설계할 시점이다.","source_name":"시사N라이프","source_url":"https://sisa-n.com/View.aspx?No=4142198"},{"title":"[안녕, 2026] 먼저 알아야 할 2026년 마케팅·AI 트렌드 모음","summary":"오픈애즈가 AI 마케팅, 발견형 커머스, 초개인화 등 2026년 마케팅·AI 핵심 트렌드를 정리해 공개했다. AI를 활용하는 마케터는 75%에 달하지만 실제 성과로 연결되는 비율은 13%에 불과하다는 조사 결과도 함께 제시됐다.","insight":"'AI 도입률'과 '성과 전환율' 사이 격차가 62%p라는 점이 핵심이다. 도구 도입 자체를 KPI로 삼지 말고, 도입 이후 워크플로 재설계까지 완료했는지를 성과 측정 기준으로 못박아야 한다.","source_name":"오픈애즈","source_url":"https://openads.co.kr/content/contentDetail?contsId=17722"},{"title":"선 넘은 AI 광고, 페리카나 '불륜 연상' 논란에 영상 삭제","summary":"치킨 프랜차이즈 페리카나가 AI로 제작한 광고 영상이 불륜을 연상시키는 설정으로 온라인에서 비판받아 영상을 삭제했다. 페리카나는 제작 과정에서 표현의 적절성과 사회적 인식을 충분히 고려하지 못했다고 해명했다.","insight":"AI 생성 콘텐츠는 제작 속도가 빨라진 만큼 내부 검수 단계가 함께 압축되는 부작용이 있다. AI 광고 제작 파이프라인에 별도의 사회적 민감성 체크리스트와 승인 게이트를 명시적으로 넣어야 한다.","source_name":"Daum(디지털타임스 등 종합)","source_url":"https://v.daum.net/v/20260512130738085"}],"international":[{"title":"AI 생성 광고도 표절 논란…피카·힉스필드 5일 간격 유사 영상 공개","summary":"AI 영상 생성 스타트업 피카와 힉스필드가 5일 간격으로 구성이 거의 동일한 홍보 영상을 각각 공개하며 표절 논란이 불거졌다. 힉스필드는 SNS에서 반응이 좋은 '논란성 콘텐츠'를 의도적으로 학습해 제작한다고 밝힌 바 있어 AI가 창작의 독창성을 얼마나 해치는지에 대한 우려가 커지고 있다.","insight":"AI 생성 툴이 보편화되면 경쟁사 크리에이티브를 빠르게 모방·역설계하는 것도 쉬워진다는 뜻이다. 자사 캠페인의 차별점을 '연출 아이디어'가 아니라 데이터·타겟팅·오프라인 연계 같은 모방하기 어려운 요소에 둬야 한다.","source_name":"The Information","source_url":"https://www.theinformation.com/newsletters/ai-agenda/pika-vs-higgsfield-feud-copying-shows-ai-makes-mimicry-easy"},{"title":"7월 첫째 주 마케팅 트렌드: GEO·에이전틱 광고·틱톡숍","summary":"생성형 검색엔진최적화(GEO), 에이전틱 광고, 틱톡숍 중심의 커머스가 7월 첫째 주 마케팅 업계의 핵심 화두로 떠올랐다. 구글은 마케팅 라이브에서 에이전틱 광고 도구를 공개했고, 메타의 AI 광고 어시스턴트는 전 세계 광고주에 전면 확대됐다.","insight":"SEO 예산을 GEO(생성형 엔진 최적화)로 일부 전환하지 않으면 AI 답변 인용에서 누락되는 리스크가 커진다. 콘텐츠 전략에 'LLM 인용 최적화'를 신규 KPI로 추가할 필요가 있다.","source_name":"b2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"},{"title":"2026년 7월 인플루언서 마케팅 트렌드","summary":"일반 크리에이터 콘텐츠가 셀럽 광고보다 구매 전환율에서 우위를 보이며, 2026년 소비자의 74%가 크리에이터 콘텐츠를 통해 구매했다는 조사 결과가 나왔다. 유튜브는 AI 답변 인용에서도 21%가 넘는 점유율로 가장 많이 인용되는 도메인으로 집계됐다.","insight":"인플루언서 예산 배분 기준을 '팔로워 수'에서 '전환 기여도+AI 검색 노출 기여도'로 이원화해야 한다. 특히 유튜브 콘텐츠는 광고 성과와 별개로 AI 검색 가시성 자산으로도 별도 평가할 가치가 있다.","source_name":"Newengen","source_url":"https://newengen.com/insights/influencer-marketing-trends-july/"}]},"economy":{"domestic":[{"title":"SK하이닉스 美 ADR에 260조원 몰려…37조 '역대급 IPO'","summary":"SK하이닉스의 나스닥 ADR 상장 수요예측에 공모 물량의 7배가 넘는 약 260조원이 몰렸다. 조달 규모는 약 37조원으로 2014년 알리바바에 이어 외국기업의 미국 상장 중 역대 두 번째 규모이며, 7월 10일부터 나스닥에서 거래를 시작했다.","insight":"국내 대표 반도체 기업의 해외 자금조달 성공은 앞으로 K-반도체·K-테크 기업들의 해외 상장 러시로 이어질 수 있는 선례다. 관련 밸류체인 기업의 투자·채용 계획을 이 자금 조달 타임라인에 맞춰 모니터링할 필요가 있다.","source_name":"Investing.com(EBN)","source_url":"https://kr.investing.com/news/stock-market-news/article-2009949"},{"title":"코스피, 반도체주 반등에 힘입어 4거래일 만에 상승","summary":"코스피가 반도체 투자심리 회복에 힘입어 4거래일 만에 상승 마감하며 7500선에 근접했다. 최근 한 주 사이 메타의 클라우드 사업 진출 소식 등으로 반도체 투자심리가 흔들렸던 흐름이 일부 되돌려졌다.","insight":"반도체 업종 의존도가 높은 코스피 특성상, 빅테크의 인프라 투자 발표 하나에도 지수가 출렁인다. 국내 상장사와 협업·투자를 논의 중이라면 이런 단기 변동성을 협상 타이밍 리스크로 별도 관리해야 한다.","source_name":"EKN 경제 뉴스","source_url":"https://www.ekn.kr/web/view.php?key=20260709027470985"},{"title":"원/달러 환율, 외국인 순매도 속 등락","summary":"7월 초 원/달러 환율은 국내 증시에서의 외국인 순매도와 달러 수요 확대 영향으로 상승세를 보이다 중순 들어 하락 전환했다. 6월 수출은 전년 대비 70.9% 늘어난 1022억 5000만 달러로 월간 최초로 1000억 달러를 넘어서며 환율에 우호적 요인으로 작용했다.","insight":"수출 호조와 외국인 자금 이탈이라는 상반된 힘이 동시에 작용해 환율 방향성이 불안정하다. 해외 결제·해외 마케팅 예산이 있는 조직은 단일 시점 환전보다 분할 환전으로 리스크를 분산하는 편이 안전하다.","source_name":"KB의 생각","source_url":"https://kbthink.com/investment/fx/daily/260709.html"}],"international":[{"title":"美 증시, 실적 시즌 앞두고 상승…SK하이닉스 ADR 데뷔 흥행","summary":"월가는 실적 시즌을 앞두고 지정학적 이슈를 살피는 가운데 지수를 끌어올렸고, S&P500은 사상 최고치에 근접했다. SK하이닉스 ADR은 나스닥 데뷔 첫날 공모가 대비 13% 급등했다.","insight":"한국 기업의 미국 증시 데뷔가 흥행하면서 미국 투자자들의 'K-반도체' 관심이 재확인됐다. 미국 파트너·투자자 대상 IR 자료에 이런 벤치마크를 활용해 협상력을 높일 수 있다.","source_name":"Bloomberg","source_url":"https://www.bloomberg.com/news/articles/2026-07-09/stock-market-today-dow-s-p-live-updates"},{"title":"\"연준, 이번엔 금리 동결해야\"…인플레이션 우려 속 신중론","summary":"중동 분쟁에 따른 에너지 가격 상승으로 인플레이션이 목표치인 2%를 상회하는 상황에서, 연준이 7월 28~29일 회의에서 금리를 동결해야 한다는 신중론이 제기됐다. 시장은 2026년 중 최소 한 차례 금리 인상 가능성도 일부 반영하고 있다.","insight":"금리 방향성이 인상·동결 양쪽으로 갈리는 불확실 국면에서는 해외 투자·조달 계획의 확정 시점을 너무 앞당기지 않는 것이 리스크 관리 측면에서 유리하다. 7월 말 FOMC 발표 전까지는 주요 재무 의사결정을 유보 시나리오로 준비해두는 것이 합리적이다.","source_name":"The Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"IEA \"2026년 세계 석유 수요, 코로나 이후 첫 연간 감소\"","summary":"국제에너지기구(IEA)는 호르무즈 해협 봉쇄로 인한 수출 차질과 고유가로 2026년 세계 석유 수요가 전년 대비 100만b/d 감소할 것으로 전망했다. 이는 2020년 코로나19 팬데믹 정점 이후 첫 연간 감소로, 공급도 3.9백만b/d 줄어든 뒤 2027년 반등할 것으로 예상된다.","insight":"에너지 가격발 인플레이션이 장기화되면 물류·생산 비용에 의존하는 산업의 원가 구조가 흔들린다. 원자재·물류 비용 비중이 큰 사업이라면 2027년 반등 전까지의 완충 원가 계획을 별도로 마련해야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/10/iea-world-oil-demand-declines-iran-war.html"}]},"summary":"SK하이닉스의 나스닥 ADR 흥행과 반도체 랠리가 국내 증시를 견인하는 동시에, AI 인프라·에이전트 기대치 조정과 AI 생성 콘텐츠의 표절·윤리 논란이 IT·마케팅 전반에서 동시에 부각된 하루였다."},"2026.07.14":{"date":"2026.07.14","it":{"domestic":[{"title":"삼성전자, 구글 클라우드 '제미나이 엔터프라이즈' 전사 도입","summary":"구글 클라우드가 삼성전자 DX부문 전 세계 임직원에게 '제미나이 엔터프라이즈'를 공급한다고 밝혔다. 국내 시장 내 최대 규모의 에이전틱 AI 도입 사례로, 삼성전자 전용 클라우드 테넌트에 배포돼 데이터 주권도 강화했다. 비개발 인력도 노코드로 맞춤형 AI 에이전트를 만드는 '전사적 AI 대중화'가 목표다.","insight":"대기업이 전사 단위로 에이전틱 AI를 깔기 시작했다는 건 사내 툴 도입 기준이 '챗봇 성능'에서 '거버넌스·데이터 주권'으로 넘어갔다는 신호다. 자사 서비스에 AI 기능을 붙일 때도 보안·테넌시 설계를 먼저 검토해야 한다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/202607130973g"},{"title":"OpenAI, GPT-5.6 정식 출시…정부 요청으로 출시 일정 늦춰","summary":"OpenAI가 7월 9일 GPT-5.6 패밀리(Luna·Terra·Sol)를 정식 출시했다. 당초 6월 출시 예정이었으나 정부 요청으로 일정이 조정됐다. 주력 모델 Sol은 코딩 작업에서 이전 대비 54% 더 토큰 효율적이라고 밝혔다.","insight":"모델 출시가 정부 개입으로 지연된 첫 사례라는 점이 중요하다. AI 로드맵을 짤 때 이제는 '기술 준비도'뿐 아니라 '규제 리드타임'을 별도 변수로 넣어야 한다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260629155129"},{"title":"삼성전자, 2026년 2분기 잠정실적 매출 171조·영업이익 89.4조 발표","summary":"삼성전자가 2026년 2분기 연결기준 잠정 매출 171조원, 영업이익 89조4000억원을 발표했다. 전분기 대비 매출은 27.7%, 영업이익은 56.2% 증가했으며 전년 동기 대비로는 영업이익이 18배 이상 늘었다.","insight":"메모리·AI 반도체 사이클의 회복이 실적에 그대로 반영됐다. 다만 다음 기사(코스피 급락)에서 보듯 반도체주 변동성이 커진 시점이라, 실적 서프라이즈와 주가 반응이 어긋날 수 있다는 점을 함께 봐야 한다.","source_name":"우먼타임스","source_url":"https://www.womentimes.co.kr/news/articleView.html?idxno=104184"}],"international":[{"title":"메타, 캐나다에 첫 AI 데이터센터 건설…9조원 이상 투자","summary":"메타가 캐나다 앨버타주에 1GW 규모의 첫 AI 데이터센터를 짓는다. 투자 규모는 90억 달러(약 13조 캐나다달러) 이상이며, 미국 밖 메타 시설 중 최대 규모다. 냉각에 물을 쓰지 않는 폐쇄형 액체냉각 시스템을 채택했다.","insight":"빅테크의 AI 인프라 경쟁이 자국을 넘어 전력·용수 조달이 쉬운 지역으로 확장되는 흐름이다. 국내 서비스도 트래픽이 커지면 클라우드 리전 다변화·전력 비용 구조를 지금부터 시나리오에 넣어야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/08/meta-is-building-its-first-big-data-center-in-canada-amid-ai-push.html"},{"title":"구글 포토, 제미나이 옴니 기반 '비디오 리믹스' 출시","summary":"구글 포토가 멀티모달 모델 '제미나이 옴니'를 활용한 'Video Remix' 기능을 출시했다. 수채화·스케치북 등 템플릿으로 영상 스타일을 바꾸고 조명을 보정할 수 있으며, 한국을 포함한 주요 국가의 유료 구독자에게 순차 제공된다.","insight":"소비자용 생성형 편집 기능이 구독 상품의 핵심 락인 요소로 자리잡고 있다. 콘텐츠·커머스 서비스라면 '생성'보다 '리믹스·편집'형 AI 기능이 사용자 리텐션에 더 잘 먹힐 수 있다는 참고 사례다.","source_name":"9to5Google","source_url":"https://9to5google.com/2026/07/08/google-photos-video-remix/"},{"title":"최초의 '에이전틱 랜섬웨어' JadePuffer 등장","summary":"보안업체 Sysdig가 LLM 에이전트가 정찰부터 자격증명 탈취, 권한 상승, 데이터 암호화까지 전 과정을 자율 수행한 랜섬웨어 'JadePuffer'를 최초 확인했다고 밝혔다. 다만 피해자 선정과 인프라 구축은 여전히 사람이 했다.","insight":"에이전틱 AI의 공격 자동화 속도(로그인 실패 후 31초 만에 우회 성공)는 방어 쪽 대응 속도 기준도 재설계해야 한다는 뜻이다. 사내 AI 에이전트 권한 설계 시 '완전 자율' 구간을 최소화하는 게 안전하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/06/the-first-ai-run-ransomware-attack-still-needed-a-human/"}]},"marketing":{"domestic":[{"title":"네이버, '에이전트 N' 여름 출시 예고…쇼핑 에이전트로 커머스 판 바꾼다","summary":"네이버가 검색 전에 먼저 구매를 제안하는 '에이전틱 쇼핑'을 통합 에이전트 '에이전트 N'으로 이번 여름 선보인다. 취향·검색이력·리뷰를 통합 분석해 맞춤 상품을 제안하고 구매까지 연결하며, 판매자를 위한 '비즈니스에이전트'도 함께 가동한다.","insight":"검색 중심 퍼널이 '제안 중심' 퍼널로 바뀌면 기존 SEO·검색광고 예산 배분 로직이 흔들린다. 마케터는 지금부터 '에이전트가 먼저 추천하는 상품'이 되기 위한 데이터 신호(리뷰 품질, 상품 메타데이터)를 정비해야 한다.","source_name":"테크M","source_url":"https://www.techm.kr/news/articleView.html?idxno=152276"},{"title":"2026년 크리에이터 마케팅, '파트너십 광고'로 무게중심 이동","summary":"크리에이터가 만든 콘텐츠를 그대로 유료 광고 소재로 확장하는 '파트너십 광고'가 국내에서도 주목받고 있다. 마이크로 인플루언서의 클릭률이 메가 인플루언서보다 3배 이상 높다는 데이터도 함께 제시됐다.","insight":"브랜드 자체 제작 광고보다 크리에이터 오리지널 콘텐츠의 전환 효율이 높다는 건, 광고 예산을 '제작비'에서 '크리에이터 라이선싱·리버스 셰어'로 옮겨야 한다는 의미다. 장기 파트너십 계약 구조를 미리 설계해두는 팀이 유리하다.","source_name":"매드타임스","source_url":"https://www.madtimes.co.kr/news/articleView.html?idxno=26713"},{"title":"2026년 광고시장, 성장과 조정 갈림길…디지털 중심 재편 가속","summary":"한국방송광고진흥공사(코바코)가 2026년 광고시장이 성장과 조정이 교차하는 국면에 진입했다고 진단했다. 디지털 광고 비중 확대가 계속되는 가운데 전통 매체 예산의 조정이 함께 나타나고 있다.","insight":"'성장과 조정이 동시에'라는 표현은 결국 예산 재배분 압박이 커진다는 뜻이다. 디지털 전환이 느린 브랜드는 올해 예산 심사에서 '왜 아직도 이 채널이냐'는 질문을 받을 가능성이 높다.","source_name":"한국방송광고진흥공사(코바코)","source_url":"https://www.kobaco.co.kr/site/main/board/news/24646"}],"international":[{"title":"메타, Threads 캐러셀 광고 등 신규 광고 포맷 전 세계 확대","summary":"메타가 Threads에 캐러셀 광고, Advantage+ 카탈로그·앱 광고를 테스트 중이며, Threads 프로필이 없는 브랜드도 인스타그램·페이스북 계정으로 광고를 집행할 수 있도록 열었다. Threads는 기본적으로 Advantage+ 자동 배치에 포함된다.","insight":"신생 지면(Threads)이 별도 세팅 없이 기존 광고 계정에 자동 포함된다는 건, 의도치 않게 예산이 새 지면으로 새어나갈 수 있다는 뜻이다. Advantage+ 자동 배치 옵션을 지금 점검해야 한다.","source_name":"Social Media Today","source_url":"https://www.socialmediatoday.com/news/meta-adds-more-reels-and-threads-ad-options/759946/"},{"title":"구글 마케팅 라이브 2026, '에이전틱 시대' 선언…AI Max 정식 전환","summary":"구글이 마케팅 라이브 2026에서 제미나이 기반의 통합 에이전트를 Google Ads·Analytics·Merchant Center 전반에 도입한다고 발표했다. AI Max는 베타를 벗어나 정식 출시됐으며 검색 전환율이 27% 늘었다고 밝혔다.","insight":"'설정값'이 아니라 '자연어 브리프'로 캠페인을 굴리는 구조로 바뀌면, 운영자의 역량이 '세팅 스킬'에서 '브리프 작성·검수 능력'으로 이동한다. 팀 역량 재교육 계획을 지금 세워야 한다.","source_name":"Google Blog","source_url":"https://blog.google/products/ads-commerce/google-marketing-live-2026-collection/"},{"title":"AI 생성 콘텐츠 범람 속 '탈획일화'가 2026 마케팅 화두로","summary":"업계 서베이에서 응답자 4명 중 3명이 AI 생성 크리에이티브가 브랜드를 서로 비슷하게 만들 위험이 있다고 답했다. 동시에 검색 없이 끝나는 구글 검색이 68%에 달하고 AI 오버뷰로 상위 페이지 클릭률이 58% 줄었다는 결과도 나왔다.","insight":"AI로 제작 속도는 빨라졌지만 '차별화'라는 본질적 과제는 오히려 커졌다. 동시에 클릭 자체가 줄어드는 환경이라, KPI를 클릭·트래픽에서 AI 답변 내 브랜드 언급·인용 빈도로 옮기는 논의가 필요한 시점이다.","source_name":"Newengen","source_url":"https://newengen.com/insights/influencer-marketing-trends-july/"}]},"economy":{"domestic":[{"title":"코스피, SK하이닉스 15% 급락에 서킷브레이커…6800선 붕괴","summary":"7월 13일 코스피가 전 거래일 대비 8.95% 폭락한 6806.93에 마감했다. SK하이닉스가 15% 넘게 급락하며 지수 하락을 주도했고, 올해 들어 7번째 서킷브레이커가 발동됐다. 외국인·기관이 각각 1조6850억원, 2조2190억원을 순매도했다.","insight":"반도체 ADR 상장 후 차익실현과 지정학적 리스크가 겹치며 단일 종목 급락이 지수 전체를 흔든 사례다. 반도체 의존도가 높은 국내 증시 구조상, 관련 산업의 B2B 서비스라면 고객사 투자 지연 리스크를 시나리오에 넣어야 한다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260713000444"},{"title":"원-달러 환율, SK하이닉스발 변동성에 1500선 요동","summary":"코스피 급락과 맞물려 원-달러 환율이 1500원선을 오가는 변동성 장세를 보였다. 반도체 수급 우려가 환율 변동성을 키운 주요 요인으로 지목됐다.","insight":"환율 변동성이 커지면 해외 광고 매체비·해외 SaaS 결제 원가가 출렁인다. 해외 매체 집행 비중이 큰 마케팅 조직은 분기 예산을 원화 고정이 아닌 환헤지 옵션과 함께 검토할 필요가 있다.","source_name":"Businesskorea","source_url":"https://www.businesskorea.co.kr/news/articleView.html?idxno=272904"},{"title":"한국은행 7월 16일 금통위 앞두고 기준금리 인상 가능성 주목","summary":"한국은행 기준금리는 현재 연 2.5%이며, 7월 16일 금융통화위원회를 앞두고 금리 인상 가능성이 거론되고 있다. 최근 물가 상승률도 3%대 초반으로 오르며 통화정책 판단에 변수가 되고 있다.","insight":"금리 인상 국면이면 스타트업·서비스 기업의 자금조달 비용이 오르고 투자 라운드 밸류에이션도 눌린다. 신규 투자 유치나 대규모 마케팅 예산 집행을 앞두고 있다면 금통위 결과 확인 후 집행 타이밍을 잡는 게 안전하다.","source_name":"토스뱅크","source_url":"https://www.tossbank.com/articles/baserate2601"}],"international":[{"title":"연준 의장 워시 \"인플레이션 여전히 높다\"…7월 FOMC 앞두고 신중 모드","summary":"제롬 파월 후임 연준 의장 케빈 워시가 ECB 포럼에서 7월 금리 결정에 대한 힌트는 주지 않으면서도 인플레이션이 여전히 너무 높다고 밝혔다. 연준은 6월 회의에서 금리를 3.50~3.75%로 동결했으며 전통적 포워드 가이던스를 없애고 데이터 의존적 소통으로 전환했다.","insight":"가이던스 없는 데이터 의존적 커뮤니케이션은 시장 변동성을 구조적으로 키운다. 해외 매출 비중이 있는 기업은 연준 발언 하나하나에 환율·자금조달 비용이 출렁일 수 있다는 전제로 리스크 관리 주기를 짧게 가져가야 한다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/01/kevin-warsh-ecb-forum-live-updates.html"},{"title":"달러 강세 지속…달러인덱스 100 돌파, 2026년 최고치","summary":"미국 달러 인덱스(DXY)가 100.7까지 올라 2025년 5월 이후 최고치를 기록했다. 연준의 6월 금리 동결과 향후 추가 인상 가능성 시사가 달러 강세를 뒷받침했다.","insight":"달러 강세 국면은 원자재·해외 인프라 원가 상승으로 이어져 국내 제조·물류 기반 서비스의 원가 구조를 압박한다. 해외 조달 비중이 큰 프로덕트라면 가격 정책 리뷰 주기를 앞당길 필요가 있다.","source_name":"Cambridge Currencies","source_url":"https://cambridgecurrencies.com/usd-forecast-2026/"},{"title":"미 CPI 발표와 워시 의회 증언, 7월 29일 FOMC 향방 가른다","summary":"미국 CPI 발표와 워시 의장의 의회 증언이 7월 28~29일 예정된 FOMC의 금리 결정 기대치를 좌우할 핵심 변수로 지목됐다. 6월 CPI는 전년 대비 3.8%대로 5월(4.2%)보다 둔화될 것이란 컨센서스가 나온다.","insight":"인플레이션 둔화 컨센서스와 워시 의장의 매파적 발언이 엇갈리는 국면이라 FOMC 전후 단기 변동성이 커질 가능성이 높다. 해외 결제·광고비 집행이 있다면 7월 29일 전후로 집행을 분산하는 편이 안전하다.","source_name":"TheStreet","source_url":"https://www.thestreet.com/fed/markets-federal-reserve-kevin-warsh-congress-cpi-interest-rate-outlook"}]},"summary":"AI가 빅테크의 인프라 투자·에이전틱 커머스·마케팅 자동화를 동시에 밀어붙이는 동안, 반도체발 증시 급락과 연준의 매파적 데이터 의존 기조가 겹치며 글로벌 경제 변동성이 커지고 있다."},"2026.07.15":{"date":"2026.07.15","it":{"domestic":[{"title":"지란지교소프트, 3사 통합으로 AI 시대 보안·데이터 역량 결집","summary":"지란지교소프트가 계열사 3곳을 통합해 AI 시대 핵심 경쟁력으로 '안전'을 내세우며 보안·데이터·AI 역량을 하나로 모았다. 판교 본사에서 미디어데이를 열고 통합 법인의 사업 전략과 비전을 공개했다.","insight":"AI 도입이 늘수록 보안·데이터 거버넌스 역량이 별도 사업 가치로 부상하고 있다는 신호다. PM이라면 AI 기능 출시 로드맵에 보안/컴플라이언스 체크포인트를 초기 단계부터 넣어야 한다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260714123001"},{"title":"정부, 반도체·AI데이터센터·피지컬AI 3대 메가프로젝트로 초격차 추진","summary":"정부가 14일 국무회의에서 하반기 경제성장전략을 논의하며 반도체 생산능력 확충, AI데이터센터, 피지컬AI를 3대 메가프로젝트로 지정했다. 피지컬AI를 국가전략산업으로 육성하겠다는 방침도 함께 제시됐다.","insight":"피지컬AI(로보틱스·자율주행 등 물리 세계 결합 AI)가 정책 우선순위로 격상된 만큼, 하드웨어·제조업과 연계된 AI 제품 기획 시 정부 지원사업·규제 샌드박스를 적극 활용할 시점이다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260714112534"},{"title":"박영훈 디캠프 대표, 노조 설립·내부 갈등 끝에 사임 의사 표명","summary":"스타트업 액셀러레이터 디캠프의 박영훈 대표가 일부 직원들과의 갈등, 내부 감사 등을 겪은 끝에 사임 의사를 밝혔다. 설립 14년 만에 노조가 결성되는 등 내부 진통이 이어져왔다.","insight":"스타트업 지원기관의 거버넌스 리스크는 생태계 전반의 신뢰도에 영향을 미친다. 창업 지원 프로그램에 의존하는 PM이라면 파트너 기관의 조직 안정성도 리스크 요인으로 모니터링할 필요가 있다.","source_name":"ZDNet Korea","source_url":"https://zdnet.co.kr/view/?no=20260714184645"}],"international":[{"title":"AI 스타트업들의 매출 성장 속도, 갈수록 빨라진다","summary":"TechCrunch에 따르면 최근 AI 스타트업들의 매출 성장률이 이전 세대보다 훨씬 가파른 속도로 증가하고 있다. 앤트로픽은 연환산 매출 47억 달러를 돌파하며 두 달 만에 30억 달러 기록을 갈아치웠다.","insight":"AI 네이티브 제품은 PMF 이후 스케일 속도가 기존 SaaS 대비 훨씬 빠르다. 성장 지표(연환산 매출 등)를 분기 단위가 아닌 월 단위로 트래킹하는 체계가 필요하다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/08/these-ai-startups-are-growing-revenue-at-faster-and-faster-rates/"},{"title":"3조 달러 질문: AI 투자, 수익으로 돌아올 것인가","summary":"빅테크들이 AI 인프라에 수천억 달러를 쏟아붓는 가운데, 이 투자가 실제 수익으로 전환될 수 있을지에 대한 의문이 커지고 있다는 TechCrunch의 분석이다. 클라우드·데이터센터 투자 대비 실사용 매출 격차가 핵심 쟁점이다.","insight":"AI 기능을 무료·저가로 제공 중인 제품이라면 지금이 유료 전환 모델을 재점검할 시점이다. '투자 대비 수익' 압박은 상위 벤더의 가격 정책 변화로 이어져 하위 서비스 원가에도 영향을 줄 수 있다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/09/can-ai-answer-the-3-trillion-question/"},{"title":"올해 벌써 90개 가까운 신규 유니콘 탄생","summary":"TechCrunch 집계에 따르면 2026년 들어 지금까지 90개에 육박하는 스타트업이 새롭게 유니콘(기업가치 10억 달러 이상)에 등극했다. AI 관련 기업이 상당수를 차지하고 있다.","insight":"유니콘 배출 속도가 빨라질수록 시리즈 B~C 단계 경쟁도 치열해진다. 후발 스타트업은 차별화된 데이터 자산이나 수직 특화 전략 없이는 밸류에이션 프리미엄을 받기 어려운 국면이다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/05/almost-40-new-unicorns-have-been-minted-so-far-this-year-here-they-are/"}]},"marketing":{"domestic":[{"title":"쿠팡이츠, 13개 프랜차이즈·셰프와 손잡고 '이츠셰프컬렉션' 캠페인","summary":"쿠팡이츠가 인기 셰프 13인, 프랜차이즈 브랜드 13곳과 협업해 신메뉴를 선보이는 '이츠셰프컬렉션'을 16일부터 전개한다. 와우 멤버십 회원 대상으로 10월 14일까지 2주 단위로 신메뉴가 공개되는 장기 캠페인이다.","insight":"장기 시리즈형 캠페인은 단발성 프로모션 대비 재방문율 관리에 유리하다. 멤버십 록인 효과를 노린다면 콘텐츠 공개 주기를 리텐션 지표와 연동해 설계하는 것이 핵심이다.","source_name":"이데일리","source_url":"https://edaily.co.kr/News/Read?mediaCodeNo=257&newsId=03175046645512224"},{"title":"네이버, 배달의민족 인수 검토...쇼핑·배달서 쿠팡과 정면승부","summary":"네이버가 배달의민족 운영사 우아한형제들에 대한 지분 투자 또는 인수를 검토 중인 것으로 알려졌다. 쇼핑·배달 시장에서 쿠팡과의 경쟁 구도가 한층 격화될 전망이다.","insight":"커머스와 배달 데이터를 결합하면 광고 타겟팅 정밀도가 크게 높아진다. 이 거래가 성사되면 D2C·리테일 미디어 광고주 입장에서 네이버 생태계의 타겟팅 옵션 변화를 선제적으로 검토해야 한다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026070686601"},{"title":"넷플릭스·우버·컬리까지...쿠팡 맞서는 네이버의 연합군 전략","summary":"네이버가 넷플릭스, 우버, 컬리 등 다양한 서비스와 제휴를 확대하며 쿠팡에 대응하는 '연합군' 전략을 펼치고 있다. 단일 플랫폼이 아닌 파트너십 네트워크로 록인 효과를 노리는 모습이다.","insight":"자체 개발보다 제휴 확장이 빠른 대응 수단이 되는 시장 국면이다. 자사 플랫폼의 약한 카테고리는 파트너십으로 메우는 전략적 우선순위 재검토가 필요하다.","source_name":"한국경제","source_url":"https://www.hankyung.com/article/2026070835731"}],"international":[{"title":"메타, 페이스북 유치 위한 '크리에이터 패스트트랙' 프로그램 확대","summary":"메타가 인스타그램·틱톡·유튜브의 대형 크리에이터를 페이스북으로 유치하기 위한 '크리에이터 패스트트랙' 프로그램을 운영 중이다. 팔로워 10만 명 이상이면 월 1000달러, 100만 명 이상이면 월 3000달러를 3개월간 보장한다.","insight":"플랫폼 간 크리에이터 쟁탈전이 현금성 인센티브로 격화되고 있다. 브랜드 입장에선 특정 플랫폼 록인보다 크리에이터 포트폴리오를 멀티플랫폼으로 분산 운영하는 전략이 리스크 관리에 유리하다.","source_name":"SocialBee","source_url":"https://socialbee.com/blog/facebook-updates/"},{"title":"틱톡, 쇼핑 라이브방송서 AI 생성 음성·사전녹음 오디오 전면 금지","summary":"틱톡샵이 라이브 커머스에서 AI 생성 음성, 사전 녹음 오디오, 정적 이미지 콘텐츠 사용을 금지하는 새 정책을 시행했다. 모든 음성 소통은 실시간 육성 또는 수어로만 가능하며, 위반 시 커미션 제한·계정 정지 등 제재를 받는다.","insight":"소비자는 AI 생성 콘텐츠를 인지했을 때 브랜드 신뢰도를 평가절하하는 경향(4배 높은 불신)이 있다는 것이 규제의 배경이다. 라이브커머스 도입을 검토 중이라면 AI 활용 범위를 '보조'로 한정하고 실시간 진행자를 필수 요소로 설계해야 한다.","source_name":"Social Media Today","source_url":"https://www.socialmediatoday.com/news/tiktok-bans-ai-generated-voices-in-shopping-livestreams/822977/"},{"title":"7월 14일 오늘의 글로벌 광고·마케팅·미디어 주요 뉴스","summary":"bestmediainfo가 7월 14일자로 발행한 광고·마케팅·미디어 업계 주요 헤드라인 모음이다. 글로벌 광고주와 에이전시의 최신 동향이 매일 업데이트되는 뉴스 큐레이션이다.","insight":"일일 단위 업계 뉴스 모니터링 루틴을 만들어두면 경쟁사 캠페인 대응 속도를 높일 수 있다. 특히 대형 광고주의 예산 재배분 뉴스는 매체 협상력에 직접 영향을 준다.","source_name":"BestMediaInfo","source_url":"https://bestmediainfo.com/mediainfo/advertising/top-advertising-marketing-and-media-news-headlines-of-today-july-14-2026-12161568"}]},"economy":{"domestic":[{"title":"SK하이닉스 15% 급락, '검은 월요일' 코스피 6800대로 추락","summary":"SK하이닉스 주가가 하루 만에 15.37% 급락하며 코스피가 6800선까지 밀려났다. 반도체 피크아웃(고점 논쟁) 우려와 지정학적 리스크가 겹치며 투자심리가 급격히 얼어붙었다.","insight":"반도체 의존도가 높은 국내 증시 특성상 단일 업종 리스크가 전체 지수를 흔든다. 반도체 관련 B2B 서비스나 공급망 파트너십을 운영 중이라면 고객사 실적 변동성에 대비한 매출 다변화 시나리오가 필요하다.","source_name":"한국일보","source_url":"https://www.hankookilbo.com/news/article/A2026071316470003411"},{"title":"코스피 서킷브레이커 발동...삼성전자 10%대 하락","summary":"코스피가 8% 이상 폭락하며 매도 사이드카·서킷브레이커가 발동됐다. 삼성전자도 10% 이상 급락하며 시총 1위 자리를 내주는 등 반도체 대형주 전반이 흔들렸다.","insight":"서킷브레이커 발동은 단기 변동성 지표로, 소비자 지갑 심리(가처분소득 인식)에도 영향을 준다. 이 시기 신규 유료 서비스나 가격 인상을 계획 중이라면 런칭 타이밍을 재검토할 필요가 있다.","source_name":"TradingKey","source_url":"https://www.tradingkey.com/kr/analysis/stocks/more/262025476-kospi-samsung-skhynix-ai-adr-skhy-tradingkey"},{"title":"원·달러 환율 상승세 꺾여...7월 들어 48원 하락","summary":"한국은행에 따르면 원·달러 환율이 6월 말 1549.4원에서 7월 10일 1501.4원으로 48원 하락했다. 미국 고용지표 부진으로 달러 강세가 다소 완화된 영향이다. 다만 외국인 주식 순유출은 지속되고 있다.","insight":"환율 하락은 수입 원가 부담을 낮추지만, 외국인 자금 순유출이 지속되는 점은 국내 증시 수급에 부담 요인이다. 해외 소싱 비중이 큰 서비스라면 환헤지 전략을 다시 점검할 시점이다.","source_name":"한국은행 (Daum 뉴스 경유)","source_url":"https://v.daum.net/v/20260714133102352"}],"international":[{"title":"연준, 7월 FOMC 앞두고 금리 동결 유력...인플레 4.2%로 목표 상회","summary":"새 연준 의장 케빈 워시 체제에서 기준금리는 3.50~3.75%로 4회 연속 동결 상태를 유지 중이다. 5월 CPI가 전년 대비 4.2% 상승해 목표치 2%를 크게 웃돌면서도, 시장은 7월 28~29일 회의에서 동결 확률을 74.9%로 보고 있다.","insight":"인플레이션이 목표치를 크게 상회하는데도 동결 기조가 이어지는 것은 성장 둔화 우려가 더 크다는 신호다. 달러 표시 비용(클라우드·SaaS 라이선스 등)이 큰 조직이라면 하반기 금리 인상 가능성(약 25%)을 시나리오에 포함해야 한다.","source_name":"Intellectia.ai","source_url":"https://intellectia.ai/blog/fed-interest-rate-decision-july-14-2026"},{"title":"\"연준은 금리를 동결해야 한다\"...워싱턴타임스 사설","summary":"워싱턴타임스는 사설을 통해 인플레이션 압력에도 불구하고 연준이 금리를 현 수준에서 유지해야 한다고 주장했다. 급격한 긴축이 경기 둔화를 심화시킬 수 있다는 우려가 배경이다.","insight":"통화정책 방향에 대한 여론 분화 자체가 시장 변동성 요인이다. 글로벌 서비스 확장을 준비 중이라면 정책 불확실성이 해소되는 7월 말 FOMC 이후로 주요 가격 정책 발표를 미루는 것도 고려할 만하다.","source_name":"The Washington Times","source_url":"https://www.washingtontimes.com/news/2026/jul/7/federal-reserve-stand-pat-interest-rates/"},{"title":"연준, 7월 통화정책 보고서 의회 제출","summary":"연방준비제도가 7월 10일 의회에 통화정책 보고서를 제출했다. 인플레이션 관리와 성장 유지 사이의 균형을 핵심 과제로 제시하며, 에너지 수입국 중심으로 물가 상승 압력이 크다고 진단했다.","insight":"연준의 공식 보고서는 향후 정책 방향의 1차 사료로, 애매한 뉴스 해석보다 원문 확인이 중요하다. 환율·금리에 민감한 사업계획(해외 매출 비중 등)은 이 보고서의 '균형' 표현을 정책 완화 신호로 과잉 해석하지 않도록 주의해야 한다.","source_name":"Federal Reserve","source_url":"https://www.federalreserve.gov/monetarypolicy/files/20260710_mprfullreport.pdf"}]},"summary":"AI 인프라 투자 확대와 규제 강화가 동시에 진행되는 가운데, 반도체 고점론이 촉발한 국내 증시 급락이 국내외 경제 전반의 리스크 심리를 흔들고 있다."},"2026.07.16":{"date":"2026.07.16","it":{"domestic":[{"title":"SK하이닉스-엔비디아, AI 팩토리용 메모리 장기 기술 파트너십 발표","summary":"SK하이닉스와 엔비디아가 차세대 AI 인프라용 메모리를 공동 개발하는 다년간 기술 파트너십을 발표했다. 베라 루빈 AI 슈퍼컴퓨터와 젯슨 토르 로보틱스 플랫폼용 메모리 공동 개발, 팹 디지털트윈을 통한 자율 팹 운영까지 협력 범위를 확대했다. SK하이닉스는 현재 HBM 시장의 56%를 점유하고 있다.","insight":"메모리 스펙이 AI 인프라 로드맵에 종속되는 구조가 고착화되고 있어, 반도체 의존 산업의 제품 로드맵도 빅테크 공급사 일정에 맞춰 재조정할 필요가 있다.","source_name":"SK hynix Newsroom","source_url":"https://news.skhynix.co.kr/multi-year-tech-partnership-with-nvidia/"},{"title":"네이버·카카오, AI 사업 전략 갈리며 시장 평가도 엇갈려","summary":"네이버와 카카오가 하반기 AI 사업 전략을 본격화하는 가운데 두 회사에 대한 증권가 평가가 엇갈리고 있다. 네이버는 '비중 확대' 의견을 받은 반면 카카오는 목표가가 하향 조정됐다. 양사 모두 AI 에이전트 확장에 나섰지만 수익화 방식과 사업 구조 개편 방향은 다르다.","insight":"동일한 'AI 에이전트' 방향성이라도 수익화 모델(광고 vs 구독·커머스 연계)에 따라 시장 평가가 갈린다는 점은, AI 기능 자체보다 수익화 설계가 PM의 핵심 과제임을 보여준다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260617000711"},{"title":"국내 스타트업, 특허 AI·촉각 로보틱스 등 딥테크 투자 이어져","summary":"7월 6~10일 한 주간 국내 스타트업 24곳이 투자를 유치했으며 시드·정부지원 비중이 절반을 넘었다. 특허 전문 AI 기업 워트인텔리전스는 165억원 규모 시리즈B를 유치해 국내 특허·IP 솔루션 분야 단일 라운드 역대 최대 기록을 세웠다. 촉각 로보틱스 데이터 플랫폼 식스센스도 와이콤비네이터 여름 배치 선정과 함께 프리시드를 유치했다.","insight":"해외 사업자가 장악한 특허·IP 솔루션 시장에서 국내 스타트업이 최대 라운드를 기록한 것은 '버티컬 AI + 로컬 데이터 우위' 조합이 여전히 유효한 진입 전략임을 시사한다.","source_name":"스타트업레시피","source_url":"https://startuprecipe.co.kr/archives/5825400"}],"international":[{"title":"구글 딥마인드, 제미나이 3.5 프로 출시 연기…아키텍처 전면 재설계","summary":"구글 딥마인드가 제미나이 3.5 프로 출시를 7월 17일로 연기하고 기존 2.5 프로 아키텍처를 폐기, 전면 재설계에 들어갔다. 수학적 추론, SVG 장면 생성, 이미지 품질 개선에 초점을 맞춰 GPT-5.6, 클로드 Fable 5와의 경쟁에 대응하려는 조치다.","insight":"이미 공개 예고된 모델을 출시 직전 전면 재설계하는 결정은, 프론티어 모델 경쟁에서 '먼저 내놓기'보다 '벤치마크 우위'가 우선순위로 재조정되고 있다는 신호로 읽어야 한다.","source_name":"BigGo Finance","source_url":"https://finance.biggo.com/news/6f0c6bb2-795f-4c57-9d09-6db691d7638a"},{"title":"데미스 하사비스, 미국 주도의 국제 AI 안전기구 설립 제안","summary":"구글 딥마인드 CEO 데미스 하사비스가 프론티어 모델을 심사하고 위험 시 업계 전반의 속도 조절까지 조율할 권한을 가진 새로운 AI 감시기구를 미국이 주도해 설립해야 한다고 제안했다. 그는 공개 성명서를 통해 이 구상을 제시했다.","insight":"빅테크 스스로 규제기구 설립을 요구하는 흐름은 규제 리스크가 임박했다는 신호로, 국내 서비스도 AI 안전성·투명성 관련 자체 가이드라인을 선제적으로 정비해둘 필요가 있다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/14/google-deepmind-demis-hassabis-us-led-ai-standards-body.html"},{"title":"AI 산업, 1.5조 달러 인프라 투자 대비 3조 달러 수익 입증해야","summary":"2026년 AI 인프라 지출은 1.5조 달러로 추산되며, 이 투자를 정당화하려면 AI 산업이 3조 달러 규모의 수익을 창출해야 한다는 분석이 나왔다. 앤트로픽은 5월 말 기준 연환산 매출 470억 달러를 넘기며 급성장세를 보이고 있다.","insight":"매출 성장세가 가파른 소수 기업과 나머지 다수 기업 간 격차가 벌어지는 구간에 진입한 것으로, 자사 AI 투자 대비 ROI를 증명하지 못하는 프로젝트는 다음 예산 사이클에서 우선 정리 대상이 될 가능성이 높다.","source_name":"TechCrunch","source_url":"https://techcrunch.com/2026/07/09/can-ai-answer-the-3-trillion-question/"}]},"marketing":{"domestic":[{"title":"틱톡숍, 7월 한국 상륙…라이브커머스 경쟁 본격화","summary":"틱톡숍이 7월 한국 시장에 정식 진출하며 기존 라이브커머스 플랫폼과의 경쟁이 본격화됐다. 콘텐츠에서 상품 태그, 결제, 추천까지 이어지는 폐쇄형 구매 흐름이 핵심 경쟁력으로 꼽힌다.","insight":"'도달'이 아니라 '구매 전환'까지 플랫폼 내부에서 완결되는 구조이므로, 자사몰·오픈마켓 중심 커머스 전략은 틱톡숍의 인앱 결제 완결성을 벤치마크해 퍼널을 재설계해야 한다.","source_name":"AI마케팅뉴스","source_url":"https://www.aimarketingnews.io/news/articleView.html?idxno=3737437"},{"title":"AI 마케팅 활용률 75% vs 성과 창출률 13%, 실행력 격차 심화","summary":"국내 마케터의 75%가 AI 도구를 활용하고 있지만 실제 성과를 내는 비율은 13%에 불과하다는 조사 결과가 나왔다. 도구 도입 자체보다 활용 역량과 실행 프로세스의 격차가 성과를 가르는 핵심 요인으로 지적된다.","insight":"AI 도구 도입 여부는 더 이상 차별화 요소가 아니며, 워크플로우에 AI를 어떻게 녹여 실제 성과 지표(전환·리텐션)로 연결하는지에 대한 내부 표준 프로세스 정립이 우선 과제다.","source_name":"오픈애즈","source_url":"https://www.openads.co.kr/content/contentDetail?contsId=19140"},{"title":"구글, 2026년 디지털 광고·커머스 전망 발표…개인화 경험 시대 강조","summary":"구글이 2026년 디지털 광고 및 커머스 전망 보고서를 통해 매끄럽고 개인화된 소비자 경험이 핵심 트렌드가 될 것이라고 밝혔다. AI 기반 광고 자동화와 쇼핑 경험 통합이 주요 축으로 제시됐다.","insight":"구글이 개인화·자동화를 표준으로 못 박은 이상, 수동 세그먼트 기반 캠페인 운영 조직은 AI 기반 자동 타겟팅으로의 전환 로드맵을 이번 분기 내 확정해야 경쟁에서 밀리지 않는다.","source_name":"Google 공식 블로그","source_url":"https://blog.google/intl/ko-kr/company-news/technology/2026-digital-ads-commerce-outlook-kr/"}],"international":[{"title":"메타, AI 비즈니스 어시스턴트를 전 광고주로 확대","summary":"메타가 광고관리자(Ads Manager)에 탑재된 AI 비즈니스 어시스턴트를 전 세계 모든 광고주와 대행사로 확대했다. 대화형 인터페이스로 캠페인 성과 조회, 리포트 작성, 이상 신호 탐지까지 자동으로 처리한다.","insight":"AI 어시스턴트가 캠페인 이상 탐지와 최적화 제안까지 자동화하면 매체 운영자의 역할은 '실행'에서 '어시스턴트 제안의 검증과 전략 판단'으로 이동하므로, 팀 역량 재교육이 선행돼야 한다.","source_name":"eMarketer","source_url":"https://www.emarketer.com/content/meta-expands-ai-business-assistant-all-advertisers-its-latest-push-toward-automation"},{"title":"틱톡, 광고주 대상 '에이전틱 허브' 출시","summary":"틱톡이 6월 30일 광고주들이 AI 기반 도구로 캠페인 전 과정을 관리할 수 있는 중앙 플랫폼 '에이전틱 허브'를 출시했다. 허브스팟, 위스, 콘스턴트 콘택트 등 다수 파트너사가 이미 자체 AI 에이전트를 연동했다.","insight":"AI 에이전트가 카탈로그 관리부터 크리에이티브 생성까지 자율 수행하는 방향으로 플랫폼이 재편되고 있어, 매체 대행 조직은 '캠페인 세팅' 역량보다 '에이전트에게 줄 목표·가드레일 설계' 역량을 우선 확보해야 한다.","source_name":"Social Media Today","source_url":"https://www.socialmediatoday.com/news/tiktok-launches-agentic-hub/824169/"},{"title":"구글 검색 68% '무클릭' 종료…GEO 마케팅 중요성 확대","summary":"미국 구글 검색의 약 68%가 어떤 웹사이트로도 클릭 이동 없이 종료되는 것으로 나타났다. AI 생성 답변이 검색 결과창에서 직접 정보를 제공하면서 발견형·생성형 엔진 최적화(GEO)의 중요성이 커지고 있다.","insight":"트래픽 유입 자체가 구조적으로 줄어드는 국면이므로, SEO 중심 콘텐츠 전략을 AI 답변에 인용되기 위한 구조화된 콘텐츠(GEO) 전략으로 조기에 전환해야 유기적 노출 손실을 방어할 수 있다.","source_name":"B2the7","source_url":"https://www.b2the7.com/news-blog/marketing-trends-july-2026-geo-agentic-ads-tiktok-shop"}]},"economy":{"domestic":[{"title":"한국은행, 오늘 금통위서 3년 6개월 만에 기준금리 인상 유력","summary":"한국은행이 16일 금융통화위원회를 열고 기준금리를 현 2.50%에서 2.75%로 0.25%포인트 인상할 것으로 시장은 보고 있다. 물가상승률이 3%를 넘어서고 고환율이 지속되는 가운데 채권·매크로 전문가 12명 중 10명이 금통위원 전원 만장일치 인상을 전망했다.","insight":"긴축 재개는 대출 원가와 소비 여력에 직접 영향을 주므로, 구독형·할부 결제가 매출 비중이 큰 서비스는 금리 인상 발표 즉시 전환율·해지율 변화를 모니터링할 대응 지표를 미리 준비해둬야 한다.","source_name":"세계일보","source_url":"https://www.segye.com/newsView/20260714516313"},{"title":"원/달러 환율 1550원대 안착…17년 3개월 만의 최고치","summary":"원/달러 환율이 서울 외환시장에서 1554.9원에 마감하며 2009년 글로벌 금융위기 이후 최고치를 기록했다. 연준의 금리 인상 시그널에 따른 달러 강세와 외국인의 국내 주식 순매도(상반기 약 150조원)가 주요 원인으로 지목된다.","insight":"고환율은 수출 기업 실적에는 호재지만 원자재 수입 비용과 해외 마케팅·서버 비용(달러 결제)을 끌어올리므로, 해외 인프라 의존도가 높은 서비스는 하반기 비용 계획을 환율 시나리오별로 재산정해야 한다.","source_name":"경향신문","source_url":"https://www.khan.co.kr/article/202607012123005"},{"title":"미·이란 재충돌에 국제유가 70달러대로 상승","summary":"미국과 이란의 군사적 충돌이 재발하면서 국제유가가 배럴당 70달러를 넘어섰다. 호르무즈 해협 인근 유조선 공격과 미국의 대이란 공습이 원유 수송 차질 우려를 키운 영향으로, 국내 정유업계는 7~8월 물량을 전년 대비 두 배 이상 확보해 단기 영향은 제한적일 것으로 본다.","insight":"지정학 변수로 유가가 다시 출렁이는 국면이므로, 물류·배송 비용이 손익에 민감한 이커머스·구독 서비스는 유가 상승분의 요금 전가 여부를 미리 시나리오로 정리해둘 필요가 있다.","source_name":"뉴스핌","source_url":"https://www.newspim.com/news/view/20260713000523"}],"international":[{"title":"IMF, 세계 성장률 3.0% 전망…인플레이션은 4.7%로 상향","summary":"IMF는 7월 세계경제전망(WEO) 업데이트에서 2026년 세계 성장률을 3.0%, 2027년을 3.4%로 제시했다. 전쟁 관련 불확실성과 AI 주도 투자붐이라는 상반된 힘이 동시에 작용하는 가운데 세계 헤드라인 인플레이션 전망은 4.7%로 상향 조정됐다.","insight":"'전쟁발 비용 상승'과 'AI발 투자 확대'가 동시에 인플레이션을 밀어올리는 구조여서, 원자재·에너지 노출이 큰 사업은 낙관적 성장 전망만 보고 원가 계획을 세우면 인플레이션 역풍을 놓칠 수 있다.","source_name":"IMF","source_url":"https://www.imf.org/en/publications/weo/issues/2026/07/08/world-economic-outlook-update-july-2026"},{"title":"연준 7월 금리 인상 가능성 46.5%로 상승","summary":"연준의 7월 29일 기준금리 0.25%포인트 인상 가능성이 46.5%로 높아졌다. 6월 FOMC에서 확인된 PCE 인플레이션 3.6%, 근원 PCE 3.3%가 목표치 2%를 크게 상회하면서 매파적 기조가 강화되고 있다.","insight":"연준의 인상 가능성이 절반에 근접한 상황에서 원/달러 환율 추가 상승 리스크가 열려 있으므로, 달러 결제 비용이 있는 조직은 인상 발표 전 헤지 여부를 결정해두는 것이 안전하다.","source_name":"CNBC","source_url":"https://www.cnbc.com/2026/07/13/-a-july-rate-hike-from-the-fed-the-odds-are-rising.html"},{"title":"ECB, 7월 금리 동결 가능성 시사","summary":"ECB 통화정책위원들이 7월 회의에서 기준금리를 동결할 가능성을 시사했다. 지난달 중동발 인플레이션 우려로 0.25%포인트 인상했으나, 유로존 물가가 예상보다 빠르게 둔화하며 추가 인상 필요성이 낮아졌다는 판단이다.","insight":"미 연준은 인상 쪽으로, ECB는 동결 쪽으로 갈리는 통화정책 비동조화가 진행 중이어서, 유럽·미국에 동시 진출한 서비스는 지역별로 다른 환율·구매력 시나리오를 별도로 관리해야 한다.","source_name":"아주경제","source_url":"https://www.ajunews.com/view/20260702132909441"}]},"summary":"AI 인프라 투자 확대와 플랫폼의 에이전틱 자동화가 가속화되는 동시에, 한국은행의 금리 인상 임박과 고환율·고유가가 겹치며 실물경제 전반의 긴축 압력이 커지는 하루다."}};

    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
  }
}

/* ── Helpers ───────────────────────────────────────── */
function fmtDate(d) { return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function allDates() { return Object.keys(HISTORY_DATA).sort((a,b) => a.localeCompare(b)); }
function cardId(title) { return 'c' + [...title].reduce((a,c) => (a*31+c.charCodeAt(0))|0, 0).toString(36).replace('-','_'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Title click → open source ────────────────────── */
document.addEventListener('click', (e) => {
  const t = e.target.closest('.news-title[data-url]');
  if (t && t.dataset.url) window.open(t.dataset.url, '_blank', 'noopener');
});

/* ── Summary bar: collapse on scroll down, expand ONLY on a real scroll-up gesture ── */
let sbLastY = 0;
let sbGuardUntil = 0; // 이 시각까지는 '펼치기'를 무시(탭/날짜 전환 직후 잔여 스크롤 이벤트 방지). 시간 기반이라 이벤트 유무와 무관하게 항상 자동 해제됨.
function onScrollArea() {
  const area = document.getElementById('scroll-area');
  const bar  = document.getElementById('summary-bar');
  if (!area || !bar) return;
  const y = area.scrollTop;
  const dy = y - sbLastY;
  const guardOk = Date.now() >= sbGuardUntil;
  // 최상단 부근(예: 오버스크롤 바운스로 살짝 내려갔다 튕겨 돌아오는 경우)에서는
  // 절대 접히지 않도록 최소 이동 거리(SB_MIN_Y) 이상 내려간 경우에만 접는다.
  const SB_MIN_Y = 32;
  if (dy > 6 && y > SB_MIN_Y) bar.classList.add('sb-collapsed');
  else if (guardOk && (dy < -6 || y <= 8)) bar.classList.remove('sb-collapsed'); // 최상단 근처면 델타와 무관하게 항상 펼침
  sbLastY = y;
}
document.getElementById('scroll-area').addEventListener('scroll', onScrollArea, { passive: true });

// 탭/날짜 전환으로 스크롤 위치를 프로그램적으로 top(0)에 되돌릴 때는
// 요약바 상태(collapsed 여부)는 건드리지 않고 기준점(sbLastY)만 동기화한다.
// 또한 전환 직후 짧은 시간 동안은 관성 스크롤 등 잔여 이벤트로 인한
// '펼치기' 오작동을 막기 위해 시간 기반 가드를 건다(이벤트 대기 방식이 아니므로 영구히 걸릴 위험이 없음).
function resetScrollTopSilently() {
  document.getElementById('scroll-area').scrollTop = 0;
  sbLastY = 0;
  sbGuardUntil = Date.now() + 400;
}

/* ── Date select ───────────────────────────────────── */
function selectDate(date) {
  const data = HISTORY_DATA[date];
  if (!data) { showToast('이 날 발행된 레터가 없어요'); return; }
  currentDate = date;
  document.getElementById('current-date-chip').textContent = date;
  const dates = allDates(); const idx = dates.indexOf(date);
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= dates.length - 1;
  // summary
  const bar = document.getElementById('summary-bar');
  if (data.summary) { bar.style.display = 'flex'; document.getElementById('sum-preview').textContent = data.summary; }
  else { bar.style.display = 'none'; }
  // panels
  window._cards = {};
  document.getElementById('panel-it').innerHTML        = renderSection(data.it,        'it');
  document.getElementById('panel-marketing').innerHTML = renderSection(data.marketing, 'marketing');
  document.getElementById('panel-economy').innerHTML   = renderSection(data.economy,   'economy');
  applyActiveTab(currentTab);
  resetScrollTopSilently();
  refreshScrapIcons();
}

function navDate(dir) {
  const dates = allDates(); const idx = dates.indexOf(currentDate);
  const next = dates[idx + dir]; if (next) selectDate(next);
}

/* ── Tabs ──────────────────────────────────────────── */
function applyActiveTab(tab) {
  const order = ['it','marketing','economy'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', order[i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
}

function switchTab(tab, btn) {
  currentTab = tab;
  applyActiveTab(tab);
  resetScrollTopSilently();
}

/* ── Render ────────────────────────────────────────── */
function renderSection(data, cat) {
  const dom = data?.domestic||[], intl = data?.international||[];
  if (!dom.length && !intl.length) return `<div class="empty"><div class="icon">📭</div>뉴스가 없습니다.</div>`;
  let html = '';
  if (dom.length)  { html += `<div class="region-header">🇰🇷 국내</div>`; dom.forEach(item  => { html += renderCard(item, cat, '국내'); }); }
  if (intl.length) { html += `<div class="region-header">🌍 해외</div>`;  intl.forEach(item => { html += renderCard(item, cat, '해외'); }); }
  return html;
}

function renderCard(item, cat, region) {
  const id = cardId(item.title);
  window._cards[id] = { ...item, cat, region, date: currentDate };
  const scrapped = !!loadScraps()[id];
  return `
    <div class="news-card" id="card-${id}">
      <div class="card-actions">
        <button class="card-btn ${scrapped?'scrapped':''}" id="si-${id}" onclick="toggleScrap('${id}')" title="스크랩">🔖</button>
      </div>
      <div class="news-title" data-url="${esc(item.source_url||'')}" title="원문 보기: ${esc(item.source_name||'')}">${esc(item.title)}</div>
      <div class="news-summary">${esc(item.summary)}</div>
      <div class="news-source">출처: <a href="${esc(item.source_url||'#')}" target="_blank">${esc(item.source_name||'출처 없음')}</a></div>
      <div class="news-insight">💡 ${esc(item.insight)}</div>
    </div>`;
}

/* ── Scrap ─────────────────────────────────────────── */
function toggleScrap(id) {
  const scraps = loadScraps();
  if (scraps[id]) { delete scraps[id]; showToast('스크랩 해제'); }
  else {
    const c = window._cards[id]; if (!c) return;
    scraps[id] = { ...c, memo: '', scrapedAt: Date.now() };
    showToast('스크랩 저장 🔖');
  }
  saveScraps(scraps); updateScrapBadge(); refreshScrapIcons();
}

function refreshScrapIcons() {
  const scraps = loadScraps();
  document.querySelectorAll('[id^="si-"]').forEach(btn => {
    const id = btn.id.slice(3);
    btn.classList.toggle('scrapped', !!scraps[id]);
  });
}

function updateScrapBadge() {
  const n = Object.keys(loadScraps()).length;
  const b = document.getElementById('scrap-badge');
  if (n > 0) { b.style.display = 'flex'; b.textContent = n; }
  else { b.style.display = 'none'; }
}

function openScraps() {
  const scraps = loadScraps();
  const items  = Object.entries(scraps).sort((a,b) => b[1].scrapedAt - a[1].scrapedAt);
  document.getElementById('scrap-panel-title').textContent = `스크랩 (${items.length})`;
  if (!items.length) {
    document.getElementById('scrap-body').innerHTML = `<div class="week-empty">아직 스크랩한 뉴스가 없어요.<br>카드에 마우스를 올리면 🔖 버튼이 나타납니다.</div>`;
  } else {
    document.getElementById('scrap-body').innerHTML = items.map(([id, s]) => {
      const hasMemo = !!s.memo;
      return `
        <div class="scrap-card">
          <div class="scrap-card-top">
            <div class="scrap-card-info">
              <div class="scrap-meta">${esc(s.date)} · ${CAT_LABEL[s.cat]||''} · ${esc(s.region||'')}</div>
              <div class="scrap-title">${esc(s.title)}</div>
            </div>
            <button class="scrap-del" onclick="removeScrap('${id}')" title="삭제">🗑️</button>
          </div>
          <div class="scrap-insight">💡 ${esc(s.insight)}</div>
          <div id="mv-${id}" class="memo-view ${hasMemo?'':'empty'}" onclick="editMemo('${id}')">${hasMemo ? esc(s.memo) : '메모 추가…'}</div>
          <div id="me-${id}" class="memo-edit">
            <textarea class="memo-textarea" id="mt-${id}" rows="3" placeholder="메모를 입력하세요…" onkeydown="memoKey(event,'${id}')">${esc(s.memo||'')}</textarea>
            <div class="memo-buttons">
              <button class="memo-cancel" onclick="cancelMemo('${id}')">취소</button>
              <button class="memo-save" onclick="saveMemo('${id}')">저장</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }
  document.getElementById('scrap-overlay').classList.add('open');
}
function closeScraps() { document.getElementById('scrap-overlay').classList.remove('open'); }

function editMemo(id) {
  const scraps = loadScraps();
  document.getElementById('mt-'+id).value = scraps[id]?.memo || '';
  document.getElementById('mv-'+id).style.display = 'none';
  document.getElementById('me-'+id).style.display = 'block';
  document.getElementById('mt-'+id).focus();
}

function saveMemo(id) {
  const val = document.getElementById('mt-'+id).value.trim();
  const scraps = loadScraps();
  if (scraps[id]) { scraps[id].memo = val; saveScraps(scraps); }
  const view = document.getElementById('mv-'+id);
  view.textContent = val || '메모 추가…';
  view.classList.toggle('empty', !val);
  view.style.display = 'block';
  document.getElementById('me-'+id).style.display = 'none';
  showToast('메모 저장 ✓');
}

function cancelMemo(id) {
  document.getElementById('me-'+id).style.display = 'none';
  document.getElementById('mv-'+id).style.display = 'block';
}

function memoKey(e, id) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveMemo(id); }
}

function removeScrap(id) {
  const scraps = loadScraps(); delete scraps[id]; saveScraps(scraps);
  updateScrapBadge(); refreshScrapIcons(); openScraps();
}

/* ── Weekly ────────────────────────────────────────── */
function openWeekly() {
  const today = new Date();
  const days = Array.from({length:7}, (_,i) => { const d = new Date(today); d.setDate(d.getDate()-i); return fmtDate(d); }).reverse();
  const items = days.filter(d => HISTORY_DATA[d]?.summary);
  document.getElementById('weekly-body').innerHTML = items.length
    ? items.map(d => `<div class="week-item"><div class="week-date">${d}</div><div class="week-summary">${esc(HISTORY_DATA[d].summary)}</div></div>`).join('')
    : `<div class="week-empty">최근 7일간 저장된 브리핑이 없어요.</div>`;
  document.getElementById('weekly-overlay').classList.add('open');
}
function closeWeekly() { document.getElementById('weekly-overlay').classList.remove('open'); }


/* ── Calendar ──────────────────────────────────────── */
function openCal() {
  if (currentDate) { const p = currentDate.split('.'); calYear = +p[0]; calMonth = +p[1]-1; }
  renderCal(); document.getElementById('cal-overlay').classList.add('open');
}
function closeCal() { document.getElementById('cal-overlay').classList.remove('open'); }
function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; } if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
}
function renderCal() {
  const ts = fmtDate(new Date());
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${calMonth+1}월`;
  const fd = new Date(calYear, calMonth, 1).getDay();
  const dm = new Date(calYear, calMonth+1, 0).getDate();
  let html = '';
  for (let i=0;i<fd;i++) html += `<button class="cal-day" style="visibility:hidden"></button>`;
  for (let d=1;d<=dm;d++) {
    const ds = `${calYear}.${String(calMonth+1).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
    const hd=!!HISTORY_DATA[ds], it=ds===ts, sel=ds===currentDate, fut=ds>ts;
    let cls='cal-day';
    if(hd) cls+=' has-data'; else if(!fut) cls+=' no-data-past'; else cls+=' future-day';
    if(it) cls+=' today-mark'; if(sel) cls+=' selected';
    const ck = fut ? '' : `onclick="pickDate('${ds}')"`;
    html += `<button class="${cls}" ${ck}>${d}</button>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
function pickDate(ds) { closeCal(); if(HISTORY_DATA[ds]) selectDate(ds); else showToast('이 날 발행된 레터가 없어요'); }

/* ── Toast ─────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body></html>
